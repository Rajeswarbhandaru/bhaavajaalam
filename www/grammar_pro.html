<html lang="en">

<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 2em;
            flex: 1;
        }

        .sound-toggle {
            background: #667eea;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.3s;
        }

        .sound-toggle:hover {
            background: #764ba2;
        }

        .sound-toggle.muted {
            background: #ccc;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f0f4ff;
            border-radius: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 0.85em;
            color: #666;
        }

        .stat-value {
            font-size: 1.6em;
            font-weight: bold;
            color: #667eea;
        }

        .difficulty-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .difficulty-btn {
            padding: 8px 16px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .difficulty-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .difficulty-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .game-section {
            display: none;
        }

        .game-section.active {
            display: block;
        }

        .menu-screen {
            text-align: center;
        }

        .menu-btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            font-size: 1.1em;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .menu-btn:hover {
            transform: translateY(-3px);
        }

        .grammar-btn {
            background: #667eea;
        }

        .vocab-btn {
            background: #764ba2;
        }

        .question-container {
            margin: 20px 0;
        }

        .question-text {
            font-size: 1.15em;
            color: #333;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .options {
            display: grid;
            gap: 12px;
        }

        .option {
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1em;
            text-align: left;
        }

        .option:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        .option.incorrect {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        .feedback {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
            font-size: 0.95em;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .feedback.incorrect {
            background: #ffcdd2;
            color: #c62828;
        }

            display: flex;
            gap: 10px;
            margin-top: 20px;

            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #ddd;
            color: #333;
        }

        .btn-secondary:hover {
            background: #bbb;
        }

        .progress {
            margin-bottom: 15px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ddd;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #667eea;
            transition: width 0.3s;
        }

        .question-counter {
            margin-top: 5px;
            color: #666;
            font-size: 0.85em;
        }

        .celebration {
            text-align: center;
            padding: 20px;
        }

        .celebration-emoji {
            font-size: 3.5em;
            margin-bottom: 15px;
            animation: bounce 0.5s infinite;
        }

        @keyframes bounce {

            50% { transform: translateY(-15px); }

        .score-display {
            font-size: 2.2em;
            color: #667eea;
            font-weight: bold;
            margin: 20px 0;
        }

        .home-btn {
            display: inline-block;

            background: #667eea;
            color: white;

            font-weight: bold;

            color: #666;

            right: 20px;

            color: white;

            border-radius: 5px;
            font-size: 0.85em;
            display: none;

        }

            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="save-indicator" id="saveIndicator">💾 Progress Saved</div>

    <div class="container">
        <div class="header">
            <h1>🎮 Grammar Quest Pro</h1>
            <button class="sound-toggle" id="soundToggle" onclick="toggleSound()" title="Toggle Sound">🔊</button>

        <div class="stats">

                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-item">

            <div class="stat-item">

        <div class="game-section active menu-screen" id="menu">
            <h2 style="margin-bottom: 30px; color: #333;">Choose a Game</h2>
            <button class="menu-btn grammar-btn" onclick="startGame('grammar')">📝 Grammar Challenge</button>
            <button class="menu-btn vocab-btn" onclick="startGame('vocab')">📚 Vocabulary Master</button>
            <p class="info-text">1000+ questions • 3 difficulty levels • Progress saved automatically</p>
        </div>

        <!-- Game Screen -->
        <div class="game-section" id="gameScreen">
            <div class="difficulty-selector">
                <button class="difficulty-btn active" onclick="setDifficulty('easy')">🟢 Easy</button>
                <button class="difficulty-btn" onclick="setDifficulty('medium')">🟡 Medium</button>
                <button class="difficulty-btn" onclick="setDifficulty('hard')">🔴 Hard</button>
            </div>

            <div class="progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <div class="question-counter">
                    Question <span id="questionNum">1</span> of <span id="totalQuestions">10</span>
                </div>
            </div>

            <div class="question-container">
                <div class="question-text" id="question"></div>
                <div class="options" id="options"></div>
            </div>

            <div class="feedback" id="feedback"></div>

            <div class="button-group">
                <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()" style="display: none;">Submit</button>
                <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" style="display: none;">Next</button>
                <button class="btn btn-secondary" onclick="goHome()">Menu</button>
            </div>
        </div>

        <!-- Results Screen -->
        <div class="game-section" id="resultsScreen">

                <div class="celebration-emoji">🎉</div>
                <h2>Quiz Complete!</h2>

                <p style="margin-bottom: 20px; font-size: 1.05em; color: #666;">
                    Correct: <strong id="correctCount">0</strong> / <strong id="totalCount">0</strong>
                </p>
                <p class="info-text" id="performanceText"></p>
                <button class="home-btn" onclick="goHome()">Back to Menu</button>
            </div>
        </div>
    </div>

    <script>
        // Audio Functions
        let soundEnabled = true;

        function playSound(type) {
            if (!soundEnabled) return;

            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            if (type === 'correct') {
                oscillator.frequency.value = 800;
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.2);
            } else if (type === 'incorrect') {
                oscillator.frequency.value = 400;
                gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.3);
            } else if (type === 'click') {
                oscillator.frequency.value = 600;
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.1);
            }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('soundToggle');
            btn.textContent = soundEnabled ? '🔊' : '🔇';
            btn.classList.toggle('muted', !soundEnabled);
            playSound('click');
        }

        function startGame(type) {
            state.gameType = type;

            state.currentQ = 0;
            state.score = 0;
            state.streak = 0;
            state.totalAnswered = 0;
            state.questions = gameData[type][state.difficulty];
            loadQuestion();
            showSection('gameScreen');
            playSound('click');
        }

        function setDifficulty(diff) {
            state.difficulty = diff;
            state.currentQ = 0;
            state.questions = gameData[state.gameType][diff];
            document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadQuestion();
            playSound('click');
        }

        function loadQuestion() {
            state.selectedAnswer = null;
            state.answered = false;
            const q = state.questions[state.currentQ];
            document.getElementById('question').textContent = q.q;
            document.getElementById('questionNum').textContent = state.currentQ + 1;
            document.getElementById('totalQuestions').textContent = state.questions.length;

            let progressPct = ((state.currentQ + 1) / state.questions.length) * 100;
            document.getElementById('progressFill').style.width = progressPct + '%';

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            q.opts.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = opt;
                div.onclick = () => selectOption(i);
                optionsDiv.appendChild(div);
            });

            document.getElementById('feedback').classList.remove('show');
            document.getElementById('submitBtn').style.display = 'block';
            document.getElementById('nextBtn').style.display = 'none';
        }

        function selectOption(idx) {
            if (state.answered) return;
            state.selectedAnswer = idx;
            playSound('click');
            document.querySelectorAll('.option').forEach((opt, i) => {
                opt.classList.toggle('selected', i === idx);
            });
        }

        function submitAnswer() {
            if (state.selectedAnswer === null) return;
            state.answered = true;
            const q = state.questions[state.currentQ];
            const correct = state.selectedAnswer === q.ans;

            document.querySelectorAll('.option').forEach((opt, i) => {
                if (i === q.ans) {
                    opt.classList.add('correct');
                } else if (i === state.selectedAnswer && !correct) {
                    opt.classList.add('incorrect');
                }
                opt.style.pointerEvents = 'none';
            });

            const feedback = document.getElementById('feedback');
            if (correct) {
                state.score += 10;
                state.streak += 1;
                feedback.textContent = '✅ Correct! Great job!';
                feedback.classList.add('correct');
                playSound('correct');
            } else {
                state.streak = 0;
                feedback.textContent = '❌ Incorrect. Try the next one!';
                feedback.classList.add('incorrect');
                playSound('incorrect');
            }
            feedback.classList.add('show');

            state.totalAnswered += 1;
            updateStats();
            saveProgress();

            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'block';
        }

        function nextQuestion() {
            state.currentQ += 1;
            if (state.currentQ < state.questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function updateStats() {
            document.getElementById('score').textContent = state.score;
            document.getElementById('streak').textContent = state.streak;
            document.getElementById('total').textContent = state.totalAnswered;
        }

        function showResults() {
            const percentage = Math.round((state.score / (state.questions.length * 10)) * 100);
            document.getElementById('finalScore').textContent = percentage;
            document.getElementById('correctCount').textContent = state.score / 10;
            document.getElementById('totalCount').textContent = state.questions.length;

            let performanceText = '';
            if (percentage >= 90) performanceText = '🌟 Outstanding performance!';
            else if (percentage >= 75) performanceText = '⭐ Great job!';
            else if (percentage >= 60) performanceText = '👍 Good effort!';
            else performanceText = '📚 Keep practicing!';

            document.getElementById('performanceText').textContent = performanceText;
            showSection('resultsScreen');
        }

            showSection('menu');

            // Progress data ready for Firebase integration
            const progressData = {

                difficulty: state.difficulty,
                score: state.score,
                totalAnswered: state.totalAnswered,
                timestamp: new Date().toISOString()
            };
        }

        </style>
<style>
    /* 1. NEON GALAXY BACKGROUND */
    body {
        background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%) !important;
        background-attachment: fixed !important;
        color: #fff !important;
    }

    /* 2. READABLE ANSWER OPTIONS (The Fix) */
    .option {
        background: #1a1a2e !important; /* Dark solid background */
        border: 2px solid #00f2ff !important; /* Bright cyan border */
        color: #00f2ff !important; /* Bright cyan text */
        font-weight: bold !important;
        margin-bottom: 10px !important;
        box-shadow: 0 0 10px rgba(0, 242, 255, 0.1) !important;
    }

    .option:hover {
        background: #252545 !important;
        box-shadow: 0 0 20px #00f2ff !important;
    }

    /* Selected, Correct, and Incorrect states */
    .option.selected {
        background: #7000ff !important;
        color: white !important;
        border-color: white !important;
    }

    .option.correct {
        background: #00ff88 !important;
        color: #001a0a !important;
        border-color: #fff !important;
    }

    .option.incorrect {
        background: #ff0055 !important;
        color: white !important;
        border-color: #fff !important;
    }

    /* 3. EMOJI FEEDBACK STYLES */
    #emoji-reaction-container {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-top: 15px;
        height: 70px;
    }

    .reaction-emoji {
        font-size: 50px;
        display: none;
    }

    @keyframes happyDance {
        0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
        25% { transform: translateY(-25px) rotate(15deg) scale(1.1); }
        75% { transform: translateY(-25px) rotate(-15deg) scale(1.1); }
    }

    @keyframes sorrowSway {
        0%, 100% { transform: translateY(0) scale(1); filter: grayscale(0); }
        50% { transform: translateY(15px) scale(0.9); filter: grayscale(0.8); }
    }

    .emoji-happy { display: inline-block; animation: happyDance 0.5s infinite; }
    .emoji-sad { display: inline-block; animation: sorrowSway 1.5s infinite; }

    /* 4. LAYOUT ADJUSTMENTS */
    .container {
        background: rgba(10, 10, 20, 0.95) !important;
        border: 3px solid #00f2ff !important;
        box-shadow: 0 0 30px rgba(0, 242, 255, 0.3) !important;
    }

    .header h1 { color: #fff !important; text-shadow: 0 0 15px #00f2ff !important; }
    
    .star { position: fixed; background: white; border-radius: 50%; opacity: 0.5; z-index: -1; animation: twinkle 3s infinite; }
    @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }
</style>

<script>
    (function() {
        // Add Emoji Container
        const feedbackDiv = document.getElementById('feedback');
        const reactionWrapper = document.createElement('div');
        reactionWrapper.id = 'emoji-reaction-container';
        reactionWrapper.innerHTML = `<span id="e1" class="reaction-emoji"></span><span id="e2" class="reaction-emoji"></span>`;
        feedbackDiv.after(reactionWrapper); // Place it right under feedback

        // Create background stars
        for (let i = 0; i < 60; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = Math.random() * 3 + 'px';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(star);
        }

        // Logic for Answer Feedback
        const oldSubmit = window.submitAnswer;
        window.submitAnswer = function() {
            oldSubmit.apply(this, arguments);
            const e1 = document.getElementById('e1');
            const e2 = document.getElementById('e2');
            e1.style.display = 'inline-block';
            e2.style.display = 'inline-block';

            if (feedbackDiv.classList.contains('correct')) {
                e1.innerText = '🤩'; e2.innerText = '🎉';
                e1.className = 'reaction-emoji emoji-happy'; e2.className = 'reaction-emoji emoji-happy';
            } else {
                e1.innerText = '🥺'; e2.innerText = '💧';
                e1.className = 'reaction-emoji emoji-sad'; e2.className = 'reaction-emoji emoji-sad';
            }
        };

        const oldNext = window.nextQuestion;
        window.nextQuestion = function() {
            document.getElementById('e1').style.display = 'none';
            document.getElementById('e2').style.display = 'none';
            oldNext.apply(this, arguments);
        };
    })();
</script>
<script src="bhava-tech-all.js"></script>
</body>
</html>
