<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prism Redirect</title>
<style>
    :root {
        --bg-color: #0f172a;
        --panel-bg: #1e293b;
        --text-color: #f8fafc;
        --laser-color: #38bdf8;
        --laser-glow: rgba(56, 189, 248, 0.6);
        --mirror-color: #94a3b8;
        --target-color: #22c55e;
        --block-color: #334155;
        --accent: #6366f1;
        --star-color: #fbbf24;
    }

    * { box-sizing: border-box; user-select: none; }

    body {
        margin: 0; padding: 0;
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex; flex-direction: column;
        align-items: center; justify-content: flex-start;
        min-height: 100vh; overflow-y: auto; padding: 20px 10px;
    }

    /* ── THEME SELECTOR ── */
    #theme-bar {
        display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; justify-content: center;
    }
    .theme-btn {
        padding: 6px 14px; border-radius: 20px; border: 2px solid transparent;
        cursor: pointer; font-weight: 700; font-size: 0.82rem; transition: all 0.2s;
    }
    .theme-btn.active { border-color: white; transform: scale(1.08); }

    /* ── SCORE / STARS HUD ── */
    #game-container {
        position: relative;
        background: var(--panel-bg);
        border-radius: 16px; padding: 20px;
        box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5), 0 8px 10px -6px rgba(0,0,0,0.5);
        display: flex; flex-direction: column; align-items: center;
        max-width: 98vw;
    }

    #hud {
        width: 100%; display: flex; justify-content: space-between;
        align-items: center; margin-bottom: 12px; padding: 0 4px;
        flex-wrap: wrap; gap: 8px;
    }
    .hud-text { font-size: 1.3rem; font-weight: 700; letter-spacing: 1px; }

    #score-display { font-size: 1.3rem; font-weight: 700; color: var(--star-color); }
    #moves-display { font-size: 1rem; font-weight: 600; color: #94a3b8; }

    /* Star rating row */
    #star-row { display: flex; gap: 6px; align-items: center; margin-bottom: 10px; }
    .star { font-size: 2rem; transition: transform 0.3s; opacity: 0.25; }
    .star.lit { opacity: 1; animation: starPop 0.4s ease; }
    @keyframes starPop { 0%{transform:scale(0.5)} 60%{transform:scale(1.3)} 100%{transform:scale(1)} }

    /* Progress bar */
    #progress-wrap { width: 100%; background: #334155; border-radius: 8px; height: 8px; margin-bottom: 14px; }
    #progress-bar { height: 8px; border-radius: 8px; background: var(--accent); transition: width 0.5s ease; width: 0%; }

    button {
        background: var(--accent); color: white; border: none;
        padding: 9px 18px; border-radius: 8px; font-size: 0.95rem;
        font-weight: bold; cursor: pointer; transition: transform 0.1s, background 0.2s;
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
    }
    button:hover { background: #4f46e5; }
    button:active { transform: scale(0.95); }

    #board {
        position: relative;
        background: #0f172a;
        border: 2px solid #334155;
        border-radius: 8px;
        display: grid; gap: 2px; padding: 2px;
    }
    canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 10; }

    .cell {
        width: 60px; height: 60px;
        background: #1e293b; border-radius: 4px;
        display: flex; justify-content: center; align-items: center;
        cursor: pointer; transition: background 0.2s; position: relative;
    }
    .cell:hover { background: #334155; }

    .emitter {
        width: 30px; height: 30px;
        background: var(--laser-color);
        border-radius: 50%;
        box-shadow: 0 0 15px var(--laser-color);
        position: relative;
    }
    .emitter::after {
        content: ''; position: absolute;
        width: 15px; height: 4px; background: white;
        top: 13px; left: 15px; border-radius: 2px;
    }

    .target {
        width: 40px; height: 40px; background: transparent;
        border: 4px solid var(--target-color); border-radius: 50%;
        box-shadow: inset 0 0 10px var(--target-color), 0 0 10px var(--target-color);
        transition: all 0.3s ease;
    }
    .target.active {
        background: var(--target-color); transform: scale(1.1);
        box-shadow: inset 0 0 20px #fff, 0 0 30px var(--target-color);
    }

    .block { width: 100%; height: 100%; background: var(--block-color); border-radius: 4px; cursor: not-allowed; }

    .mirror {
        width: 80%; height: 6px; background: var(--mirror-color);
        border-radius: 3px; box-shadow: 0 0 5px rgba(255,255,255,0.5);
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* mirror click feedback */
    .cell.mirror-clicked { animation: mirrorBounce 0.3s ease; }
    @keyframes mirrorBounce { 0%{transform:scale(1)} 50%{transform:scale(0.88)} 100%{transform:scale(1)} }

    /* ── MODAL ── */
    #modal-overlay {
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(15,23,42,0.92);
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        z-index: 20; opacity: 0; pointer-events: none;
        transition: opacity 0.4s ease; border-radius: 16px;
    }
    #modal-overlay.visible { opacity: 1; pointer-events: all; }

    .modal-title { font-size: 2.5rem; color: var(--target-color); margin-bottom: 10px; text-align: center; text-shadow: 0 0 20px rgba(34,197,94,0.6); }
    .modal-score { font-size: 1.5rem; color: var(--star-color); margin-bottom: 6px; }
    .modal-stars { font-size: 2.5rem; margin-bottom: 20px; letter-spacing: 6px; }
    .modal-badge { font-size: 1rem; color: #94a3b8; margin-bottom: 20px; }

    p.instructions {
        max-width: 440px; text-align: center;
        color: #94a3b8; line-height: 1.5; margin-top: 16px; font-size: 0.88rem;
    }

    /* ── FLOATING SCORE POP ── */
    .score-pop {
        position: absolute; pointer-events: none;
        font-size: 1.8rem; font-weight: 900;
        color: var(--star-color); text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        z-index: 30; animation: scoreFly 1.2s ease forwards;
    }
    @keyframes scoreFly {
        0%   { opacity: 1; transform: translateY(0) scale(1); }
        100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
    }

    /* ── THEME: JUNGLE ── */
    body.jungle { background: #0d2b0d; }
    body.jungle #game-container { background: #1a3d1a; }
    body.jungle #board { background: #0d2b0d; border-color: #2d6a2d; }
    body.jungle .cell { background: #1a3d1a; }
    body.jungle .cell:hover { background: #2a5a2a; }
    body.jungle :root { --accent: #16a34a; --target-color: #4ade80; --laser-color: #86efac; }
    body.jungle .emitter { background: #86efac; box-shadow: 0 0 15px #86efac; }
    body.jungle .target { border-color: #4ade80; box-shadow: inset 0 0 10px #4ade80, 0 0 10px #4ade80; }
    body.jungle .block { background: #3b5e2b; }

    /* ── THEME: OCEAN ── */
    body.ocean { background: #0c1a3a; }
    body.ocean #game-container { background: #0f2952; }
    body.ocean #board { background: #0c1a3a; border-color: #1e4080; }
    body.ocean .cell { background: #0f2952; }
    body.ocean .cell:hover { background: #1a3d70; }
    body.ocean .emitter { background: #60a5fa; box-shadow: 0 0 15px #60a5fa; }
    body.ocean .target { border-color: #2dd4bf; box-shadow: inset 0 0 10px #2dd4bf, 0 0 10px #2dd4bf; }
    body.ocean .block { background: #1e3a5f; }

    /* ── THEME: FIRE ── */
    body.fire { background: #1a0800; }
    body.fire #game-container { background: #2d1000; }
    body.fire #board { background: #1a0800; border-color: #7c2d12; }
    body.fire .cell { background: #2d1000; }
    body.fire .cell:hover { background: #431800; }
    body.fire .emitter { background: #fb923c; box-shadow: 0 0 15px #fb923c; }
    body.fire .target { border-color: #f97316; box-shadow: inset 0 0 10px #f97316, 0 0 10px #f97316; }
    body.fire .block { background: #431800; }

    /* ── THEME: GALAXY ── */
    body.galaxy { background: #050011; }
    body.galaxy #game-container { background: #0d0026; }
    body.galaxy #board { background: #050011; border-color: #5b21b6; }
    body.galaxy .cell { background: #0d0026; }
    body.galaxy .cell:hover { background: #180040; }
    body.galaxy .emitter { background: #c084fc; box-shadow: 0 0 15px #c084fc; }
    body.galaxy .target { border-color: #e879f9; box-shadow: inset 0 0 10px #e879f9, 0 0 10px #e879f9; }
    body.galaxy .block { background: #1a004d; }

    /* ── THEME: CANDY ── */
    body.candy { background: #fff0f6; }
    body.candy #game-container { background: #ffe4f0; }
    body.candy #board { background: #fff0f6; border-color: #f9a8d4; }
    body.candy .cell { background: #fff0f6; }
    body.candy .cell:hover { background: #fce7f3; }
    body.candy .emitter { background: #ec4899; box-shadow: 0 0 15px #ec4899; }
    body.candy .target { border-color: #a21caf; box-shadow: inset 0 0 10px #a21caf, 0 0 10px #a21caf; }
    body.candy .block { background: #fbcfe8; }
    body.candy .hud-text, body.candy .hud-text * { color: #831843; }
    body.candy p.instructions { color: #9d174d; }

    /* ── BHAVA MENU ── */
    .bv-menu-btn {
        position: fixed; top: 14px; right: 16px; z-index: 9999;
        background: #3b5bdb; color: white; border: none;
        border-radius: 8px; padding: 8px 14px;
        font-size: 20px; cursor: pointer;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .bv-overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(0,0,0,0.45); z-index: 10000;
        justify-content: center; align-items: center;
    }
    .bv-overlay.active { display: flex; }
    .bv-box {
        background: white; border-radius: 14px;
        padding: 24px; width: 270px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.25);
        animation: bvFadeIn 0.2s ease;
    }
    @keyframes bvFadeIn { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }
    .bv-box h3 { text-align: center; margin: 0 0 16px; color: #333; font-size: 18px; }
    .bv-box a {
        display: block; padding: 13px 0; border-bottom: 1px solid #eee;
        color: #333; text-decoration: none; font-size: 16px; cursor: pointer;
    }
    .bv-box a:last-child { border-bottom: none; color: #e53; }
    .bv-box a:hover { color: #3b5bdb; }

</style>
</head>
<body>

<!-- Theme Selector -->
<div id="theme-bar">
    <button class="theme-btn active" style="background:#1e293b;color:#f8fafc;" onclick="setTheme('space','this')">🌌 Space</button>
    <button class="theme-btn" style="background:#1a3d1a;color:#4ade80;" onclick="setTheme('jungle','this')">🌿 Jungle</button>
    <button class="theme-btn" style="background:#0f2952;color:#60a5fa;" onclick="setTheme('ocean','this')">🌊 Ocean</button>
    <button class="theme-btn" style="background:#2d1000;color:#fb923c;" onclick="setTheme('fire','this')">🔥 Fire</button>
    <button class="theme-btn" style="background:#0d0026;color:#c084fc;" onclick="setTheme('galaxy','this')">🔮 Galaxy</button>
    <button class="theme-btn" style="background:#ffe4f0;color:#ec4899;" onclick="setTheme('candy','this')">🍭 Candy</button>
</div>

<div id="game-container">
    <div id="hud">
        <div class="hud-text" id="level-display">LEVEL 1</div>
        <div id="score-display">⭐ 0 pts</div>
        <div id="moves-display">Moves: 0</div>
        <button onclick="resetCurrentLevel()">🔄 RESET</button>

    </p>

        <div class="modal-title" id="modal-title">✅ TARGET HIT!</div>

        <div class="modal-badge" id="modal-badge">🏆 Perfect Solve!</div>
        <button id="next-level-btn" onclick="nextLevel()">➡️ NEXT LEVEL</button>

</div>

<script>
/* =====================================================
   SOUND ENGINE — Web Audio API (no external files)
   ===================================================== */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function getAudio() {
    if (!audioCtx) audioCtx = new AudioCtx();
    return audioCtx;
}

function playTone(freq, type='sine', duration=0.15, vol=0.3, delay=0) {
    try {
        const ac = getAudio();
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain); gain.connect(ac.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ac.currentTime + delay);
        gain.gain.setValueAtTime(vol, ac.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + duration);
        osc.start(ac.currentTime + delay);
        osc.stop(ac.currentTime + delay + duration + 0.05);
    } catch(e) {}
}

function soundMirrorClick() {
    playTone(440, 'triangle', 0.12, 0.25);
    playTone(550, 'triangle', 0.1, 0.15, 0.08);
}

function soundLaserHum() {
    playTone(180, 'sawtooth', 0.18, 0.08);
}

function soundSuccess() {
    // Ascending triumphant arpeggio
    const notes = [523, 659, 784, 1047];
    notes.forEach((f, i) => playTone(f, 'sine', 0.3, 0.35, i * 0.12));
}

function soundPerfect() {
    // Extra sparkle for perfect/3-star
    const notes = [523, 659, 784, 1047, 1319, 1568];
    notes.forEach((f, i) => playTone(f, 'sine', 0.35, 0.4, i * 0.1));
    setTimeout(() => playTone(2093, 'sine', 0.5, 0.5), 650);
}

function soundAllLevels() {
    const notes = [784, 988, 1175, 1319, 1568, 1976];
    notes.forEach((f, i) => playTone(f, 'sine', 0.5, 0.5, i * 0.15));
}

function soundClick() { playTone(300, 'square', 0.06, 0.12); }

/* =====================================================
   CONSTANTS & LEVELS
   ===================================================== */
const CELL_SIZE = 60;
const GRID_GAP  = 2;
const TYPES = { EMPTY:0, EMITTER:1, TARGET:2, MIRROR:3, BLOCK:4 };
const DIRS  = { UP:0, RIGHT:1, DOWN:2, LEFT:3 };
const VECTORS = {
    [DIRS.UP]:    {x:0,  y:-1},
    [DIRS.RIGHT]: {x:1,  y:0},
    [DIRS.DOWN]:  {x:0,  y:1},
    [DIRS.LEFT]:  {x:-1, y:0}
};

// Par moves per level — determines star rating
const levels = [
    // 1 – Tutorial
    { cols:5, rows:5, par:1,
      grid:[
        {t:1,d:1},{t:0},{t:3,a:45},{t:0},{t:0},
        {t:0},{t:0},{t:0},{t:0},{t:0},
        {t:0},{t:0},{t:3,a:135},{t:0},{t:2},
        {t:0},{t:0},{t:0},{t:0},{t:0},
        {t:0},{t:0},{t:0},{t:0},{t:0}
      ]},
    // 2 – Block dodge
    { cols:6, rows:6, par:2,
      grid:[
        {t:0},{t:0},{t:0},{t:4},{t:0},{t:0},
        {t:1,d:2},{t:0},{t:3,a:135},{t:0},{t:3,a:45},{t:2},
        {t:0},{t:0},{t:0},{t:0},{t:0},{t:0},
        {t:3,a:45},{t:0},{t:3,a:45},{t:4},{t:0},{t:0},
        {t:0},{t:0},{t:0},{t:0},{t:0},{t:0},
        {t:0},{t:0},{t:0},{t:0},{t:0},{t:0}
      ]},
    // 3 – Maze
    { cols:7, rows:7, par:3,
      grid:[
        {t:0},{t:0},{t:4},{t:0},{t:0},{t:0},{t:2},
        {t:0},{t:3,a:45},{t:0},{t:3,a:135},{t:0},{t:3,a:45},{t:0},
        {t:0},{t:0},{t:4},{t:0},{t:4},{t:0},{t:0},
        {t:1,d:1},{t:0},{t:3,a:135},{t:0},{t:3,a:45},{t:0},{t:0},
        {t:0},{t:0},{t:0},{t:0},{t:0},{t:0},{t:0},
        {t:0},{t:4},{t:0},{t:4},{t:0},{t:0},{t:0},
        {t:0},{t:0},{t:0},{t:0},{t:0},{t:0},{t:0}
      ]},
    // 4 – New: Cross fire
    { cols:6, rows:6, par:2,
      grid:[
        {t:0},{t:0},{t:1,d:2},{t:0},{t:0},{t:0},
        {t:0},{t:4},{t:0},{t:4},{t:0},{t:0},
        {t:0},{t:0},{t:3,a:45},{t:0},{t:3,a:135},{t:0},
        {t:0},{t:4},{t:0},{t:4},{t:0},{t:0},
        {t:0},{t:0},{t:0},{t:0},{t:2},{t:0},
        {t:0},{t:0},{t:0},{t:0},{t:0},{t:0}
      ]},
    // 5 – New: Snake path
    { cols:7, rows:5, par:2,
      grid:[
        {t:1,d:1},{t:3,a:45},{t:0},{t:0},{t:0},{t:0},{t:0},
        {t:0},{t:0},{t:0},{t:4},{t:0},{t:0},{t:0},
        {t:0},{t:0},{t:3,a:135},{t:0},{t:3,a:45},{t:0},{t:0},
        {t:0},{t:4},{t:0},{t:0},{t:0},{t:0},{t:0},
        {t:0},{t:0},{t:0},{t:0},{t:3,a:135},{t:0},{t:2}
      ]},
    // 6 – New: Double bounce
    { cols:7, rows:7, par:3,
      grid:[
        {t:0},{t:0},{t:0},{t:0},{t:0},{t:0},{t:0},
        {t:0},{t:1,d:1},{t:0},{t:4},{t:0},{t:3,a:45},{t:0},
        {t:0},{t:0},{t:3,a:45},{t:0},{t:0},{t:0},{t:0},
        {t:0},{t:4},{t:0},{t:3,a:135},{t:0},{t:4},{t:0},
        {t:0},{t:0},{t:0},{t:0},{t:3,a:45},{t:0},{t:0},
        {t:0},{t:3,a:135},{t:0},{t:4},{t:0},{t:0},{t:2},
        {t:0},{t:0},{t:0},{t:0},{t:0},{t:0},{t:0}
      ]},
    // 7 – New: The Z
    { cols:6, rows:6, par:2,
      grid:[
        {t:1,d:1},{t:0},{t:0},{t:0},{t:3,a:45},{t:0},
        {t:0},{t:4},{t:0},{t:4},{t:0},{t:0},
        {t:0},{t:0},{t:3,a:135},{t:0},{t:0},{t:0},
        {t:0},{t:4},{t:0},{t:3,a:45},{t:4},{t:0},
        {t:0},{t:0},{t:0},{t:0},{t:0},{t:2},
        {t:0},{t:0},{t:0},{t:0},{t:0},{t:0}
      ]},
    // 8 – New: Corner shot
    { cols:8, rows:8, par:3,
      grid:[
        {t:1,d:2},{t:0},{t:0},{t:0},{t:0},{t:0},{t:0},{t:0},
        {t:0},{t:4},{t:0},{t:4},{t:0},{t:4},{t:0},{t:0},
        {t:0},{t:0},{t:3,a:45},{t:0},{t:3,a:45},{t:0},{t:3,a:135},{t:0},
        {t:0},{t:4},{t:0},{t:4},{t:0},{t:4},{t:0},{t:0},
        {t:0},{t:0},{t:3,a:135},{t:0},{t:3,a:135},{t:0},{t:3,a:45},{t:0},
        {t:0},{t:4},{t:0},{t:4},{t:0},{t:4},{t:0},{t:0},
        {t:0},{t:0},{t:0},{t:0},{t:0},{t:0},{t:3,a:135},{t:0},
        {t:0},{t:0},{t:0},{t:0},{t:0},{t:0},{t:0},{t:2}
      ]},
];

/* =====================================================
   GAME STATE
   ===================================================== */
let currentLevelIndex = 0;
let totalScore = 0;
let movesThisLevel = 0;
let gridData = [], cols = 0, rows = 0;
let laserPath = [], isSolved = false, animationFrameId;
let particles = [];
let currentTheme = 'space';

const boardEl       = document.getElementById('board');
const canvas        = document.getElementById('laser-canvas');
const ctx           = canvas.getContext('2d');
const levelDisplay  = document.getElementById('level-display');
const modal         = document.getElementById('modal-overlay');
const scoreDisplay  = document.getElementById('score-display');
const movesDisplay  = document.getElementById('moves-display');
const progressBar   = document.getElementById('progress-bar');

/* =====================================================
   THEME
   ===================================================== */
function setTheme(theme, btnEl) {
    soundClick();
    const themes = ['space','jungle','ocean','fire','galaxy','candy'];
    themes.forEach(t => document.body.classList.remove(t));
    if (theme !== 'space') document.body.classList.add(theme);
    currentTheme = theme;
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    // find clicked button
    document.querySelectorAll('.theme-btn').forEach(b => {
        if (b.getAttribute('onclick').includes("'"+theme+"'")) b.classList.add('active');
    });
}

/* =====================================================
   PARTICLES
   ===================================================== */
class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 + 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 1.0;
        this.decay = Math.random() * 0.02 + 0.02;
        this.size = Math.random() * 5 + 2;
        this.color = color || '#22c55e';
    }
    update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
    draw(ctx) {
        ctx.fillStyle = `rgba(${hexToRgb(this.color)},${this.life})`;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
    }
}

function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `${r},${g},${b}`;
}

const themeParticleColor = {
    space:'#22c55e', jungle:'#4ade80', ocean:'#2dd4bf',
    fire:'#fb923c', galaxy:'#e879f9', candy:'#ec4899'
};

/* =====================================================
   STAR RATING & SCORING
   ===================================================== */
function getStars(moves, par) {
    if (moves <= par)     return 3;
    if (moves <= par + 2) return 2;
    return 1;
}

function getPoints(stars, par, moves) {
    const base = 100;
    const bonus = Math.max(0, (par - moves + 1) * 30);
    return base * stars + bonus;
}

function showStars(n) {
    for (let i = 1; i <= 3; i++) {
        const el = document.getElementById('s'+i);
        el.classList.toggle('lit', i <= n);
    }
}

function spawnScorePop(text, px, py) {
    const pop = document.createElement('div');
    pop.className = 'score-pop';
    pop.innerText = text;
    pop.style.left = (boardEl.offsetLeft + px - 30) + 'px';
    pop.style.top  = (boardEl.offsetTop  + py - 20) + 'px';
    document.getElementById('game-container').appendChild(pop);
    setTimeout(() => pop.remove(), 1300);
}

/* =====================================================
   LEVEL LOADING
   ===================================================== */
function loadLevel(index) {
    if (index >= levels.length) {
        soundAllLevels();
        showWinScreen("🏆 ALL LEVELS COMPLETE! YOU WIN!");
        progressBar.style.width = '100%';
        return;
    }

    isSolved = false; particles = []; movesThisLevel = 0;
    const level = levels[index];
    cols = level.cols; rows = level.rows;
    gridData = JSON.parse(JSON.stringify(level.grid));

    boardEl.style.gridTemplateColumns = `repeat(${cols}, ${CELL_SIZE}px)`;
    boardEl.style.gridTemplateRows    = `repeat(${rows}, ${CELL_SIZE}px)`;
    canvas.width  = (cols * CELL_SIZE) + ((cols-1)*GRID_GAP) + 4;
    canvas.height = (rows * CELL_SIZE) + ((rows-1)*GRID_GAP) + 4;

    levelDisplay.innerText  = `LEVEL ${index+1}`;
    movesDisplay.innerText  = 'Moves: 0';
    scoreDisplay.innerText  = `⭐ ${totalScore} pts`;
    progressBar.style.width = `${((index) / levels.length) * 100}%`;

    showStars(0);
    modal.classList.remove('visible');
    buildDOMGrid();
    calculateLaser();
    startRenderLoop();
}

function buildDOMGrid() {
    boardEl.querySelectorAll('.cell').forEach(c => c.remove());

    gridData.forEach((cell, index) => {
        const div = document.createElement('div');
        div.className = 'cell';
        div.dataset.index = index;

        if (cell.t === TYPES.EMITTER) {
            const emitter = document.createElement('div');
            emitter.className = 'emitter';
            emitter.style.transform = `rotate(${cell.d * 90}deg)`;
            div.appendChild(emitter);
        }
        else if (cell.t === TYPES.TARGET) {
            const target = document.createElement('div');
            target.className = 'target';
            target.id = 'target-node';
            div.appendChild(target);
        }
        else if (cell.t === TYPES.MIRROR) {
            const mirror = document.createElement('div');
            mirror.className = 'mirror';
            mirror.style.transform = `rotate(${cell.a}deg)`;
            div.appendChild(mirror);

            div.addEventListener('click', () => {
                if (isSolved) return;
                soundMirrorClick();
                cell.a = (cell.a + 90) % 360;
                mirror.style.transform = `rotate(${cell.a}deg)`;
                movesThisLevel++;
                movesDisplay.innerText = `Moves: ${movesThisLevel}`;
                div.classList.add('mirror-clicked');
                setTimeout(() => div.classList.remove('mirror-clicked'), 300);
                calculateLaser();
            });
        }
        else if (cell.t === TYPES.BLOCK) {
            const block = document.createElement('div');
            block.className = 'block';
            div.appendChild(block);
        }

        boardEl.appendChild(div);
    });
}

/* =====================================================
   RAYCASTING
   ===================================================== */
function getCoord(index) { return { x: index % cols, y: Math.floor(index / cols) }; }
function getIndex(x, y)  { if (x<0||x>=cols||y<0||y>=rows) return -1; return y*cols+x; }
function getCenterPixel(x, y) {
    return {
        x: x*(CELL_SIZE+GRID_GAP) + (CELL_SIZE/2) + 2,
        y: y*(CELL_SIZE+GRID_GAP) + (CELL_SIZE/2) + 2
    };
}

function calculateLaser() {
    laserPath = [];
    let hitTarget = false;
    let eIndex = gridData.findIndex(c => c.t === TYPES.EMITTER);
    let currentPos = getCoord(eIndex);
    let currentDir = gridData[eIndex].d;
    laserPath.push(getCenterPixel(currentPos.x, currentPos.y));

    let steps = 0;
    while (steps < 150) {
        steps++;
        currentPos.x += VECTORS[currentDir].x;
        currentPos.y += VECTORS[currentDir].y;
        let nextIndex = getIndex(currentPos.x, currentPos.y);
        if (nextIndex === -1) { laserPath.push(getCenterPixel(currentPos.x, currentPos.y)); break; }
        let cell = gridData[nextIndex];
        let px = getCenterPixel(currentPos.x, currentPos.y);
        laserPath.push(px);
        if (cell.t === TYPES.BLOCK) { break; }
        else if (cell.t === TYPES.TARGET) { hitTarget = true; break; }
        else if (cell.t === TYPES.MIRROR) {
            if (cell.a === 45 || cell.a === 225) {
                if (currentDir===DIRS.RIGHT) currentDir=DIRS.UP;
                else if(currentDir===DIRS.DOWN)  currentDir=DIRS.LEFT;
                else if(currentDir===DIRS.LEFT)  currentDir=DIRS.DOWN;
                else if(currentDir===DIRS.UP)    currentDir=DIRS.RIGHT;
            } else {
                if (currentDir===DIRS.RIGHT) currentDir=DIRS.DOWN;
                else if(currentDir===DIRS.DOWN)  currentDir=DIRS.RIGHT;
                else if(currentDir===DIRS.LEFT)  currentDir=DIRS.UP;
                else if(currentDir===DIRS.UP)    currentDir=DIRS.LEFT;
            }
        }
    }
    handleGameState(hitTarget, currentPos);
}

function handleGameState(hitTarget, targetPos) {
    const targetDOM = document.getElementById('target-node');
    if (hitTarget && !isSolved) {
        isSolved = true;
        if (targetDOM) targetDOM.classList.add('active');
        soundLaserHum();

        const level = levels[currentLevelIndex];
        const stars = getStars(movesThisLevel, level.par);
        const pts   = getPoints(stars, level.par, movesThisLevel);
        totalScore += pts;

        showStars(stars);
        scoreDisplay.innerText = `⭐ ${totalScore} pts`;

        const px = getCenterPixel(targetPos.x, targetPos.y);
        const pColor = themeParticleColor[currentTheme] || '#22c55e';
        for (let i = 0; i < 50; i++) particles.push(new Particle(px.x, px.y, pColor));

        spawnScorePop(`+${pts}`, px.x, px.y);

        if (stars === 3) soundPerfect(); else soundSuccess();

        // Update modal
        document.getElementById('modal-title').innerText  = stars===3 ? '🌟 PERFECT SOLVE!' : '✅ TARGET HIT!';
        document.getElementById('modal-stars').innerText  = '⭐'.repeat(stars) + '☆'.repeat(3-stars);
        document.getElementById('modal-score').innerText  = `+${pts} Points  (Total: ${totalScore})`;
        const badges = ['','🥉 Nice Try!','🥈 Well Done!','🏆 Perfect!'];
        document.getElementById('modal-badge').innerText  = badges[stars];

        progressBar.style.width = `${((currentLevelIndex+1) / levels.length) * 100}%`;

        setTimeout(() => modal.classList.add('visible'), 900);
    } else if (!hitTarget) {
        if (targetDOM) targetDOM.classList.remove('active');
    }
}

/* =====================================================
   RENDER LOOP
   ===================================================== */
const laserColors = {
    space: {glow:'rgba(56,189,248,0.4)', core:'#ffffff'},
    jungle:{glow:'rgba(134,239,172,0.4)',core:'#ffffff'},
    ocean: {glow:'rgba(96,165,250,0.4)', core:'#e0f2fe'},
    fire:  {glow:'rgba(251,146,60,0.45)',core:'#fff7ed'},
    galaxy:{glow:'rgba(192,132,252,0.4)',core:'#fdf4ff'},
    candy: {glow:'rgba(236,72,153,0.4)', core:'#fff0f6'}
};

function startRenderLoop() {
    if (animationFrameId) cancelAnimationFrame(animationFrameId);
    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const lc = laserColors[currentTheme] || laserColors.space;
        if (laserPath.length > 1) {
            ctx.beginPath();
            ctx.moveTo(laserPath[0].x, laserPath[0].y);
            for (let i=1;i<laserPath.length;i++) ctx.lineTo(laserPath[i].x, laserPath[i].y);
            ctx.strokeStyle = lc.glow; ctx.lineWidth=10; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(laserPath[0].x, laserPath[0].y);
            for (let i=1;i<laserPath.length;i++) ctx.lineTo(laserPath[i].x, laserPath[i].y);
            ctx.strokeStyle = lc.core; ctx.lineWidth=3; ctx.stroke();
        }
        for (let i=particles.length-1;i>=0;i--) {
            let p=particles[i]; p.update(); p.draw(ctx);
            if(p.life<=0) particles.splice(i,1);
        }
        animationFrameId = requestAnimationFrame(render);
    }
    render();
}

/* =====================================================
   UTILITY
   ===================================================== */
function resetCurrentLevel() { soundClick(); loadLevel(currentLevelIndex); }
function nextLevel()         { soundClick(); currentLevelIndex++; loadLevel(currentLevelIndex); }
function showWinScreen(msg) {
    const btn=document.getElementById('next-level-btn');
    document.getElementById('modal-title').innerText = msg;
    document.getElementById('modal-stars').innerText = '🏆🏆🏆';
    document.getElementById('modal-score').innerText = `🎉 Final Score: ${totalScore} pts`;
    document.getElementById('modal-badge').innerText = '🌟 Amazing job!';
    btn.innerText = '🔄 PLAY AGAIN';
    btn.onclick = () => { totalScore=0; currentLevelIndex=0; loadLevel(0); btn.innerText='➡️ NEXT LEVEL'; btn.onclick=nextLevel; };
    modal.classList.add('visible');
}

window.onload = () => loadLevel(0);
</script>
