<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart Heroes</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#1a1a2e;overflow-x:hidden;min-height:100vh}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-20px)}60%{transform:translateY(-8px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes heartRise{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-110px) scale(.5);opacity:0}}
@keyframes confettiFall{0%{top:-12px;transform:rotate(0deg)}100%{top:110vh;transform:rotate(720deg)}}
@keyframes slideRight{from{transform:translateX(-60px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes popIn{0%{transform:scale(0);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}

.screen{display:none;min-height:100vh;width:100%;align-items:center;justify-content:center;flex-direction:column;padding:20px;text-align:center}
.screen.active{display:flex;animation:fadeUp .5s ease forwards}

/* INTRO */
#intro{background:linear-gradient(145deg,#4158d0 0%,#c850c0 60%,#ff6b9d 100%);position:relative;overflow:hidden}
.blob{position:absolute;border-radius:50%;background:rgba(255,255,255,.07);pointer-events:none}
.mascot{font-size:96px;animation:float 3s ease-in-out infinite;filter:drop-shadow(0 10px 20px rgba(0,0,0,.25));margin-bottom:16px}
.intro-title{font-size:clamp(38px,9vw,66px);font-weight:900;color:#fff;text-shadow:0 4px 18px rgba(0,0,0,.25);line-height:1.05;margin-bottom:10px}
.intro-sub{font-size:clamp(15px,3vw,20px);color:rgba(255,255,255,.82);margin-bottom:36px;max-width:380px}
.badges{display:flex;gap:14px;color:rgba(255,255,255,.8);font-size:14px;font-weight:700;margin-top:28px;flex-wrap:wrap;justify-content:center}
.badge{background:rgba(255,255,255,.18);padding:6px 16px;border-radius:30px;backdrop-filter:blur(4px)}

.btn-play{background:#fff;color:#7c3aed;font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;padding:16px 52px;border:none;border-radius:50px;cursor:pointer;box-shadow:0 8px 28px rgba(0,0,0,.22);transition:transform .2s,box-shadow .2s}
.btn-play:hover{transform:scale(1.06) translateY(-2px);box-shadow:0 14px 36px rgba(0,0,0,.3)}
.btn-play:active{transform:scale(.97)}

.fhearts{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.fh{position:absolute;bottom:-20px;animation:heartRise linear infinite}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(0,0,0,.35);backdrop-filter:blur(12px);padding:12px 20px;display:none;align-items:center;justify-content:space-between}
.hdots{display:flex;gap:8px}
.hdot{width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,.28);transition:all .3s}
.hdot.done{background:#ffd700}
.hdot.now{background:#fff;width:26px;border-radius:6px;animation:pulse 1s infinite}
.hud-score{color:#fff;font-weight:900;font-size:20px}

/* GAME */
#game{padding-top:80px;justify-content:flex-start}
#wrap{max-width:580px;width:100%;padding:0 16px 40px}

/* CARD */
.card{background:#fff;border-radius:28px;padding:26px 22px;box-shadow:0 18px 54px rgba(0,0,0,.28);animation:fadeUp .45s ease}
.clabel{font-size:11px;font-weight:800;letter-spacing:1.5px;color:rgba(255,255,255,.55);margin-bottom:14px;text-align:center;text-transform:uppercase}

/* scene */
.svis{border-radius:18px;padding:24px 16px;margin-bottom:18px;display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap;min-height:130px}
.cblk{display:flex;flex-direction:column;align-items:center;gap:8px}
.cemoji{font-size:clamp(50px,12vw,66px);filter:drop-shadow(0 4px 8px rgba(0,0,0,.15));animation:float 3s ease-in-out infinite}
.cemoji2{animation-delay:-1.5s}
.cname{background:#fff;border-radius:20px;padding:3px 12px;font-size:13px;font-weight:800;color:#444;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.sit{font-size:17px;font-weight:700;color:#222;margin-bottom:14px;line-height:1.5}
.yfeel{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:14px;padding:12px 18px;display:flex;align-items:center;gap:12px;margin-bottom:18px}
.yf-lbl{font-size:11px;opacity:.75;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.yf-txt{font-size:15px;font-weight:800}

/* detect */
.dq{font-size:clamp(16px,4vw,21px);font-weight:900;color:#222;margin-bottom:20px;line-height:1.35}
.emgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.emobtn{background:#f9f9f9;border:3px solid #eee;border-radius:18px;padding:16px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:7px;transition:all .2s;font-family:'Nunito',sans-serif}
.emobtn:hover{border-color:#764ba2;transform:scale(1.04);box-shadow:0 5px 16px rgba(118,75,162,.22)}
.emobtn .ee{font-size:38px}
.emobtn .el{font-size:14px;font-weight:800;color:#555}
.emobtn.correct{border-color:#00c853 !important;background:#e8f5e9;animation:bounce .55s}
.emobtn.wrong{border-color:#ff1744 !important;background:#ffebee;animation:shake .45s}

/* their reveal */
.treveal{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;border-radius:14px;padding:15px 18px;margin-bottom:18px;display:flex;align-items:center;gap:12px;animation:slideRight .5s ease}
.tr-lbl{font-size:11px;opacity:.75;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.tr-txt{font-size:15px;font-weight:800}

/* choice */
.chq{font-size:clamp(16px,3.5vw,20px);font-weight:900;color:#222;margin-bottom:16px}
.choices{display:flex;flex-direction:column;gap:11px}
.chbtn{background:#f9f9f9;border:3px solid #eee;border-radius:16px;padding:16px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;text-align:left;transition:all .2s;font-family:'Nunito',sans-serif;width:100%}
.chbtn:hover{border-color:#764ba2;transform:translateX(5px);box-shadow:0 5px 16px rgba(118,75,162,.18)}
.ci{font-size:28px;min-width:36px}
.ct{font-size:15px;font-weight:800;color:#333}

/* result */
.rvis{border-radius:18px;padding:22px;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:14px;min-height:110px}
.rfrom{font-size:52px}
.rarrow{font-size:28px;font-weight:900}
.rto{font-size:52px;animation:popIn .6s ease forwards}
.rmsg{font-size:16px;font-weight:700;color:#333;margin-bottom:14px;line-height:1.5}
.lesson{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:16px;padding:18px;margin-bottom:16px}
.l-lbl{font-size:11px;opacity:.75;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.l-txt{font-size:15px;font-weight:800;line-height:1.5}
.hrow{font-size:22px;margin-bottom:18px;display:flex;align-items:center;justify-content:center;gap:6px}

.btn-next{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-family:'Nunito',sans-serif;font-size:19px;font-weight:900;padding:15px 40px;border:none;border-radius:50px;cursor:pointer;box-shadow:0 8px 24px rgba(102,126,234,.4);transition:transform .2s;width:100%}
.btn-next:hover{transform:scale(1.04)}

/* feedback */
.fb{border-radius:14px;padding:14px 16px;text-align:center;margin-top:14px}
.fb.good{background:#e8f5e9}
.fb.bad{background:#fff3e0}
.fb-ico{font-size:28px;margin-bottom:6px}
.fb-hd{font-size:15px;font-weight:900}
.fb-sub{font-size:13px;color:#555;margin-top:4px}
.fb.good .fb-hd{color:#2e7d32}
.fb.bad .fb-hd{color:#e65100}

/* end */
#end{background:linear-gradient(145deg,#f093fb 0%,#f5576c 100%)}
.cert{background:#fff;border-radius:30px;padding:36px 28px;max-width:460px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.c-emoji{font-size:78px;animation:bounce 1.2s ease infinite;margin-bottom:12px}
.c-title{font-size:16px;font-weight:700;color:#888;margin-bottom:4px}
.c-rank{font-size:clamp(22px,6vw,30px);font-weight:900;color:#7c3aed;margin-bottom:6px;line-height:1.2}
.c-hearts{font-size:32px;margin-bottom:10px}
.c-score{font-size:18px;font-weight:800;color:#444;margin-bottom:18px}
.c-box{background:linear-gradient(135deg,rgba(102,126,234,.1),rgba(118,75,162,.1));border-radius:14px;padding:16px;margin-bottom:18px}
.c-box h3{font-size:14px;font-weight:800;color:#333;margin-bottom:6px}
.c-box p{font-size:14px;color:#555;line-height:1.6}
.c-msg{font-size:15px;color:#666;line-height:1.6;margin-bottom:22px}
.btn-replay{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-family:'Nunito',sans-serif;font-size:17px;font-weight:900;padding:14px 30px;border:none;border-radius:50px;cursor:pointer;box-shadow:0 6px 20px rgba(102,126,234,.4);transition:transform .2s;width:100%}
.btn-replay:hover{transform:scale(1.05)}

/* confetti */
.cp{position:fixed;top:-12px;pointer-events:none;z-index:999;animation:confettiFall linear forwards;border-radius:2px}

/* scene bg themes */
.bg1{background:linear-gradient(135deg,#a1c4fd 0%,#c2e9fb 100%)}
.bg2{background:linear-gradient(135deg,#d4fc79 0%,#96e6a1 100%)}
.bg3{background:linear-gradient(135deg,#fbc2eb 0%,#a6c1ee 100%)}
.bg4{background:linear-gradient(135deg,#ffecd2 0%,#fcb69f 100%)}
.bg5{background:linear-gradient(135deg,#a8edea 0%,#fed6e3 100%)}
</style>


  <!-- Bhava Game Menu - Auto Injected -->
  <style>
    .bv-menu-btn {
      position: fixed; top: 14px; right: 16px; z-index: 9999;
      background: #3b5bdb; color: white; border: none;
      border-radius: 8px; padding: 8px 14px;
      font-size: 20px; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .bv-overlay {

    }
    .bv-overlay.active { display: flex; }
    .bv-box {

    }
    @keyframes bvFadeIn {

    .bv-box a:hover { color: #3b5bdb; }
  </style>
  <!-- End Bhava Game Menu CSS -->

</head>
<body>

<!-- INTRO -->
<div class="screen active" id="intro">
  <div class="blob" style="width:340px;height:340px;top:-120px;left:-120px"></div>
  <div class="blob" style="width:220px;height:220px;bottom:-60px;right:-60px"></div>
  <div class="fhearts" id="fhearts"></div>
  <div class="mascot">&#129464;</div>
  <h1 class="intro-title">Heart<br>Heroes!</h1>
  <p class="intro-sub">A game that teaches you to understand other people's feelings &#128150;</p>
  <button class="btn-play" id="playBtn">&#9654; Play Now!</button>
  <div class="badges">
    <span class="badge">&#128105; Ages 7&ndash;15</span>
    <span class="badge">&#127918; 5 Stories</span>
    <span class="badge">&#10084;&#65039; Earn Hearts</span>
    <span class="badge">&#127942; Win a Certificate</span>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hdots" id="hdots"></div>
  <div class="hud-score" id="hscore">&#10084;&#65039; 0</div>
</div>

<!-- GAME -->
<div class="screen" id="game">
  <div id="wrap"><div id="gc"></div></div>
</div>

<!-- END -->
<div class="screen" id="end">
  <div class="cert" id="cert"></div>
</div>


<script>
var SC = [
  {
    bg:"bg1",
    title:"The Lunch Spill",
    icon:"&#127869;",
    situation:"Your classmate Maya drops her lunch tray. Food spills everywhere and everyone is watching!",
    yc:"&#129300;", yn:"You",
    tc:"&#128103;", tn:"Maya",
    yfeel:"You feel like laughing... it did look funny! &#128516;",
    dq:"How does Maya feel right now?",
    correct:1,
    emos:[
      {e:"&#128516;",l:"Super Happy"},
      {e:"&#128563;",l:"Embarrassed"},
      {e:"&#128526;",l:"Cool About It"},
      {e:"&#128564;",l:"Bored"}
    ],
    treveal:"Maya is totally embarrassed &#128563; — everyone is staring at her!",
    choices:[
      {e:"&#128518;",t:"Point and laugh out loud",good:false},
      {e:"&#129309;",t:"Go and help her pick it up",good:true},
      {e:"&#128584;",t:"Look away and ignore her",good:false}
    ],
    rgood:{f:"&#128563;",t:"&#128522;",m:"Maya smiles with huge relief. Your kindness changed her whole day!",h:5},
    rbad: {f:"&#128563;",t:"&#128546;",m:"Maya feels humiliated. She eats alone the rest of the week.",h:1},
    lesson:"When someone is embarrassed, your reaction can make it MUCH worse — or MUCH better!"
  },
  {
    bg:"bg2",
    title:"The Lonely Kid",
    icon:"&#127795;",
    situation:"New kid Arjun just moved here. At recess he stands alone by the fence. You are having fun with friends.",
    yc:"&#129300;", yn:"You",
    tc:"&#129333;", tn:"Arjun",
    yfeel:"You are already having SO much fun with your friends! &#127881;",
    dq:"How does Arjun feel standing by himself?",
    correct:2,
    emos:[
      {e:"&#128516;",l:"Happy Alone"},
      {e:"&#128544;",l:"Angry"},
      {e:"&#128532;",l:"Lonely &amp; Nervous"},
      {e:"&#128526;",l:"Doesn't Care"}
    ],
    treveal:"Arjun feels lonely and nervous &#128532; — he doesn't know anyone here!",
    choices:[
      {e:"&#128584;",t:"Keep playing — not your problem",good:false},
      {e:"&#129303;",t:"Walk over and invite him to join",good:true},
      {e:"&#128064;",t:"Stare at him but say nothing",good:false}
    ],
    rgood:{f:"&#128532;",t:"&#128513;",m:"Arjun's face lights up! He ends up being your best friend this year!",h:5},
    rbad: {f:"&#128532;",t:"&#128546;",m:"Arjun spends every recess alone. He dreads coming to school.",h:1},
    lesson:"Being happy yourself doesn't mean everyone else is happy too. One small invite can change someone's whole world!"
  },
  {
    bg:"bg3",
    title:"The Big Grade",
    icon:"&#128196;",
    situation:"You got a perfect score on the test! Your best friend Rohan studied hard but got a bad grade and is upset.",
    yc:"&#129300;", yn:"You",
    tc:"&#128102;", tn:"Rohan",
    yfeel:"You are SO excited about your perfect score! &#129321;",
    dq:"How does Rohan feel right now?",
    correct:0,
    emos:[
      {e:"&#128542;",l:"Sad &amp; Let Down"},
      {e:"&#129321;",l:"Excited Like You"},
      {e:"&#128516;",l:"Totally Fine"},
      {e:"&#128564;",l:"Doesn't Mind"}
    ],
    treveal:"Rohan is sad and disappointed &#128542; — he tried so hard but still failed.",
    choices:[
      {e:"&#127942;",t:"Shout — I got 100%! I am the BEST!",good:false},
      {e:"&#129309;",t:"Share quietly, then ask if he is okay",good:true},
      {e:"&#128247;",t:"Show everyone your test paper",good:false}
    ],
    rgood:{f:"&#128542;",t:"&#128578;",m:"Rohan feels seen and cared for. You even offer to study together next time!",h:5},
    rbad: {f:"&#128542;",t:"&#128546;",m:"Your celebration stings more than the bad grade ever did.",h:1},
    lesson:"Your excitement is real — and so is their sadness. Real friends care about BOTH feelings at the same time!"
  },
  {
    bg:"bg4",
    title:"The Broken Promise",
    icon:"&#127921;",
    situation:"You promised to meet your friend Priya after school. But then a more exciting plan came up!",
    yc:"&#129300;", yn:"You",
    tc:"&#128103;", tn:"Priya",
    yfeel:"You really want to go to the exciting new plan! &#127921;",
    dq:"How does Priya feel waiting for you?",
    correct:3,
    emos:[
      {e:"&#128516;",l:"Fine, No Problem"},
      {e:"&#128544;",l:"Super Furious"},
      {e:"&#128526;",l:"Doesn't Care"},
      {e:"&#129402;",l:"Hurt &amp; Waiting"}
    ],
    treveal:"Priya is waiting and feeling hurt &#129402; — she was really looking forward to this!",
    choices:[
      {e:"&#127939;",t:"Go to the fun plan without telling her",good:false},
      {e:"&#128241;",t:"Call her, explain, and apologise sincerely",good:true},
      {e:"&#128203;",t:"Send a tiny text: cant come",good:false}
    ],
    rgood:{f:"&#129402;",t:"&#128522;",m:"Priya appreciates your honesty. She understands and trusts you even MORE now!",h:5},
    rbad: {f:"&#129402;",t:"&#128545;",m:"Priya feels invisible and disrespected. She stops trusting you.",h:1},
    lesson:"Your excitement about a new plan does not erase their feelings of being let down. Honesty always heals!"
  },
  {
    bg:"bg5",
    title:"The Art Project",
    icon:"&#127912;",
    situation:"You and Leo worked on an art project together. The teacher LOVES it — but praises only YOU!",
    yc:"&#129300;", yn:"You",
    tc:"&#128102;", tn:"Leo",
    yfeel:"The praise feels amazing and you feel so proud! &#11088;",
    dq:"How does Leo feel when only you get the credit?",
    correct:2,
    emos:[
      {e:"&#129321;",l:"Excited Too!"},
      {e:"&#128564;",l:"Doesn't Matter"},
      {e:"&#128532;",l:"Invisible &amp; Left Out"},
      {e:"&#128516;",l:"Happy For You"}
    ],
    treveal:"Leo feels invisible and left out &#128532; — he worked just as hard as you!",
    choices:[
      {e:"&#128522;",t:"Accept all the praise and say nothing",good:false},
      {e:"&#129311;",t:"Say — Leo helped, this belongs to both of us!",good:true},
      {e:"&#129335;",t:"Shrug — it is probably not a big deal",good:false}
    ],
    rgood:{f:"&#128532;",t:"&#129303;",m:"Leo beams with pride! You become the kind of friend everyone wants to have!",h:5},
    rbad: {f:"&#128532;",t:"&#128542;",m:"Leo never feels truly seen. He stops wanting to work with you.",h:1},
    lesson:"Sharing credit costs you nothing — but means EVERYTHING to someone who worked hard alongside you!"
  }
];

var idx=0, score=0;

// ---- BOOT ----
document.getElementById("playBtn").addEventListener("click", startGame);
initHearts();

function initHearts(){
  var c=document.getElementById("fhearts");
  var emojis=["&#10084;","&#128150;","&#128149;","&#128151;","&#128147;","&#128157;"];
  for(var i=0;i<18;i++){
    var d=document.createElement("div");
    d.className="fh";
    d.innerHTML=emojis[i%emojis.length];
    d.style.left=(Math.random()*95)+"%";
    d.style.fontSize=(14+Math.random()*18)+"px";
    d.style.animationDuration=(4+Math.random()*6)+"s";
    d.style.animationDelay=(Math.random()*6)+"s";
    c.appendChild(d);
  }
}

function show(id){
  var screens=document.querySelectorAll(".screen");
  for(var i=0;i<screens.length;i++) screens[i].classList.remove("active");
  document.getElementById(id).classList.add("active");
}

function showHud(v){
  var h=document.getElementById("hud");
  h.style.display=v?"flex":"none";
  if(!v) return;
  var dots=document.getElementById("hdots");
  dots.innerHTML="";
  for(var i=0;i<SC.length;i++){
    var d=document.createElement("div");
    d.className="hdot"+(i<idx?" done":i===idx?" now":"");
    dots.appendChild(d);
  }
  document.getElementById("hscore").innerHTML="&#10084;&#65039; "+score;
}

var gbgs=["linear-gradient(145deg,#0f2027,#203a43,#2c5364)",
          "linear-gradient(145deg,#134e5e,#1a6b3a,#71b280)",
          "linear-gradient(145deg,#3a1c71,#8b1a4a,#d76d77)",
          "linear-gradient(145deg,#1a237e,#283593,#1565c0)",
          "linear-gradient(145deg,#0f0c29,#302b63,#24243e)"];

function setGbg(i){
  document.getElementById("game").style.background=gbgs[i]||gbgs[0];
}

function gc(html){
  document.getElementById("gc").innerHTML=html;
  window.scrollTo({top:0,behavior:"smooth"});
}

// ---- START ----
function startGame(){
  idx=0; score=0;
  show("game");
  showHud(true);
  setGbg(0);
  renderScene();
}

// ---- SCENE ----
function renderScene(){
  var s=SC[idx];
  var h='<div class="clabel">'+s.icon+' Story '+(idx+1)+' of '+SC.length+'</div>';
  h+='<div class="card">';
  h+='<div style="font-size:20px;font-weight:900;color:#222;margin-bottom:14px;">'+s.icon+' '+s.title+'</div>';
  h+='<div class="svis '+s.bg+'">';
  h+='<div class="cblk"><div class="cemoji">'+s.yc+'</div><div class="cname">'+s.yn+'</div></div>';
  h+='<div style="font-size:28px;color:rgba(255,255,255,.7)">&#128172;</div>';
  h+='<div class="cblk"><div class="cemoji cemoji2">'+s.tc+'</div><div class="cname">'+s.tn+'</div></div>';
  h+='</div>';
  h+='<div class="sit">'+s.situation+'</div>';
  h+='<div class="yfeel"><div style="font-size:30px">&#128519;</div><div><div class="yf-lbl">Your feeling</div><div class="yf-txt">'+s.yfeel+'</div></div></div>';
  h+='<button class="btn-next" onclick="renderDetect()">&#128269; But how does '+s.tn+' feel?</button>';
  h+='</div>';
  gc(h);
}

// ---- DETECT ----
function renderDetect(){
  var s=SC[idx];
  var h='<div class="clabel">&#128269; Feeling Detector &mdash; Round '+(idx+1)+'</div>';
  h+='<div class="card">';
  h+='<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:18px;">';
  h+='<div style="font-size:58px;animation:float 3s ease-in-out infinite">'+s.tc+'</div>';
  h+='<div style="text-align:left"><div style="font-size:13px;color:#888;font-weight:700">'+s.tn+'</div>';
  h+='<div style="font-size:17px;font-weight:900;color:#222">How do THEY feel?</div></div></div>';
  h+='<div class="dq">'+s.dq+'</div>';
  h+='<div class="emgrid" id="emgrid">';
  for(var i=0;i<s.emos.length;i++){
    h+='<button class="emobtn" data-idx="'+i+'" onclick="pickEmo('+i+')">';
    h+='<span class="ee">'+s.emos[i].e+'</span>';
    h+='<span class="el">'+s.emos[i].l+'</span>';
    h+='</button>';
  }
  h+='</div>';
  h+='<div id="dfb"></div>';
  h+='</div>';
  gc(h);
}

function pickEmo(i){
  var s=SC[idx];
  var ok=(i===s.correct);
  var btns=document.querySelectorAll(".emobtn");
  for(var j=0;j<btns.length;j++){
    btns[j].setAttribute("onclick","");
    btns[j].style.pointerEvents="none";
    if(j===s.correct) btns[j].classList.add("correct");
    else if(j===i && !ok) btns[j].classList.add("wrong");
  }
  if(ok){ score+=2; showHud(true); }
  var fb=document.getElementById("dfb");
  if(ok){
    fb.className="fb good";
    fb.innerHTML='<div class="fb-ico">&#127919;</div><div class="fb-hd">Great empathy! +2 &#10084;&#65039;</div><div class="fb-sub">You understood how they feel!</div>';
  } else {
    fb.className="fb bad";
    fb.innerHTML='<div class="fb-ico">&#128173;</div><div class="fb-hd">Think again next time!</div><div class="fb-sub">Right answer: '+s.emos[s.correct].e+' '+s.emos[s.correct].l+'</div>';
  }
  setTimeout(renderChoice, 1900);
}

// ---- CHOICE ----
function renderChoice(){
  var s=SC[idx];
  var h='<div class="clabel">&#9889; What Will You Do? &mdash; Round '+(idx+1)+'</div>';
  h+='<div class="card">';
  h+='<div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;">';
  h+='<div style="font-size:48px">'+s.yc+'</div><div style="font-size:20px;color:#aaa">+</div><div style="font-size:48px">'+s.tc+'</div></div>';
  h+='<div class="treveal"><div style="font-size:36px">'+s.emos[s.correct].e+'</div>';
  h+='<div><div class="tr-lbl">'+s.tn+' is feeling</div><div class="tr-txt">'+s.treveal+'</div></div></div>';
  h+='<div class="chq">Knowing this &mdash; what do you do?</div>';
  h+='<div class="choices">';
  for(var i=0;i<s.choices.length;i++){
    h+='<button class="chbtn" onclick="pickChoice('+i+')">';
    h+='<span class="ci">'+s.choices[i].e+'</span>';
    h+='<span class="ct">'+s.choices[i].t+'</span>';
    h+='</button>';
  }
  h+='</div></div>';
  gc(h);
}

function pickChoice(i){
  var s=SC[idx];
  var good=s.choices[i].good;
  if(good){ score+=3; showHud(true); spawnConfetti(28); }
  renderResult(good);
}

// ---- RESULT ----
function renderResult(good){
  var s=SC[idx];
  var r=good?s.rgood:s.rbad;
  var arrowCol=good?"#00c853":"#ff1744";
  var h='<div class="clabel">'+(good?"&#127775; Great Empathy!":"&#128148; Let us Learn...")+'</div>';
  h+='<div class="card">';
  h+='<div class="rvis '+s.bg+'">';
  h+='<span class="rfrom">'+r.f+'</span>';
  h+='<span class="rarrow" style="color:'+arrowCol+'">&#10132;</span>';
  h+='<span class="rto">'+r.t+'</span>';
  h+='</div>';
  h+='<div class="rmsg">'+r.m+'</div>';
  h+='<div class="lesson"><div class="l-lbl">&#128161; Empathy Lesson</div><div class="l-txt">'+s.lesson+'</div></div>';
  h+='<div class="hrow">'+(good?'<span>You earned</span><span>&#11088;&#11088;&#11088;</span>':'<span>You earned</span><span>&#11088;</span>')+'<span style="font-size:14px;color:#888">&nbsp;keep going!</span></div>';
  h+='<button class="btn-next" onclick="nextStory()">'+(idx+1<SC.length?"&#10145;&#65038; Next Story":"&#127942; See My Score!")+'</button>';
  h+='</div>';
  gc(h);
}

// ---- NEXT ----
function nextStory(){
  idx++;
  if(idx>=SC.length){ endGame(); return; }
  showHud(true); setGbg(idx); renderScene();
}

// ---- END ----
function endGame(){
  showHud(false);
  show("end");
  var max=SC.length*5;
  var pct=score/max;
  var rank,emoji,msg;
  if(pct>=.8){
    rank="Empathy Champion! &#127942;"; emoji="&#129489;&#8205;&#9792;&#65039;";
    msg="You have an amazing ability to feel what others feel. The world needs more hearts like yours!";
  } else if(pct>=.5){
    rank="Empathy Explorer! &#127775;"; emoji="&#129517;";
    msg="You are learning to see the world through other people's eyes. You are doing really well!";
  } else {
    rank="Empathy Learner! &#128150;"; emoji="&#127807;";
    msg="Every journey starts with a single step. Learning to care about others is the most important skill of all!";
  }
  var h="";
  h+='<div class="c-emoji">'+emoji+'</div>';
  h+='<div class="c-title">You are an</div>';
  h+='<div class="c-rank">'+rank+'</div>';
  var hearts="";
  var starCount=Math.max(1,Math.round(pct*5));
  for(var i=0;i<starCount;i++) hearts+="&#10084;&#65039;";
  h+='<div class="c-hearts">'+hearts+'</div>';
  h+='<div class="c-score">Score: '+score+' / '+max+' Hearts &#10084;&#65039;</div>';
  h+='<div class="c-box"><h3>&#127758; Always Remember:</h3><p>Everyone around you has feelings that matter — not just yours.<br>Being kind costs <strong>nothing</strong> but means <strong>everything</strong>.</p></div>';
  h+='<div class="c-msg">'+msg+'</div>';
  h+='<button class="btn-replay" onclick="startGame()">&#128260; Play Again</button>';
  document.getElementById("cert").innerHTML=h;
  spawnConfetti(55);
}

// ---- CONFETTI ----
function spawnConfetti(n){
  var cols=["#ff6b6b","#4ecdc4","#ffd700","#96ceb4","#c850c0","#45b7d1","#f093fb"];
  for(var i=0;i<n;i++){
    (function(delay){
      setTimeout(function(){
        var p=document.createElement("div");
        p.className="cp";
        p.style.left=Math.random()*100+"vw";
        p.style.width=(7+Math.random()*9)+"px";
        p.style.height=(7+Math.random()*9)+"px";
        p.style.background=cols[Math.floor(Math.random()*cols.length)];
        p.style.borderRadius=Math.random()>.5?"50%":"3px";
        p.style.animationDuration=(2.5+Math.random()*3)+"s";
        document.body.appendChild(p);
        setTimeout(function(){ if(p.parentNode) p.parentNode.removeChild(p); }, 5500);
      }, delay);
    })(i*55);
  }
}
</script>
