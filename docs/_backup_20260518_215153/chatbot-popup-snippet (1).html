<style id="bj-popup-styles">

/* ── No full-screen overlay — just a small card popup ── */
#bj-popup-overlay {
  display: none; /* hidden — no dark backdrop needed for small card */
}

/* ── Popup window — small 10% corner card, bottom-right ── */
#bj-popup-box {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: min(420px, 94vw);
  height: min(580px, 88vh);
  z-index: 9999;
  background: #0f110e;
  border-radius: 16px;
  border: 1px solid rgba(82,183,136,0.25);
  box-shadow: 0 24px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(82,183,136,0.1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform: scale(0.88) translateY(20px);
  transform-origin: bottom right;
  opacity: 0;
  transition: transform 0.4s cubic-bezier(.16,1,.3,1),
              opacity 0.4s cubic-bezier(.16,1,.3,1);
  pointer-events: none;
}
#bj-popup-box.bj-visible {
  transform: scale(1) translateY(0);
  opacity: 1;
  pointer-events: all;
}

/* ── Top bar ── */
#bj-popup-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: linear-gradient(90deg, #1a2e22, #16231b);
  border-bottom: 1px solid rgba(82,183,136,0.15);
  flex-shrink: 0;
}
#bj-popup-topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
#bj-popup-topbar-left img {
  width: 34px; height: 34px;
  border-radius: 8px;
  object-fit: contain;
}
#bj-popup-topbar-left .bj-title {
  font-family: 'Poppins', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  color: #e4e8e2;
}
#bj-popup-topbar-left .bj-sub {
  font-family: 'Poppins', sans-serif;
  font-size: 0.72rem;
  color: #52b788;
  margin-top: 1px;
}
#bj-popup-topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* Countdown ring */
#bj-countdown-wrap {
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: 'Poppins', sans-serif;
  font-size: 0.75rem;
  color: #888d85;
}
#bj-countdown-num {
  font-weight: 700;
  color: #f4a442;
  font-size: 0.9rem;
  min-width: 16px;
  text-align: center;
}
.bj-countdown-bar-bg {
  width: 80px; height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  overflow: hidden;
}
#bj-countdown-bar {
  height: 100%;
  background: linear-gradient(90deg, #52b788, #f4a442);
  border-radius: 4px;
  width: 100%;
  transition: width 1s linear;
}

/* Close button */
#bj-popup-close {
  width: 32px; height: 32px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50%;
  color: #e4e8e2;
  font-size: 15px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.15s;
  font-family: 'Poppins', sans-serif;
  flex-shrink: 0;
}
#bj-popup-close:hover {
  background: rgba(224,122,31,0.3);
  border-color: #e07a1f;
  transform: scale(1.1);
}

/* ── iFrame fills remaining space ── */
#bj-popup-box iframe {
  flex: 1;
  width: 100%;
  min-height: 0;
  border: none;
  display: block;
}

/* ── Mobile: stays compact, anchored bottom-right ── */
@media (max-width: 480px) {
  #bj-popup-box {
    bottom: 12px;
    right: 12px;
    left: 12px;
    width: auto;
    height: min(560px, 88vh);
    border-radius: 14px;
    transform-origin: bottom center;
  }
}

/* ── Pause animation while user hovers ── */
#bj-popup-box:hover #bj-countdown-bar {
  transition: none;
}
</style>

  POPUP HTML — paste just before </body>

<!-- Bhāvajālam Welcome Popup -->
<div id="bj-popup-overlay"></div>

<div id="bj-popup-box" role="dialog" aria-modal="true" aria-label="Bhāvajālam AI Assistant">

  <!-- Top bar -->
  <div id="bj-popup-topbar">
    <div id="bj-popup-topbar-left">
      <img src="assets/logo.png" alt="Bhāvajālam Logo" loading="lazy"/>
      <div>
        <div class="bj-title">Bhāva Assistant</div>
        <div class="bj-sub">🧠 Ask me anything about Bhāvajālam</div>
      </div>
    </div>
    <div id="bj-popup-topbar-right">
      <div id="bj-countdown-wrap">
        <span>Closes in</span>
        <span id="bj-countdown-num">15</span>
        <span>s</span>
        <div class="bj-countdown-bar-bg">
          <div id="bj-countdown-bar"></div>
        </div>
      </div>
      <button id="bj-popup-close" aria-label="Close popup">✕</button>
    </div>
  </div>

  <!-- Chatbot iframe -->
  <iframe
    src="bhaavajaalam-chatbot.html"
    title="Bhāvajālam AI Assistant"
    loading="lazy"
    allow="autoplay"
  ></iframe>

</div>

<script>
(function(){
  const DELAY    = 1200;   // ms after page load before popup appears
  const DURATION = 15;     // seconds before auto-close

  const overlay  = document.getElementById('bj-popup-overlay');
  const box      = document.getElementById('bj-popup-box');
  const closeBtn = document.getElementById('bj-popup-close');
  const numEl    = document.getElementById('bj-countdown-num');
  const barEl    = document.getElementById('bj-countdown-bar');

  let timer, countdownInterval, secondsLeft = DURATION;
  let userInteracted = false;

  // ── Open popup ──
  function openPopup() {
    overlay.classList.add('bj-visible');
    box.classList.add('bj-visible');
    startCountdown();
  }

  // ── Close popup ──
  function closePopup() {
    overlay.classList.remove('bj-visible');
    box.classList.remove('bj-visible');
    clearInterval(countdownInterval);
    clearTimeout(timer);
    // Remember closed this session — don't show again
    try { sessionStorage.setItem('bj_popup_closed','1'); } catch(e){}
  }

  // ── Countdown logic ──
  function startCountdown() {
    secondsLeft = DURATION;
    numEl.textContent = secondsLeft;
    barEl.style.width = '100%';

    // Trigger the bar shrink animation
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        barEl.style.transition = 'width '+DURATION+'s linear';
        barEl.style.width = '0%';
      });
    });

    countdownInterval = setInterval(function(){
      // Pause countdown while user is hovering inside the box
      if(box.matches(':hover')) return;

      secondsLeft--;
      numEl.textContent = secondsLeft;

      if(secondsLeft <= 0){
        clearInterval(countdownInterval);
        closePopup();
      }
    }, 1000);
  }

  // ── Close on button click ──
  closeBtn.addEventListener('click', closePopup);

  // ── Close on overlay click ──
  overlay.addEventListener('click', closePopup);

  // ── Close on Escape ──
  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape') closePopup();
  });

  // ── Pause countdown on hover — resume on leave ──
  box.addEventListener('mouseenter', function(){
    clearInterval(countdownInterval);
    barEl.style.transition = 'none'; // freeze bar
  });
  box.addEventListener('mouseleave', function(){
    // Resume countdown from where it left off
    barEl.style.transition = 'width '+secondsLeft+'s linear';
    barEl.style.width = '0%';
    countdownInterval = setInterval(function(){
      secondsLeft--;
      numEl.textContent = secondsLeft;
      if(secondsLeft <= 0){
        clearInterval(countdownInterval);
        closePopup();
      }
    },1000);
  });

  // ── Show popup after delay, unless already closed this session ──
  window.addEventListener('load', function(){
    try {
      if(sessionStorage.getItem('bj_popup_closed') === '1') return;
    } catch(e){}
    timer = setTimeout(openPopup, DELAY);
  });

})();
</script>
<!-- End Bhāvajālam Welcome Popup -->
