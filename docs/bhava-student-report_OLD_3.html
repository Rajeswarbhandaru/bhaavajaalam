<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title id="pageTitle">My Report — Bhāva Tech</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0814;--surface:#0f0e1a;--surface2:#161528;--border:rgba(255,255,255,.09);
      --text:#e2e8f0;--muted:#64748b;--faint:#334155;
      --primary:#818cf8;--teal:#67e8f9;--pink:#f472b6;--green:#34d399;
      --yellow:#fde68a;--radius:16px;
    }
    html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'Satoshi','Inter',sans-serif;
         min-height:100vh;padding:0}

    /* ── Top Nav ── */
    .top-nav{
      position:fixed;top:0;left:0;right:0;z-index:100;
      height:52px;display:flex;align-items:center;gap:10px;padding:0 20px;
      background:rgba(10,8,20,.9);backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
    }
    .top-nav button{
      display:inline-flex;align-items:center;gap:5px;padding:5px 14px;
      border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;
      border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);
      color:#94a3b8;font-family:inherit;transition:background .18s;
    }
    .top-nav button:hover{background:rgba(255,255,255,.12);color:#e2e8f0}
    .top-nav .title{
      flex:1;text-align:center;font-size:13px;font-weight:700;
      color:rgba(255,255,255,.35);letter-spacing:.08em;text-transform:uppercase;
    }
    .top-nav .print-btn{
      background:rgba(99,102,241,.18);border-color:rgba(129,140,248,.35);
      color:var(--primary);margin-left:auto;
    }
    .top-nav .print-btn:hover{background:rgba(99,102,241,.35)}

    /* ── Page wrapper ── */
    .page{max-width:680px;margin:0 auto;padding:72px 20px 60px}

    /* ── Student header ── */
    .student-header{
      background:linear-gradient(135deg,#0f0e1a,#1a1630);
      border:1px solid rgba(167,139,250,.2);border-radius:20px;
      padding:28px 24px;margin-bottom:24px;
      display:flex;align-items:center;gap:20px;
    }
    .student-avatar{
      width:60px;height:60px;border-radius:50%;
      background:linear-gradient(135deg,#6d28d9,#06b6d4);
      display:flex;align-items:center;justify-content:center;
      font-size:22px;font-weight:900;color:#fff;flex-shrink:0;
    }
    .student-info h1{font-size:20px;font-weight:800;color:var(--text);margin-bottom:4px}
    .student-info p{font-size:13px;color:var(--muted)}
    .student-badge{
      margin-left:auto;background:rgba(99,102,241,.12);
      border:1px solid rgba(129,140,248,.3);border-radius:999px;
      padding:5px 14px;font-size:11px;font-weight:700;
      color:var(--primary);white-space:nowrap;
    }

    /* ── Score cards ── */
    .score-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:24px}
    .score-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);padding:20px 14px;text-align:center;
    }
    .score-card .sc-label{
      font-size:10px;font-weight:700;letter-spacing:.12em;
      text-transform:uppercase;color:var(--muted);margin-bottom:10px;
    }
    .score-card .sc-value{
      font-size:36px;font-weight:900;font-variant-numeric:tabular-nums;
      line-height:1;margin-bottom:6px;
    }
    .score-card .sc-band{font-size:11px;color:var(--muted);font-weight:600}
    .sc-iq .sc-value{color:var(--primary)}
    .sc-eq .sc-value{color:var(--pink)}
    .sc-sq .sc-value{color:var(--green)}

    /* ── IQ Breakdown ── */
    .section-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);padding:20px;margin-bottom:16px;
    }
    .section-title{
      font-size:11px;font-weight:700;letter-spacing:.1em;
      text-transform:uppercase;color:var(--muted);margin-bottom:14px;
      display:flex;align-items:center;gap:8px;
    }
    .section-title::after{content:'';flex:1;height:1px;background:var(--border)}
    .breakdown-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .breakdown-item{
      display:flex;justify-content:space-between;align-items:center;
      padding:10px 14px;background:rgba(129,140,248,.06);
      border:1px solid rgba(129,140,248,.12);border-radius:10px;
    }
    .breakdown-item .bi-label{font-size:12px;color:#94a3b8;font-weight:600}
    .breakdown-item .bi-value{font-size:17px;font-weight:800;color:var(--primary);
      font-variant-numeric:tabular-nums}

    /* ── Progress bar ── */
    .progress-wrap{margin-top:10px}
    .progress-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .progress-row .pr-label{font-size:12px;color:#94a3b8;width:120px;flex-shrink:0}
    .progress-bar-bg{flex:1;height:6px;background:rgba(255,255,255,.06);
      border-radius:999px;overflow:hidden}
    .progress-bar-fill{height:100%;border-radius:999px;
      transition:width .8s cubic-bezier(.16,1,.3,1)}
    .progress-row .pr-val{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;
      width:32px;text-align:right;color:var(--text)}

    /* ── Sessions list ── */
    .session-row{
      display:flex;align-items:center;gap:10px;
      padding:10px 14px;background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.05);border-radius:10px;margin-bottom:8px;
    }
    .session-row .sr-game{font-size:13px;font-weight:600;color:#c4b5fd;flex:1;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .session-row .sr-score{font-size:13px;font-weight:800;color:var(--yellow);
      white-space:nowrap;font-variant-numeric:tabular-nums}
    .session-row .sr-date{font-size:11px;color:var(--muted);white-space:nowrap}
    .tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;
      border-radius:999px;margin-left:6px}
    .tag.done{background:rgba(52,211,153,.12);color:var(--green);
      border:1px solid rgba(52,211,153,.25)}
    .tag.pending{background:rgba(251,191,36,.08);color:#fbbf24;
      border:1px solid rgba(251,191,36,.2)}

    /* ── Not logged in state ── */
    .not-logged{
      text-align:center;padding:60px 24px;
      background:var(--surface);border:1px dashed rgba(255,255,255,.1);
      border-radius:20px;margin-top:20px;
    }
    .not-logged .nl-icon{font-size:48px;margin-bottom:16px}
    .not-logged h2{font-size:18px;color:var(--text);margin-bottom:8px}
    .not-logged p{font-size:14px;color:var(--muted);margin-bottom:24px}
    .btn-home{
      display:inline-flex;align-items:center;gap:8px;
      padding:12px 28px;border-radius:999px;font-size:14px;font-weight:700;
      background:linear-gradient(135deg,#6d28d9,#06b6d4);color:#fff;
      border:none;cursor:pointer;font-family:inherit;text-decoration:none;
    }

    /* ── Loading ── */
    .loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
    .spinner{
      width:28px;height:28px;border:2px solid rgba(129,140,248,.2);
      border-top-color:var(--primary);border-radius:50%;
      animation:spin .8s linear infinite;margin:0 auto 14px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Print styles ── */
    @media print{
      .top-nav,.print-btn{display:none!important}
      body{background:#fff;color:#000}
      .page{padding:0}
      .student-header,.section-card,.score-card{
        background:#f8f8f8!important;border-color:#ddd!important;
        -webkit-print-color-adjust:exact;print-color-adjust:exact;
      }
      .score-card .sc-value{-webkit-print-color-adjust:exact;print-color-adjust:exact}
      .page{max-width:100%}
    }

    /* ── Error ── */
    .error-box{
      text-align:center;padding:24px;background:rgba(161,44,123,.08);
      border:1px solid rgba(161,44,123,.25);border-radius:14px;
      color:#e879a6;font-size:13px;
    }

    @media(max-width:500px){
      .score-grid{grid-template-columns:1fr 1fr;gap:10px}
      .breakdown-grid{grid-template-columns:1fr}
      .student-header{flex-wrap:wrap}
      .student-badge{margin-left:0}
    }
  </style>
</head>
<body>

<!-- Top nav -->
<nav class="top-nav">
  <button onclick="goBack()">&#8592; Back</button>
  <button onclick="goHome()">&#127968; Home</button>
  <span class="title">My Report</span>
  <button class="print-btn" onclick="window.print()" title="Print or save as PDF">
    &#128438; Print / PDF
  </button>
</nav>

<!-- Page content -->
<div class="page" id="page-root">
  <div class="loading" id="loading-state">
    <div class="spinner"></div>
    Loading your report…
  </div>
</div>

<script>
(function () {
  'use strict';

  function goHome() { window.location.href='docs/index.html'; }
  function goBack() { window.history.length > 1 ? window.history.back() : goHome(); }
  window.goHome = goHome;
  window.goBack = goBack;

  // ── Resolve student ID from every possible source ────────────────────────
  function resolveStudentId() {
    // 1. URL param  ?sid=1  or  ?studentId=1
    var params = new URLSearchParams(window.location.search);
    var fromUrl = params.get('sid') || params.get('studentId') || params.get('id');
    if (fromUrl) return fromUrl;

    // 2. URL hash  #sid=1
    var hash = window.location.hash.replace('#', '');
    var hp = new URLSearchParams(hash);
    var fromHash = hp.get('sid') || hp.get('studentId');
    if (fromHash) return fromHash;

    // 3. window variable (set by bhava-session.js or BhavaNav)
    if (window._bhavaStudentId) return String(window._bhavaStudentId);

    // 4. sessionStorage — tries every key name used anywhere in the codebase
    var ssKeys = ['bhavaStudentId', 'bhava_student_id', 'studentId'];
    for (var i = 0; i < ssKeys.length; i++) {
      try {
        var v = sessionStorage.getItem(ssKeys[i]);
        if (v) return v;
      } catch(e) {}
    }

    // 5. bhava_student JSON object (written by bhava-session.js saveStudent)
    try {
      var saved = sessionStorage.getItem('bhava_student');
      if (saved) {
        var obj = JSON.parse(saved);
        if (obj && obj.id) return String(obj.id);
      }
    } catch(e) {}

    // 6. BhavaSession public API (if session script is also loaded)
    if (window.BhavaSession && typeof window.BhavaSession.getStudent === 'function') {
      var st = window.BhavaSession.getStudent();
      if (st && st.id) return String(st.id);
    }

    return null;
  }

  // ── Score helpers ────────────────────────────────────────────────────────
  function extractTotal(v) {
    if (v == null) return null;
    if (typeof v.total === 'number') return Math.round(v.total);
    var keys = ['eq_score','sq_score','iq_score','score','composite','overall','value'];
    for (var i = 0; i < keys.length; i++) {
      if (typeof v[keys[i]] === 'number' && v[keys[i]] > 0) return Math.round(v[keys[i]]);
    }
    // Last resort: first positive number
    var all = Object.keys(v);
    for (var j = 0; j < all.length; j++) {
      if (typeof v[all[j]] === 'number' && v[all[j]] > 0) return Math.round(v[all[j]]);
    }
    return null;
  }

  function band(score) {
    if (score == null) return '';
    if (score >= 130) return 'Very Superior';
    if (score >= 120) return 'Superior';
    if (score >= 110) return 'High Average';
    if (score >= 90)  return 'Average';
    if (score >= 80)  return 'Low Average';
    return 'Below Average';
  }

  function safeScore(r) {
    if (!r || r.status !== 'fulfilled' || !r.value) return null;
    return extractTotal(r.value);
  }

  function pct(score) {
    return score ? Math.min(100, Math.round((score / 160) * 100)) : 0;
  }

  // ── Build progress bar ───────────────────────────────────────────────────
  function progressRow(label, value, color) {
    var w = pct(value);
    return '<div class="progress-row">'
      + '<span class="pr-label">' + label + '</span>'
      + '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' + w + '%;background:' + color + '"></div></div>'
      + '<span class="pr-val">' + (value != null ? value : '—') + '</span>'
      + '</div>';
  }

  // ── Render report ────────────────────────────────────────────────────────
  function renderReport(student, iqRes, eqRes, sqRes, sessions) {
    var iq = safeScore(iqRes);
    var eq = safeScore(eqRes);
    var sq = safeScore(sqRes);
    var iqData = (iqRes && iqRes.status === 'fulfilled') ? iqRes.value : null;

    // Student initials for avatar
    var name    = (student && student.name)  ? student.name  : 'Student';
    var cls     = (student && student.class) ? 'Class ' + student.class : '';
    var section = (student && student.section) ? ' · ' + student.section : '';
    var rollNo  = (student && student.roll_no) ? 'Roll No. ' + student.roll_no : '';
    var initial = name.charAt(0).toUpperCase();

    // IQ breakdown bars
    var breakdownHtml = '';
    if (iqData) {
      var fields = [
        {key:'logic',           label:'Logic',            color:'#818cf8'},
        {key:'memory',          label:'Memory',           color:'#a78bfa'},
        {key:'attention',       label:'Attention',        color:'#67e8f9'},
        {key:'processing_speed',label:'Processing Speed', color:'#34d399'},
      ];
      var cells = fields.filter(function(f){ return typeof iqData[f.key] === 'number'; });
      if (cells.length) {
        breakdownHtml =
          '<div class="section-card">'
          + '<div class="section-title">IQ Breakdown</div>'
          + '<div class="progress-wrap">'
          + cells.map(function(f){
              return progressRow(f.label, Math.round(iqData[f.key]), f.color);
            }).join('')
          + '</div>'
          + '</div>';
      }
    }

    // Sessions
    var sessionList = (sessions && sessions.status === 'fulfilled' && Array.isArray(sessions.value))
      ? sessions.value.filter(function(s){ return s.game_name !== 'TestGame'; }).slice(0, 8)
      : [];

    var sessHtml = sessionList.length === 0
      ? '<p style="color:var(--muted);font-size:13px;text-align:center;padding:16px">No sessions recorded yet.</p>'
      : sessionList.map(function(s) {
          var done = s.completed === 1 || s.completed === true;
          var score = (s.raw_score != null) ? s.raw_score + ' pts' : '—';
          var d = s.started_at
            ? new Date(s.started_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'2-digit'})
            : '';
          return '<div class="session-row">'
            + '<span class="sr-game">' + (s.game_name || 'Game') + '</span>'
            + '<span class="sr-score">' + score + '</span>'
            + '<span class="sr-date">' + d + '<span class="tag ' + (done?'done':'pending') + '">'+(done?'done':'playing')+'</span></span>'
            + '</div>';
        }).join('');

    var root = document.getElementById('page-root');
    root.innerHTML =
      // Student header
      '<div class="student-header">'
        + '<div class="student-avatar">' + initial + '</div>'
        + '<div class="student-info">'
          + '<h1>' + name + '</h1>'
          + '<p>' + [cls + section, rollNo].filter(Boolean).join(' · ') + '</p>'
        + '</div>'
        + (cls ? '<div class="student-badge">' + cls + '</div>' : '')
      + '</div>'

      // Score grid
      + '<div class="score-grid">'
        + '<div class="score-card sc-iq">'
          + '<div class="sc-label">IQ Score</div>'
          + '<div class="sc-value">' + (iq != null ? iq : '—') + '</div>'
          + '<div class="sc-band">' + band(iq) + '</div>'
        + '</div>'
        + '<div class="score-card sc-eq">'
          + '<div class="sc-label">EQ Score</div>'
          + '<div class="sc-value">' + (eq != null ? eq : '—') + '</div>'
          + '<div class="sc-band">' + band(eq) + '</div>'
        + '</div>'
        + '<div class="score-card sc-sq">'
          + '<div class="sc-label">SQ Score</div>'
          + '<div class="sc-value">' + (sq != null ? sq : '—') + '</div>'
          + '<div class="sc-band">' + band(sq) + '</div>'
        + '</div>'
      + '</div>'

      // IQ breakdown
      + breakdownHtml

      // Sessions
      + '<div class="section-card">'
        + '<div class="section-title">Recent Game Sessions</div>'
        + sessHtml
      + '</div>';
  }

  // ── Main ─────────────────────────────────────────────────────────────────
  function showNotLoggedIn() {
    document.getElementById('page-root').innerHTML =
      '<div class="not-logged">'
        + '<div class="nl-icon">&#128274;</div>'
        + '<h2>Not Logged In</h2>'
        + '<p>Please log in from Home first, then come back to see your report.</p>'
        + '<a href="docs/index.html" class="btn-home">&#127968; Go to Home</a>'
      + '</div>';
  }

  function showError(msg) {
    document.getElementById('page-root').innerHTML =
      '<div class="error-box">&#9888;&#65039; ' + msg + '</div>';
  }

  async function loadReport() {
    if (!window.bhava) {
      showError('Bhāva IPC not available. Please launch from the Electron app.');
      return;
    }

    var sid = resolveStudentId();
    if (!sid) { showNotLoggedIn(); return; }

    try {
      var results = await Promise.allSettled([
        window.bhava.getIQScores(sid),
        window.bhava.getEQScores(sid),
        window.bhava.getSQScores(sid),
        window.bhava.getGameSessions(sid)
      ]);

      // Get student info from BhavaSession if available
      var student = null;
      if (window.BhavaSession && typeof window.BhavaSession.getStudent === 'function') {
        student = window.BhavaSession.getStudent();
      }
      // Or try to get from IPC if available
      if (!student && window.bhava.login) {
        try {
          var saved = sessionStorage.getItem('bhava_student');
          if (saved) student = JSON.parse(saved);
        } catch(e) {}
      }
      if (!student) student = { id: sid };

      renderReport(student, results[0], results[1], results[2], results[3]);
    } catch(err) {
      showError('Error loading report: ' + err.message);
    }
  }

  // Wait for Electron preload to be ready then load
  function init() {
    if (window.bhava) {
      loadReport();
    } else {
      // Poll briefly — preload may arrive just after DOMContentLoaded
      var attempts = 0;
      var poll = setInterval(function() {
        if (window.bhava) { clearInterval(poll); loadReport(); return; }
        if (++attempts > 20) {
          clearInterval(poll);
          showError('Bhāva IPC not found. Launch from the Electron app.');
        }
      }, 150);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

<!-- Load session script to restore student (if present in same folder) -->
<script>
  // If bhava-session.js is available it will restore the student from sessionStorage
  // This ensures resolveStudentId() finds the bhava_student JSON object
  (function(){
    var s = document.createElement('script');
    s.src = 'bhava-session.js';
    s.onerror = function(){}; // silent if not found
    document.body.appendChild(s);
  })();
</script>

<!-- bhava-report-live-patch: auto-fills name/roll/class from BhavaSession + IPC -->
<script>
(function(){
  'use strict';

  function resolveId(){
    try{var p=new URLSearchParams(window.location.search);var v=p.get('sid')||p.get('studentId');if(v)return v;}catch(e){}
    try{if(window.BhavaSession){var s=window.BhavaSession.getStudent();if(s&&s.id!=null)return String(s.id);}}catch(e){}
    var keys=['bhava_student','bhavaStudentId','bhava_student_id','studentId'];
    for(var i=0;i<keys.length;i++){
      try{var v=sessionStorage.getItem(keys[i]);if(!v)continue;
        if(keys[i]==='bhava_student'){var o=JSON.parse(v);if(o&&o.id)return String(o.id);}
        else return v;
      }catch(e){}
    }
    if(window._bhavaStudentId)return String(window._bhavaStudentId);
    return null;
  }

  function resolveObj(){
    try{if(window.BhavaSession){var s=window.BhavaSession.getStudent();if(s&&s.id)return s;}}catch(e){}
    try{var r=sessionStorage.getItem('bhava_student');if(r){var o=JSON.parse(r);if(o&&o.id)return o;}}catch(e){}
    return null;
  }

  function pickNum(v){
    if(v==null)return null;
    if(typeof v==='number')return Math.round(v);
    var keys=['iq_score','eq_score','sq_score','total','score','composite'];
    for(var i=0;i<keys.length;i++){if(typeof v[keys[i]]==='number')return Math.round(v[keys[i]]);}
    return null;
  }

  function setText(id,val){var el=document.getElementById(id);if(el)el.textContent=val;}

  function applyIdentity(s,sid){
    var name    = s.name       || 'Student';
    var rollNo  = s.roll_no    || s.rollNo || sid || '\u2014';
    var cls     = s['class']   || s.grade  || '\u2014';
    var section = s.section    || '';
    var school  = s.school_name|| s.school || 'Bh\u0101va Tech';
    var initials= name.split(' ').map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2);

    setText('studentAvatarInitials', initials);
    setText('studentName',   name);
    setText('studentAge',    'Roll No. ' + rollNo);
    setText('studentGrade',  'Class ' + cls + (section ? ' \u2013 ' + section : ''));
    setText('studentSchool', school);

    var now=new Date();
    setText('reportPeriod','Report '+now.toLocaleString('en-IN',{month:'long',year:'numeric'}));

    var sumEl=document.getElementById('studentSummary');
    if(sumEl)sumEl.textContent=name.split(' ')[0]+
      ' is enrolled at Bh\u0101va Tech. Scores reflect in-platform game performance across all cognitive domains.';

    document.title='Bh\u0101va Tech \u2014 '+name+' \u00B7 Class '+cls+' Report';

    var pdEl=document.getElementById('print-date');
    if(pdEl)pdEl.textContent=now.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  }

  function applyOverall(score){
    setText('overallScoreNum',score);
    var ch=window._reportCharts||[];
    if(ch[0]){try{ch[0].data.datasets[0].data=[score,100-score];ch[0].update();}catch(e){}}
  }

  function guessCAT(n){
    n=n||'';
    if(/memory|match|zoo|neuro.?flash/i.test(n))       return 'Memory';
    if(/logic|grid|visual|rotation|mental/i.test(n))   return 'Logic';
    if(/grammar|language|imaginia/i.test(n))           return 'Language';
    if(/math|blitz|number|percent/i.test(n))           return 'Math';
    if(/empathy|heart|social|planet|convers/i.test(n)) return 'Social';
    if(/focus|calm|distract|hero|brain.?garden/i.test(n))return 'Focus';
    if(/telugu|script/i.test(n))                       return 'Telugu';
    if(/habit|good/i.test(n))                          return 'Habit';
    return 'IQ';
  }

  var CAT_COLORS={
    Memory:'var(--cat-memory)',Logic:'var(--cat-logic)',Language:'var(--cat-language)',
    Math:'var(--cat-math)',Social:'var(--cat-social)',Focus:'var(--cat-focus)',
    IQ:'var(--cat-iq)',Habit:'var(--cat-habit)',Telugu:'var(--cat-telugu)'
  };

  function applyTimeline(sessions){
    var list=document.getElementById('timelineList');if(!list)return;
    var sorted=sessions.filter(function(s){return s.started_at;})
      .sort(function(a,b){return new Date(b.started_at)-new Date(a.started_at);}).slice(0,8);
    if(!sorted.length)return;
    list.innerHTML=sorted.map(function(s,i){
      var cat=guessCAT(s.game_name);var col=CAT_COLORS[cat]||'var(--color-primary)';
      var when=new Date(s.started_at).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
      return '<div class="timeline-item">'
        +'<div class="tl-dot-col"><div class="tl-dot" style="background:'+col+'"></div>'
        +(i<sorted.length-1?'<div class="tl-line"></div>':'')+'</div>'
        +'<div><div class="tl-game">'+(s.game_name||'Game')+'</div>'
        +'<div class="tl-when">'+cat+' \u00B7 '+when+'</div></div>'
        +'<div class="tl-score" style="color:'+col+'">'+(s.raw_score!=null?s.raw_score:'\u2014')+'</div>'
        +'</div>';
    }).join('');
  }

  function applyKPIs(sessions){
    setText('kpiGamesPlayed',sessions.length);
    var done=sessions.filter(function(s){return s.raw_score!=null;});
    if(done.length){
      var avg=Math.round(done.reduce(function(a,b){return a+(b.raw_score||0);},0)/done.length);
      setText('kpiAvgScore',avg);
    }
    setText('kpiGamesDelta',sessions.length+' total sessions');
    setText('kpiScoreDelta','live from Bh\u0101va DB');
  }

  async function main(){
    var sid=resolveId();var obj=resolveObj();
    if(!sid&&!obj){setText('reportPeriod','Demo Mode');return;}
    if(obj)applyIdentity(obj,sid);
    if(!window.bhava)return;
    var eid=sid||(obj&&String(obj.id));if(!eid)return;
    try{
      var res=await Promise.allSettled([
        window.bhava.getIQScores(eid),
        window.bhava.getEQScores(eid),
        window.bhava.getSQScores(eid),
        window.bhava.getGameSessions(eid)
      ]);
      var iq=pickNum(res[0].status==='fulfilled'?res[0].value:null);
      var eq=pickNum(res[1].status==='fulfilled'?res[1].value:null);
      var sq=pickNum(res[2].status==='fulfilled'?res[2].value:null);
      var nums=[iq,eq,sq].filter(function(x){return x!=null;});
      var overall=nums.length?Math.round(nums.reduce(function(a,b){return a+b;},0)/nums.length):0;
      if(overall>0)applyOverall(overall);
      var sess=(res[3].status==='fulfilled'&&Array.isArray(res[3].value))?res[3].value:[];
      if(sess.length){applyTimeline(sess);applyKPIs(sess);}
      if(!obj&&typeof window.bhava.getStudent==='function'){
        try{var st=await window.bhava.getStudent(eid);if(st&&st.id)applyIdentity(st,eid);}catch(e){}
      }
    }catch(err){console.warn('[BhavaReport] live fetch error:',err.message||err);}
  }

  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',main);}
  else{setTimeout(main,50);}
})();
</script></body>
</html>
