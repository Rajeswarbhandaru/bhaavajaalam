<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day Hero &#11088;</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;overflow-x:hidden;min-height:100vh;background:#1a1a2e}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-13px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-20px)}60%{transform:translateY(-8px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-9px)}75%{transform:translateX(9px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-50px)}to{opacity:1;transform:translateX(0)}}
@keyframes popIn{0%{transform:scale(0) rotate(-10deg);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes confettiFall{0%{top:-14px;transform:rotate(0deg)}100%{top:110vh;transform:rotate(720deg)}}
@keyframes starFloat{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-90px) scale(.3);opacity:0}}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes shimmer{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes walkIn{from{transform:translateX(-80px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes dayFill{from{width:0}to{width:var(--fill)}}

.screen{display:none;min-height:100vh;width:100%;align-items:center;justify-content:center;flex-direction:column;padding:20px;text-align:center}
.screen.active{display:flex;animation:fadeUp .5s ease forwards}

/* ===== INTRO ===== */
#intro{background:linear-gradient(145deg,#f7971e 0%,#ffd200 60%,#f7971e 100%);position:relative;overflow:hidden}
.sun{position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(255,255,255,.4),transparent);border-radius:50%;animation:shimmer 3s ease-in-out infinite}
.ground{position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(180deg,#7ec850,#5a9e3a);border-radius:60% 60% 0 0 / 30px}
.intro-mascot{font-size:88px;animation:float 2.5s ease-in-out infinite;filter:drop-shadow(0 8px 18px rgba(0,0,0,.2));margin-bottom:12px;position:relative;z-index:2}
.intro-title{font-size:clamp(38px,8vw,66px);font-weight:900;color:#fff;text-shadow:0 4px 20px rgba(0,0,0,.25);line-height:1.05;margin-bottom:8px;position:relative;z-index:2}
.intro-sub{font-size:clamp(14px,3vw,19px);color:rgba(255,255,255,.9);margin-bottom:32px;max-width:420px;line-height:1.6;position:relative;z-index:2}
.badges{display:flex;gap:12px;color:rgba(255,255,255,.9);font-size:13px;font-weight:700;margin-top:24px;flex-wrap:wrap;justify-content:center;position:relative;z-index:2}
.badge{background:rgba(255,255,255,.25);padding:6px 16px;border-radius:30px;backdrop-filter:blur(4px)}
.fstars{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1}
.fstar{position:absolute;bottom:-20px;animation:starFloat linear infinite}

.btn-play{background:#fff;color:#f7971e;font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;padding:15px 52px;border:none;border-radius:50px;cursor:pointer;box-shadow:0 8px 28px rgba(0,0,0,.2);transition:transform .2s,box-shadow .2s;position:relative;z-index:2}
.btn-play:hover{transform:scale(1.06) translateY(-2px);box-shadow:0 14px 36px rgba(0,0,0,.28)}
.btn-play:active{transform:scale(.97)}

/* ===== HUD ===== */
#hud{position:fixed;top:0;left:0;right:0;z-index:300;background:rgba(0,0,0,.38);backdrop-filter:blur(14px);padding:10px 18px;display:none;align-items:center;justify-content:space-between;gap:10px}
.h-left{display:flex;flex-direction:column;gap:3px}
.h-lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.5);letter-spacing:1.2px;text-transform:uppercase}
.h-dots{display:flex;gap:7px;align-items:center}
.hdot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.22);transition:all .35s}
.hdot.done{background:#ffd200}
.hdot.now{background:#fff;width:25px;border-radius:5px;animation:pulse 1s infinite}
.h-right{display:flex;align-items:center;gap:12px}
.h-bar-wrap{width:80px;height:8px;background:rgba(255,255,255,.18);border-radius:4px;overflow:hidden}
.h-bar{height:100%;background:linear-gradient(90deg,#f7971e,#ffd200);border-radius:4px;transition:width .6s ease}
.h-score{color:#ffd200;font-weight:900;font-size:18px;text-shadow:0 2px 6px rgba(0,0,0,.3)}

/* ===== GAME ===== */
#game{justify-content:flex-start;padding-top:74px}
#wrap{max-width:600px;width:100%;padding:0 16px 50px}

/* ===== CARD ===== */
.card{background:#fff;border-radius:28px;padding:26px 22px;box-shadow:0 18px 54px rgba(0,0,0,.3);animation:fadeUp .45s ease}
.clabel{font-size:11px;font-weight:800;letter-spacing:1.6px;color:rgba(255,255,255,.5);margin-bottom:12px;text-align:center;text-transform:uppercase}

/* scene visual */
.scene-stage{border-radius:18px;padding:18px 16px;margin-bottom:14px;display:flex;align-items:flex-end;justify-content:center;gap:14px;flex-wrap:wrap;min-height:120px;position:relative;overflow:hidden}
.cblk{display:flex;flex-direction:column;align-items:center;gap:7px}
.cemoji{font-size:clamp(48px,11vw,64px);animation:float 3s ease-in-out infinite;filter:drop-shadow(0 4px 10px rgba(0,0,0,.15))}
.cemoji2{animation-delay:-1.6s}
.cname{background:rgba(255,255,255,.9);border-radius:20px;padding:3px 12px;font-size:12px;font-weight:800;color:#444}
.time-tag{position:absolute;top:10px;right:12px;background:rgba(0,0,0,.25);color:#fff;font-size:12px;font-weight:800;padding:4px 12px;border-radius:20px;backdrop-filter:blur(4px)}
.sit{font-size:16px;font-weight:700;color:#222;margin-bottom:14px;line-height:1.55}
.stitle{font-size:19px;font-weight:900;color:#222;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.info-box{border-radius:14px;padding:13px 16px;margin-bottom:14px}
.ib-lbl{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.ib-txt{font-size:14px;font-weight:600;color:#333;line-height:1.6}

/* responsibility detect */
.rq{font-size:clamp(16px,3.8vw,20px);font-weight:900;color:#222;margin-bottom:18px;line-height:1.35}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.rbtn{background:#f8f8f8;border:3px solid #eee;border-radius:18px;padding:14px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .2s;font-family:'Nunito',sans-serif}
.rbtn:hover{border-color:#f7971e;transform:scale(1.04);box-shadow:0 5px 16px rgba(247,151,30,.22)}
.rbtn .re{font-size:36px}
.rbtn .rl{font-size:13px;font-weight:800;color:#555;text-align:center;line-height:1.3}
.rbtn.correct{border-color:#00c853 !important;background:#e8f5e9;animation:bounce .55s}
.rbtn.wrong{border-color:#ff1744 !important;background:#ffebee;animation:shake .45s}

/* reveal */
.reveal-box{border-radius:14px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px;animation:slideRight .5s ease}
.rev-lbl{font-size:11px;opacity:.75;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.rev-txt{font-size:15px;font-weight:800}

/* choice */
.cq{font-size:clamp(15px,3.5vw,19px);font-weight:900;color:#222;margin-bottom:16px;line-height:1.35}
.choices{display:flex;flex-direction:column;gap:10px}
.chbtn{background:#f8f8f8;border:3px solid #eee;border-radius:16px;padding:15px 18px;cursor:pointer;display:flex;align-items:flex-start;gap:14px;text-align:left;transition:all .2s;font-family:'Nunito',sans-serif;width:100%}
.chbtn:hover{border-color:#f7971e;transform:translateX(5px);box-shadow:0 5px 16px rgba(247,151,30,.2)}
.ci{font-size:26px;min-width:34px;margin-top:2px}
.ct{font-size:14px;font-weight:800;color:#333;line-height:1.4}

/* result */
.rvis{border-radius:18px;padding:20px;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:14px;min-height:100px}
.rfrom{font-size:50px}
.rarrow{font-size:26px;font-weight:900}
.rto{font-size:50px;animation:popIn .6s ease forwards}
.rmsg{font-size:15px;font-weight:700;color:#333;margin-bottom:14px;line-height:1.55}
.lesson-box{border-radius:16px;padding:18px;margin-bottom:14px;color:#fff}
.lb-lbl{font-size:10px;opacity:.75;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:5px}
.lb-txt{font-size:14px;font-weight:700;line-height:1.55}
.star-row{display:flex;align-items:center;justify-content:center;gap:8px;font-size:22px;margin-bottom:16px}

.btn-next{color:#fff;font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;padding:14px 38px;border:none;border-radius:50px;cursor:pointer;transition:transform .2s;width:100%}
.btn-next:hover{transform:scale(1.04)}

/* feedback */
.fb{border-radius:14px;padding:13px 16px;text-align:center;margin-top:12px}
.fb.good{background:#e8f5e9}
.fb.bad{background:#fff3e0}
.fb-ico{font-size:26px;margin-bottom:5px}
.fb-hd{font-size:14px;font-weight:900}
.fb-sub{font-size:12px;color:#666;margin-top:3px;line-height:1.4}
.fb.good .fb-hd{color:#2e7d32}
.fb.bad .fb-hd{color:#e65100}

/* ===== END ===== */
#end{background:linear-gradient(145deg,#f7971e 0%,#ffd200 60%,#f7971e 100%);position:relative;overflow:hidden}
.end-sun{position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:260px;height:260px;background:radial-gradient(circle,rgba(255,255,255,.35),transparent);border-radius:50%;pointer-events:none}
.cert{background:#fff;border-radius:30px;padding:34px 26px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);position:relative;z-index:2}
.c-emoji{font-size:72px;animation:bounce 1.2s ease infinite;margin-bottom:10px}
.c-title{font-size:15px;font-weight:700;color:#aaa;margin-bottom:3px}
.c-rank{font-size:clamp(20px,5.5vw,28px);font-weight:900;color:#f7971e;margin-bottom:6px;line-height:1.2}
.c-stars{font-size:28px;margin-bottom:8px}
.c-score{font-size:17px;font-weight:800;color:#444;margin-bottom:16px}
.c-bar-wrap{background:#eee;border-radius:8px;height:14px;margin-bottom:18px;overflow:hidden}
.c-bar{height:100%;background:linear-gradient(90deg,#f7971e,#ffd200);border-radius:8px;transition:width 1.5s ease}
.resp-list{background:rgba(247,151,30,.08);border:2px solid rgba(247,151,30,.2);border-radius:16px;padding:16px;margin-bottom:16px;text-align:left}
.resp-list h3{font-size:14px;font-weight:900;color:#e65100;margin-bottom:10px}
.resp-item{font-size:13px;color:#444;line-height:1.6;margin-bottom:6px}
.c-msg{font-size:14px;color:#666;line-height:1.6;margin-bottom:20px}
.btn-replay{font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;padding:13px 28px;border:none;border-radius:50px;cursor:pointer;transition:transform .2s;width:100%;color:#fff;background:linear-gradient(135deg,#f7971e,#ffd200)}
.btn-replay:hover{transform:scale(1.05)}

/* confetti */
.cp{position:fixed;top:-14px;pointer-events:none;z-index:999;animation:confettiFall linear forwards}

/* scene backgrounds — time of day */
.bg-morning{background:linear-gradient(135deg,#ffecd2,#fcb69f)}
.bg-school{background:linear-gradient(135deg,#a1c4fd,#c2e9fb)}
.bg-afternoon{background:linear-gradient(135deg,#d4fc79,#96e6a1)}
.bg-evening{background:linear-gradient(135deg,#fbc2eb,#a6c1ee)}
.bg-night{background:linear-gradient(135deg,#2c3e50,#4a6fa5)}

/* game screen bg per scenario */
.gbg1{background:linear-gradient(145deg,#7f4a00,#c47a1e,#e8a020) !important}
.gbg2{background:linear-gradient(145deg,#0d2b5e,#1a4080,#1565c0) !important}
.gbg3{background:linear-gradient(145deg,#1a3a0d,#2d6b1a,#388e3c) !important}
.gbg4{background:linear-gradient(145deg,#3a0d4a,#6b1a7a,#8e1fa2) !important}
.gbg5{background:linear-gradient(145deg,#0a0e1a,#141c33,#1a2550) !important}

@media(max-width:400px){.rgrid{grid-template-columns:1fr 1fr}.cemoji{font-size:44px!important}}
</style>

</head>
<body>

<!-- INTRO -->
<div class="screen active" id="intro">
  <div class="sun"></div>
  <div class="ground"></div>
  <div class="fstars" id="fstars"></div>
  <div class="intro-mascot">&#129464;</div>
  <h1 class="intro-title">Day Hero!</h1>
  <p class="intro-sub">Level up your real life! Tackle daily challenges, own your responsibilities, and become the hero of your own story. &#11088;</p>
  <button class="btn-play" id="playBtn">&#9654;&nbsp; Let's Go!</button>
  <div class="badges">
    <span class="badge">&#127971; Ages 7&ndash;14</span>
    <span class="badge">&#9728;&#65039; Full Day Journey</span>
    <span class="badge">&#11088; Earn Stars</span>
    <span class="badge">&#127942; Win Your Badge</span>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="h-left">
    <div class="h-lbl">Your Day</div>
    <div class="h-dots" id="hdots"></div>
  </div>
  <div class="h-right">
    <div>
      <div class="h-lbl">Responsibility</div>
      <div class="h-bar-wrap"><div class="h-bar" id="hbar" style="width:0%"></div></div>
    </div>
    <div class="h-score" id="hscore">&#11088; 0</div>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="game">
  <div id="wrap"><div id="gc"></div></div>
</div>

<!-- END -->
<div class="screen" id="end">
  <div class="end-sun"></div>
  <div class="cert" id="cert"></div>
</div>

<script>
var SC = [
  {
    bg:"bg-morning", gbg:"gbg1",
    timeTag:"&#127751; 7:00 AM",
    icon:"&#9728;&#65039;",
    title:"Rise and Shine",
    sit:"Your alarm goes off. You stayed up late last night. You have 40 minutes before school. Every second counts.",
    char:"&#128104;&#8205;&#127979;", charName:"You",
    env:"&#127968;", envName:"Bedroom",
    sceneDetail:"Alarm is ringing. Bed is warm. Room is messy. Breakfast has not been made. School bag is not packed.",
    rq:"Which responsibility is being tested here?",
    correct:2,
    resps:[
      {e:"&#128193;",l:"Keeping things organized"},
      {e:"&#128131;",l:"Being kind to others"},
      {e:"&#8987;",l:"Managing your own time"},
      {e:"&#128218;",l:"Completing schoolwork"}
    ],
    revealTxt:"This tests TIME MANAGEMENT &#8987; — how you use your own time is your own responsibility.",
    infoTxt:"Nobody else can manage your morning for you. How you start your day shapes everything that follows.",
    cq:"Your alarm is ringing. What do you do?",
    choices:[
      {e:"&#128564;",t:"Hit snooze 3 more times. Someone will wake me eventually.",good:false},
      {e:"&#127775;",t:"Get up immediately, make the bed, pack bag, eat breakfast and leave on time.",good:true},

    rgood:{f:"&#128564;",t:"&#129321;",m:"You arrive at school on time, energized, and fully prepared. Your teacher notices. Your day starts with confidence!"},
    rbad: {f:"&#128564;",t:"&#128542;",m:"Late to school, no breakfast, forgot your homework. The day feels off from the very start."},
    lesson:"Managing your own time is one of the most powerful skills you will ever build. Your morning routine is YOUR responsibility, no one else's.",
    accent:"#f7971e"
  },
  {
    bg:"bg-school", gbg:"gbg2",
    timeTag:"&#127979; 10:30 AM",
    icon:"&#127979;",
    title:"The Borrowed Book",
    sit:"Three weeks ago you borrowed your friend Sam's favourite book. Today Sam asks for it back. You have no idea where it is.",
    char:"&#128104;&#8205;&#127979;", charName:"You",
    env:"&#128102;", envName:"Sam",
    sceneDetail:"Sam needs the book for a project due today. They look hopeful. The book is somewhere at home, maybe.",
    rq:"Which responsibility is being challenged here?",
    correct:0,
    resps:[
      {e:"&#129309;",l:"Being accountable for others' things"},
      {e:"&#8987;",l:"Managing your time"},
      {e:"&#127968;",l:"Keeping your space clean"},
      {e:"&#128131;",l:"Being nice to friends"}
    ],
    revealTxt:"This is about ACCOUNTABILITY &#129309; — taking care of things that belong to others.",
    infoTxt:"When we borrow something, we accept responsibility for it. Losing it and staying silent damages trust far more than an honest mistake ever could.",
    cq:"Sam is looking at you, waiting. What do you say?",
    choices:[
      {e:"&#129335;",t:"Pretend you forgot all about it and change the subject.",good:false},

    rbad: {f:"&#128561;",t:"&#128532;",m:"Sam figures out the truth later. The lie hurt more than losing the book. Trust takes a long time to rebuild."},
    lesson:"Owning your mistakes immediately is one of the bravest and most respected things you can do. Accountability is the foundation of every good friendship.",
    accent:"#1565c0"
  },
  {
    bg:"bg-afternoon", gbg:"gbg3",
    timeTag:"&#127968; 4:00 PM",
    icon:"&#127968;",
    title:"The Messy Deal",
    sit:"You want to go to your friend's house to play. Dad says: Sure, but clean your room first. Your room looks like a tornado hit it.",
    char:"&#128104;&#8205;&#127979;", charName:"You",
    env:"&#128104;", envName:"Dad",
    sceneDetail:"Clothes on the floor. Books everywhere. Plates from yesterday still on the desk. Friends are waiting.",
    rq:"What kind of responsibility is this about?",

    resps:[

    rgood:{f:"&#128542;",t:"&#128516;",m:"You clean the room properly, go out with full permission and enjoy your time completely guilt-free. Dad is proud and trusts you more!"},
    rbad: {f:"&#128542;",t:"&#128545;",m:"Dad finds out. No going out for a whole week. The shortcut cost far more than the effort of just cleaning up properly."},
    lesson:"Doing what you agreed to — even when it is inconvenient — is what separates responsible people from unreliable ones. Shortcuts always cost more in the end.",
    accent:"#388e3c"
  },
  {
    bg:"bg-evening", gbg:"gbg4",
    timeTag:"&#127763; 6:00 PM",
    icon:"&#128021;",
    title:"The Hungry Pet",
    sit:"You promised your family you would feed the dog every day. You just realised you forgot for the past two days. The dog is whining by its empty bowl.",
    char:"&#128104;&#8205;&#127979;", charName:"You",
    env:"&#128021;", envName:"Bruno",

    ],

    correct:2,
    resps:[

      {e:"&#128131;",l:"Being kind to classmates"},
      {e:"&#128101;",l:"Being reliable for people who depend on you"},
      {e:"&#8987;",l:"Waking up early tomorrow"}
    ],
    revealTxt:"This is about TEAM RESPONSIBILITY &#128101; — when others depend on you, letting them down has real consequences.",
    infoTxt:"In a team, your responsibility is not just to yourself. Three people trusted you. Their grade, effort and time are directly connected to what you do tonight.",

    ],

var idx = 0, score = 0, MAX = SC.length * 5;

document.getElementById("playBtn").addEventListener("click", startGame);
initStars();

function initStars() {
  var c = document.getElementById("fstars");
  var em = ["&#11088;","&#10024;","&#127775;","&#127381;","&#128171;","&#128150;"];
  for (var i = 0; i < 20; i++) {
    var d = document.createElement("div");
    d.className = "fstar";
    d.innerHTML = em[i % em.length];
    d.style.left = (Math.random() * 95) + "%";
    d.style.fontSize = (12 + Math.random() * 18) + "px";
    d.style.animationDuration = (3 + Math.random() * 6) + "s";
    d.style.animationDelay = (Math.random() * 7) + "s";
    c.appendChild(d);
  }
}

function show(id) {
  ["intro","game","end"].forEach(function(s) {
    document.getElementById(s).classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}

function updateHud() {
  document.getElementById("hud").style.display = "flex";
  var dots = document.getElementById("hdots");
  dots.innerHTML = "";
  for (var i = 0; i < SC.length; i++) {
    var d = document.createElement("div");
    d.className = "hdot" + (i < idx ? " done" : i === idx ? " now" : "");
    dots.appendChild(d);
  }
  document.getElementById("hscore").innerHTML = "&#11088; " + score;
  document.getElementById("hbar").style.width = Math.round((score / MAX) * 100) + "%";
}

function gc(html) {
  document.getElementById("gc").innerHTML = html;
  window.scrollTo({top:0, behavior:"smooth"});
}

function startGame() {
  idx = 0; score = 0;
  show("game");
  document.getElementById("game").style.background = SC[0].gbg.replace("!important","");
  updateHud();
  renderScene();
}

function renderScene() {
  var s = SC[idx];
  var timeIcons = ["&#9728;&#65039;","&#127979;","&#127968;","&#127763;","&#127764;"];
  gc(`
    <div class="clabel">${s.icon} Challenge ${idx+1} of ${SC.length}</div>
    <div class="card">
      <div class="stitle">${s.icon} ${s.title}</div>
      <div class="scene-stage ${s.bg}">
        <div class="time-tag">${s.timeTag}</div>
        <div class="cblk"><div class="cemoji">${s.char}</div><div class="cname">${s.charName}</div></div>
        <div style="font-size:22px">&#128172;</div>
        <div class="cblk"><div class="cemoji cemoji2">${s.env}</div><div class="cname">${s.envName}</div></div>
      </div>
      <div class="sit">${s.sit}</div>
      <div class="info-box" style="background:${s.accent}18;border:2px solid ${s.accent}30">
        <div class="ib-lbl" style="color:${s.accent}">&#128065;&#65039; What is happening</div>
        <div class="ib-txt">${s.sceneDetail}</div>
      </div>
      <button class="btn-next" style="background:linear-gradient(135deg,${s.accent},${s.accent}aa)" onclick="renderDetect()">
        &#129300; Which responsibility is this?
      </button>
    </div>
  `);
}

function renderDetect() {
  var s = SC[idx];
  var btns = s.resps.map(function(r, i) {
    return `<button class="rbtn" id="rb${i}" onclick="pickResp(${i})"><span class="re">${r.e}</span><span class="rl">${r.l}</span></button>`;
  }).join("");
  gc(`
    <div class="clabel">&#128269; Spot the Responsibility</div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:16px;">
        <div style="font-size:54px;animation:float 3s ease-in-out infinite">${s.char}</div>
        <div style="text-align:left">
          <div style="font-size:12px;color:#aaa;font-weight:700">Challenge ${idx+1}</div>
          <div style="font-size:16px;font-weight:900;color:#222">What type of responsibility is this?</div>
        </div>
      </div>
      <div class="rq">${s.rq}</div>
      <div class="rgrid">${btns}</div>
      <div id="rfb"></div>
    </div>
  `);
}

function pickResp(i) {
  var s = SC[idx];
  var ok = (i === s.correct);
  var btns = document.querySelectorAll(".rbtn");
  for (var j = 0; j < btns.length; j++) {
    btns[j].setAttribute("onclick","");
    btns[j].style.pointerEvents = "none";
    if (j === s.correct) btns[j].classList.add("correct");
    else if (j === i && !ok) btns[j].classList.add("wrong");
  }
  if (ok) { score += 2; updateHud(); }
  var fb = document.getElementById("rfb");
  fb.className = "fb " + (ok ? "good" : "bad");
  fb.innerHTML = ok
    ? `<div class="fb-ico">&#127919;</div><div class="fb-hd">Spot on! +2 &#11088;</div><div class="fb-sub">You identified the right responsibility!</div>`
    : `<div class="fb-ico">&#128173;</div><div class="fb-hd">Good thinking though!</div><div class="fb-sub">Correct answer: ${s.resps[s.correct].e} ${s.resps[s.correct].l}</div>`;
  setTimeout(renderChoice, 1900);
}

function renderChoice() {
  var s = SC[idx];
  var choiceBtns = s.choices.map(function(c, i) {
    return `<button class="chbtn" onclick="pickChoice(${i})"><span class="ci">${c.e}</span><span class="ct">${c.t}</span></button>`;
  }).join("");
  gc(`
    <div class="clabel">&#9889; Make Your Move</div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;">
        <div style="font-size:48px">${s.char}</div>
        <div style="font-size:18px;color:#bbb">&#10132;</div>
        <div style="font-size:48px">${s.env}</div>
      </div>
      <div class="reveal-box" style="background:linear-gradient(135deg,${s.accent},${s.accent}bb);color:#fff">
        <div style="font-size:32px">${s.resps[s.correct].e}</div>
        <div>
          <div class="rev-lbl">Responsibility detected</div>
          <div class="rev-txt">${s.revealTxt}</div>
        </div>
      </div>
      <div class="info-box" style="background:${s.accent}12;border:2px solid ${s.accent}28">
        <div class="ib-lbl" style="color:${s.accent}">&#128161; Why this matters</div>
        <div class="ib-txt">${s.infoTxt}</div>
      </div>
      <div class="cq">${s.cq}</div>
      <div class="choices">${choiceBtns}</div>
    </div>
  `);
}

function pickChoice(i) {
  var s = SC[idx];
  var good = s.choices[i].good;
  if (good) { score += 3; updateHud(); spawnConfetti(26); }
  renderResult(good);
}

function renderResult(good) {
  var s = SC[idx];
  var r = good ? s.rgood : s.rbad;
  var arrowCol = good ? "#00c853" : "#ff5722";
  var topLabel = good ? "&#127775; Responsible Choice!" : "&#128161; Learning Moment";
  var starRow = good
    ? `<span>Stars earned</span><span>&#11088;&#11088;&#11088;</span>`
    : `<span>Stars earned</span><span>&#11088;</span>`;
  var nextTxt = (idx + 1 < SC.length) ? "&#10145;&#65038; Next Challenge" : "&#127942; See My Results!";
  gc(`
    <div class="clabel">${topLabel}</div>
    <div class="card">
      <div class="rvis ${s.bg}">
        <span class="rfrom">${r.f}</span>
        <span class="rarrow" style="color:${arrowCol}">&#10132;</span>
        <span class="rto">${r.t}</span>
      </div>
      <div class="rmsg">${r.m}</div>
      <div class="lesson-box" style="background:linear-gradient(135deg,${s.accent},${s.accent}aa)">
        <div class="lb-lbl">&#128161; Responsibility Lesson</div>
        <div class="lb-txt">${s.lesson}</div>
      </div>
      <div class="star-row">${starRow}<span style="font-size:13px;color:#999">&nbsp;keep going!</span></div>
      <button class="btn-next" style="background:linear-gradient(135deg,${s.accent},${s.accent}aa)" onclick="nextChallenge()">${nextTxt}</button>
    </div>
  `);
}

function nextChallenge() {
  idx++;
  if (idx >= SC.length) { endGame(); return; }
  var gbgMap = ["#b56a00","#1565c0","#2e7d32","#7b1fa2","#0d1b3e"];
  document.getElementById("game").style.background = SC[idx].gbg.replace(" !important","");
  updateHud();
  renderScene();
}

function endGame() {
  document.getElementById("hud").style.display = "none";
  show("end");
  var pct = score / MAX;
  var rank, emoji, msg;
  if (pct >= 0.8) {
    rank = "Responsibility Hero! &#127942;"; emoji = "&#129464;";
    msg = "You crushed every challenge! You understand that real strength is showing up, keeping your word and owning your mistakes. You are ready for anything life throws at you!";
  } else if (pct >= 0.5) {
    rank = "Rising Hero! &#127775;"; emoji = "&#128170;";
    msg = "You are building some serious life skills! A few challenges tripped you up but you are clearly on the right path. Keep practising these habits every day.";
  } else {
    rank = "Hero in Training! &#127808;"; emoji = "&#127807;";
    msg = "Every hero starts somewhere. The fact that you played shows you care about growing. Review the lessons below and try again. You have got this!";
  }
  var stars = "";
  var sc = Math.max(1, Math.round(pct * 5));
  for (var i = 0; i < sc; i++) stars += "&#11088;";

  var respItems = [
    {e:"&#8987;",t:"Time Management","d":"Your time is YOUR responsibility — own your morning and own your day"},
    {e:"&#129309;",t:"Accountability","d":"Own your mistakes immediately — honesty costs less than deception"},
    {e:"&#10071;",t:"Keeping Your Word","d":"A promise made is a promise that must be kept, no matter how inconvenient"},
    {e:"&#128101;",t:"Team Reliability","d":"When others depend on you, their trust is your responsibility to protect"},
    {e:"&#127968;",t:"Owning Your Space","d":"Responsible people take care of the spaces and things they control"}
  ];
  var rList = respItems.map(function(r) {
    return `<div class="resp-item">${r.e} <strong>${r.t}:</strong> ${r.d}</div>`;
  }).join("");

  document.getElementById("cert").innerHTML = `
    <div class="c-emoji">${emoji}</div>
    <div class="c-title">You are a</div>
    <div class="c-rank">${rank}</div>
    <div class="c-stars">${stars}</div>
    <div class="c-score">Responsibility Score: ${score} / ${MAX} &#11088;</div>
    <div class="c-bar-wrap"><div class="c-bar" id="cbar" style="width:0%"></div></div>
    <div class="resp-list">
      <h3>&#127775; Your 5 Life Responsibilities:</h3>
      ${rList}
    </div>
    <div class="c-msg">${msg}</div>
    <button class="btn-replay" onclick="startGame()">&#128260; Play Again</button>
  `;
  setTimeout(function() {
    var b = document.getElementById("cbar");
    if (b) b.style.width = Math.round(pct * 100) + "%";
  }, 400);
  spawnConfetti(55);
}

function spawnConfetti(n) {
  var cols = ["#ffd200","#f7971e","#38ef7d","#ff6b6b","#4ecdc4","#c850c0","#a1c4fd"];
  for (var i = 0; i < n; i++) {
    (function(delay) {
      setTimeout(function() {
        var p = document.createElement("div");
        p.className = "cp";
        p.style.left = Math.random() * 100 + "vw";
        p.style.width = (7 + Math.random() * 9) + "px";
        p.style.height = (7 + Math.random() * 9) + "px";
        p.style.background = cols[Math.floor(Math.random() * cols.length)];
        p.style.borderRadius = Math.random() > 0.5 ? "50%" : "3px";
        p.style.animationDuration = (2 + Math.random() * 3) + "s";
        document.body.appendChild(p);
        setTimeout(function() { if (p.parentNode) p.parentNode.removeChild(p); }, 5500);
      }, delay);
    })(i * 55);
  }
}
</script>
