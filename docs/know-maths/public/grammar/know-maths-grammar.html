const SPK_NAMES={arjun:'Arjun',ananya:'Ananya',grandfather:'Grand Father'};
function renderLens(c){
  const wrap=document.getElementById('panel-lens');
  // Build vocab lookup for this convo
  const vmap={};
  c.vocab.forEach(v=>{ vmap[v.word.toLowerCase()]=v; });
  // Annotate dialogue
  function annotate(text){
    return text.replace(/([A-Za-z]{4,})/g,(match)=>{
      const v=vmap[match.toLowerCase()];
      if(!v) return match;
      return `<span class="vw" tabindex="0">${match}<span class="vw-tip"><strong>${v.word}</strong>${v.meaning}</span></span>`;
    });
  }
  let html=`<div class="hint-banner">💡 <span>Hover (or tap) any <strong>highlighted word</strong> to see its meaning!</span></div>
  <div class="dialogue">`;
  c.beats.forEach(b=>{
    if(!b.line) return;
    html+=`<div class="dline">
      <span class="spk spk-${b.speaker}">${SPK_NAMES[b.speaker]||b.speaker}</span>
      <span class="line-text">${annotate(b.line)}</span>
    </div>`;
  });
  html+='</div>';
  wrap.innerHTML=html;
  // Touch toggle
  wrap.querySelectorAll('.vw').forEach(w=>{
    w.addEventListener('click',e=>{
      const isOpen=w.classList.contains('open');
      wrap.querySelectorAll('.vw.open').forEach(x=>x.classList.remove('open'));
      if(!isOpen) w.classList.add('open');
      e.stopPropagation();
    });
  });
  document.addEventListener('click',()=>wrap.querySelectorAll('.vw.open').forEach(x=>x.classList.remove('open')));
}

// ── VOCAB ──
function renderVocab(c){
  const wrap=document.getElementById('panel-vocab');
  let filter='all',search='';
  function draw(){
    const items=c.vocab.filter(v=>{
      const ms=!search||v.word.toLowerCase().includes(search)||v.meaning.toLowerCase().includes(search);
      const mp=filter==='all'||v.pos===filter;
      return ms&&mp;
    });
    if(!items.length){
      wrap.querySelector('.vocab-grid').innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div>No words found — try a different search.</div>`;
      return;
    }
    wrap.querySelector('.vocab-grid').innerHTML=items.map(v=>`
      <div class="vc">
        <div class="vc-top">
          <div class="vc-word">${v.word}</div>
          <span class="pos-tag pt-${v.pos}">${v.pos}</span>
        </div>
        <div class="vc-def">${v.meaning}</div>
      </div>`).join('');
  }
  wrap.innerHTML=`
    <div class="vocab-ctrl">
      <input type="text" class="v-search" placeholder="🔍 Search word or meaning..." id="vs-inp">
      <div class="pos-filters">
        <button class="pf on" data-p="all">All (${c.vocab.length})</button>
        ${['noun','verb','adjective','adverb'].map(p=>{
          const n=c.vocab.filter(v=>v.pos===p).length;
          return n?`<button class="pf" data-p="${p}">${p.charAt(0).toUpperCase()+p.slice(1)} (${n})</button>`:'';
        }).join('')}
      </div>
    </div>
    <div class="vocab-grid"></div>`;
  draw();
  wrap.querySelector('#vs-inp').addEventListener('input',e=>{search=e.target.value.toLowerCase().trim();draw();});
  wrap.querySelectorAll('.pf').forEach(btn=>btn.addEventListener('click',()=>{
    wrap.querySelectorAll('.pf').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on'); filter=btn.dataset.p; draw();
  }));
}

// ── POS HUNT ──
function renderPOS(c){
  const wrap=document.getElementById('panel-pos');
  if(!c.pos_ex.length){wrap.innerHTML='<div class="no-ex">📭 No POS exercises available for this conversation.</div>';return;}
  let html=`<div class="pos-legend">
    <div class="pl-item"><div class="pl-dot" style="background:var(--blue)"></div>Noun — person/place/thing/idea</div>
    <div class="pl-item"><div class="pl-dot" style="background:var(--teal)"></div>Verb — action/state</div>
    <div class="pl-item"><div class="pl-dot" style="background:var(--purp)"></div>Adjective — describes noun</div>
    <div class="pl-item"><div class="pl-dot" style="background:var(--gold)"></div>Adverb — modifies verb/adjective</div>
  </div>
  <div class="score-bar" id="pos-score-bar" style="display:none">
    <span id="pos-score-txt">0 / ${c.pos_ex.length}</span>
    <div class="score-fill"><div class="score-progress" id="pos-score-prog" style="width:0%"></div></div>
  </div>
  <div class="ex-stack">`;
  c.pos_ex.forEach((ex,i)=>{
    const toks=ex.tokens.map(t=>`<span class="wtok" data-word="${t.word}" data-exid="${ex.id}">${t.word}</span>`).join(' ');
    html+=`<div class="ex-card" id="poscard-${ex.id}">
      <div class="ex-meta"><span class="ex-num">Exercise ${i+1} of ${c.pos_ex.length}</span></div>
      <div class="instr">✏️ Choose a label, then click words to tag them.</div>
      <div class="sent-box">${toks}</div>
      <div class="tool-row">
        <button class="ptool noun" data-pos="noun" data-exid="${ex.id}">🔵 Noun</button>
        <button class="ptool verb" data-pos="verb" data-exid="${ex.id}">🟢 Verb</button>
        <button class="ptool adjective" data-pos="adjective" data-exid="${ex.id}">🟣 Adj</button>
        <button class="ptool adverb" data-pos="adverb" data-exid="${ex.id}">🟡 Adv</button>
        <button class="ptool" data-pos="clear" data-exid="${ex.id}" style="color:var(--mut)">✕ Clear</button>
      </div>
      <div class="action-row">
        <button class="btn-pri" data-exid="${ex.id}" id="chk-${ex.id}">✓ Check</button>
        <button class="btn-ghost" data-exid="${ex.id}" id="rst-${ex.id}">↺ Reset</button>
        <span class="fb-badge" id="fb-${ex.id}"></span>
      </div>
    </div>`;
  });
  html+='</div>';
  wrap.innerHTML=html;

  const POS_TC={noun:'t-noun',verb:'t-verb',adjective:'t-adjective',adverb:'t-adverb'};
  let doneSet=new Set();

  wrap.querySelectorAll('.ptool').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const eid=btn.dataset.exid;
      if(btn.dataset.pos==='clear'){
        activeTool[eid]=null;
        wrap.querySelectorAll(`[data-exid="${eid}"].ptool`).forEach(b=>b.classList.remove('sel'));
        wrap.querySelectorAll(`#poscard-${eid} .wtok`).forEach(t=>{t.className='wtok';delete t.dataset.tagged;});
        return;
      }
      activeTool[eid]=btn.dataset.pos;
      wrap.querySelectorAll(`[data-exid="${eid}"].ptool`).forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');
    });
  });

  wrap.querySelectorAll('.wtok').forEach(tok=>{
    tok.addEventListener('click',()=>{
      const eid=tok.dataset.exid, tool=activeTool[eid];
      if(!tool){tok.style.outline='2px solid var(--red)';setTimeout(()=>tok.style.outline='',600);return;}
      if(tok.dataset.tagged===tool){tok.className='wtok';delete tok.dataset.tagged;}
      else{tok.className='wtok '+POS_TC[tool];tok.dataset.tagged=tool;tok.classList.add('pop');setTimeout(()=>tok.classList.remove('pop'),350);}
    });
  });

  wrap.querySelectorAll('[id^="chk-"]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const eid=btn.id.replace('chk-','');
      const ex=c.pos_ex.find(e=>e.id===eid);
      const fb=document.getElementById('fb-'+eid);
      let correct=0,total=0;
      ['noun','verb','adjective','adverb'].forEach(pos=>{
        const answers=(ex.answers[pos]||[]).map(w=>w.toLowerCase());
        answers.forEach(a=>{if(a) total++;});
        wrap.querySelectorAll(`#poscard-${eid} .wtok`).forEach(tok=>{
          if(answers.includes(tok.dataset.word?.toLowerCase())&&tok.dataset.tagged===pos) correct++;
        });
      });
      fb.className='fb-badge';fb.style.display='';
      if(correct===total&&total>0){fb.className='fb-badge fb-ok';fb.textContent=`✨ Perfect! ${correct}/${total}`;}
      else if(correct>=Math.ceil(total*.6)){fb.className='fb-badge fb-mid';fb.textContent=`👍 ${correct}/${total} correct`;}
      else{fb.className='fb-badge fb-try';fb.textContent=`💪 ${correct}/${total} — keep trying!`;}
      if(correct===total&&total>0) doneSet.add(eid);
      const prog=Math.round(doneSet.size/c.pos_ex.length*100);
      const sb=document.getElementById('pos-score-bar');
      sb.style.display='flex';
      document.getElementById('pos-score-txt').textContent=`${doneSet.size} / ${c.pos_ex.length} completed`;
      document.getElementById('pos-score-prog').style.width=prog+'%';
    });
  });

  wrap.querySelectorAll('[id^="rst-"]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const eid=btn.id.replace('rst-','');
      activeTool[eid]=null;
      wrap.querySelectorAll(`#poscard-${eid} .wtok`).forEach(t=>{t.className='wtok';delete t.dataset.tagged;});
      wrap.querySelectorAll(`[data-exid="${eid}"].ptool`).forEach(b=>b.classList.remove('sel'));
      const fb=document.getElementById('fb-'+eid);fb.className='fb-badge';fb.style.display='none';
    });
  });
}

// ── SVO LAB ──
function renderSVO(c){
  const wrap=document.getElementById('panel-svo');
  if(!c.svo_ex.length){wrap.innerHTML='<div class="no-ex">📭 No Sentence Lab exercises for this conversation.</div>';return;}
  let html=`<div class="tip-box">📘 <div><strong>Grammar Rule:</strong> &nbsp;
    <span style="color:var(--blue)">Subject</span> = who does it &nbsp;|&nbsp;
    <span style="color:var(--teal)">Verb</span> = the action &nbsp;|&nbsp;
    <span style="color:var(--purp)">Object</span> = receives the action &nbsp;|&nbsp;
    <span style="color:var(--pri)">Adjective</span> = describing word</div></div>
  <div class="svo-stack">`;
  c.svo_ex.forEach((ex,i)=>{
    html+=`<div class="svo-card">
      <div class="ex-num">Sentence ${i+1} of ${c.svo_ex.length}</div>
      <div class="svo-sent">"${ex.sentence}"</div>
      <div class="svo-fields">
        <div class="svo-f"><label class="svo-lbl lbl-s">🔵 Subject</label>
          <input class="svo-inp" data-ans="${ex.subject.toLowerCase()}" data-idx="${i}" placeholder="Who/what does the action?">
          <div class="svo-hint" id="sh-s-${i}">✅ ${ex.subject}</div></div>
        <div class="svo-f"><label class="svo-lbl lbl-v">🟢 Verb</label>
          <input class="svo-inp" data-ans="${ex.verb.toLowerCase()}" data-idx="${i}" placeholder="What is the action?">
          <div class="svo-hint" id="sh-v-${i}">✅ ${ex.verb}</div></div>
        <div class="svo-f"><label class="svo-lbl lbl-o">🟣 Object</label>
          <input class="svo-inp" data-ans="${ex.object.toLowerCase()}" data-idx="${i}" placeholder="Who/what receives it?">
          <div class="svo-hint" id="sh-o-${i}">✅ ${ex.object}</div></div>
        <div class="svo-f"><label class="svo-lbl lbl-a">🟠 Adjective(s)</label>
          <input class="svo-inp" data-ans="${ex.adjectives.join(',').toLowerCase()}" data-idx="${i}" placeholder="${ex.adjectives.length?ex.adjectives.join(', '):'(none in this sentence)'}">
          <div class="svo-hint" id="sh-a-${i}">✅ ${ex.adjectives.join(', ')||'none'}</div></div>
      </div>
      <div class="action-row">
        <button class="btn-pri svo-chk" data-idx="${i}">✓ Check</button>
        <button class="btn-ghost svo-show" data-idx="${i}">👁 Show Answers</button>
        <span class="fb-badge" id="svo-fb-${i}"></span>
      </div>
    </div>`;
  });
  html+='</div>';
  wrap.innerHTML=html;

  wrap.querySelectorAll('.svo-inp').forEach(inp=>{
    inp.addEventListener('keydown',e=>{if(e.key==='Enter') inp.closest('.svo-card').querySelector('.svo-chk').click();});
  });

  wrap.querySelectorAll('.svo-chk').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const i=parseInt(btn.dataset.idx);
      const card=btn.closest('.svo-card');
      const inputs=card.querySelectorAll('.svo-inp');
      let correct=0;
      inputs.forEach(inp=>{
        const ans=inp.dataset.ans;
        const val=inp.value.toLowerCase().trim();
        if(val&&(ans.includes(val)||ans.split(',').some(a=>a.trim()===val))){
          inp.classList.add('ok');inp.classList.remove('ng');correct++;
        } else if(val){
          inp.classList.add('ng');inp.classList.remove('ok');
        }
      });
      const fb=document.getElementById('svo-fb-'+i);
      fb.style.display='inline-block';
      if(correct===4){fb.className='fb-badge fb-ok';fb.textContent='🌟 All correct!';}
      else if(correct>=2){fb.className='fb-badge fb-mid';fb.textContent=`👍 ${correct}/4 correct`;}
      else{fb.className='fb-badge fb-try';fb.textContent=`💪 ${correct}/4 — keep going!`;}
    });
  });

  wrap.querySelectorAll('.svo-show').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const i=parseInt(btn.dataset.idx);
      const card=btn.closest('.svo-card');
      card.querySelectorAll('.svo-inp').forEach(inp=>{inp.value='';inp.classList.remove('ok','ng');});
      ['s','v','o','a'].forEach(p=>{const el=document.getElementById(`sh-${p}-${i}`);if(el)el.classList.add('show');});
      document.getElementById('svo-fb-'+i).style.display='none';
    });
  });
}

// ── SVA QUIZ ──
function renderSVA(c){
  const wrap=document.getElementById('panel-sva');
  // Show conv-specific SVA if exists, else show all
  let items=SVA_ALL.filter(s=>s.conv_id===c.id);
  const global_mode=items.length===0;
  if(global_mode) items=SVA_ALL;
  if(!items.length){wrap.innerHTML='<div class="no-ex">📭 No Subject-Verb Agreement exercises available yet.</div>';return;}
  let html=`<div class="sva-note">📌 <div>${global_mode?'Showing all Subject-Verb Agreement exercises across all conversations.':
    `Showing ${items.length} SVA exercise${items.length>1?'s':''} from this conversation.`}<br>
    <strong>Rule:</strong> Singular subject → verb ends in <em>-s</em> &nbsp;|&nbsp; Plural subject → verb without <em>-s</em></div></div>
  <div class="sva-stack">`;
  items.forEach((ex,i)=>{
    const opts=[ex.correct,ex.wrong].sort(()=>Math.random()-.5);
    html+=`<div class="sva-card">
      <div class="ex-num">SVA Exercise ${i+1}</div>
      <div class="sva-sent">${ex.sentence.replace(ex.correct,`<strong style="color:var(--pri)">___</strong>`)}</div>
      <div class="sva-q">Which form of the verb is correct for subject <strong>"${ex.subject}"</strong>?</div>
      <div class="sva-opts">
        ${opts.map(o=>`<button class="sva-opt" data-val="${o}" data-correct="${ex.correct}" data-idx="${i}">${o}</button>`).join('')}
      </div>
      <div class="sva-expl" id="sva-expl-${i}">
        ✅ Correct: <strong>"${ex.correct}"</strong> — "${ex.subject}" is ${ex.correct_number==='Sing'?'singular':'plural'}, so the verb ${ex.correct_number==='Sing'?'needs -s':'does not need -s'}.
      </div>
    </div>`;
  });
  html+='</div>';
  wrap.innerHTML=html;

  wrap.querySelectorAll('.sva-opt').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const i=btn.dataset.idx;
      const correct=btn.dataset.correct;
      const opts=btn.closest('.sva-opts').querySelectorAll('.sva-opt');
      opts.forEach(o=>{
        o.disabled=true;
        if(o.dataset.val===correct) o.classList.add('reveal-ok');
      });
      btn.classList.add(btn.dataset.val===correct?'correct':'wrong');
      document.getElementById('sva-expl-'+i).classList.add('show');
    });
  });
}
