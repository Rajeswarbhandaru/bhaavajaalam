<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Day Hero</title>
<link href="https://api.fontshare.com/v2/css?f[]=chillax@400,500,600,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --yellow:#ffd200;--orange:#f7971e;--green:#38ef7d;--blue:#4ecdc4;--purple:#c850c0;
  --red:#ff6b6b;--dark:#1a1a2e;--white:#fff;
  --radius-card:28px;--radius-btn:50px;
  --font:'Chillax',system-ui,sans-serif;
}
html,body{height:100%;overflow-x:hidden}
body{font-family:var(--font);background:var(--dark);color:#fff;min-height:100vh}

/* ===== KEYFRAMES ===== */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-22px)}60%{transform:translateY(-8px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(0) rotate(-15deg);opacity:0}70%{transform:scale(1.18)}100%{transform:scale(1);opacity:1}}
@keyframes confettiFall{0%{top:-20px;transform:rotate(0deg);opacity:1}90%{opacity:1}100%{top:110vh;transform:rotate(720deg);opacity:0}}
@keyframes starFloat{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-100px) scale(0);opacity:0}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes shimmer{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes ringPop{0%{transform:scale(0);opacity:1}100%{transform:scale(3);opacity:0}}
@keyframes scoreUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-60px);opacity:0}}
@keyframes wiggle{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(255,210,0,.5)}50%{box-shadow:0 0 24px 8px rgba(255,210,0,.3)}}
@keyframes coinSpin{0%{transform:scaleX(1)}50%{transform:scaleX(0.1)}100%{transform:scaleX(1)}}
@keyframes heartbeat{0%,100%{transform:scale(1)}14%{transform:scale(1.3)}28%{transform:scale(1)}}
@keyframes bvFadeIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

/* ===== SCREENS ===== */
.screen{display:none;min-height:100vh;width:100%;align-items:center;justify-content:center;flex-direction:column;padding:20px;text-align:center;position:relative;overflow:hidden}
.screen.active{display:flex;animation:fadeUp .5s ease forwards}

/* ===== INTRO ===== */
#intro{background:linear-gradient(145deg,#f7971e 0%,#ffd200 55%,#f7971e 100%)}
.i-sun{position:absolute;top:-80px;right:-80px;width:240px;height:240px;background:radial-gradient(circle,rgba(255,255,255,.45),transparent);border-radius:50%;animation:shimmer 3s ease-in-out infinite}
.i-ground{position:absolute;bottom:0;left:0;right:0;height:90px;background:linear-gradient(180deg,#7ec850,#5a9e3a);border-radius:60% 60% 0 0 / 30px}
.i-cloud{position:absolute;background:rgba(255,255,255,.5);border-radius:50px}
.i-cloud1{width:90px;height:36px;top:18%;left:8%}
.i-cloud2{width:120px;height:44px;top:28%;right:6%}
.i-mascot{font-size:100px;animation:float 2.5s ease-in-out infinite;filter:drop-shadow(0 10px 22px rgba(0,0,0,.22));margin-bottom:8px;position:relative;z-index:2}
.i-title{font-size:clamp(44px,10vw,72px);font-weight:700;color:#fff;text-shadow:0 4px 22px rgba(0,0,0,.25);line-height:1;margin-bottom:6px;position:relative;z-index:2}
.i-badges{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:18px;position:relative;z-index:2}
.i-badge{background:rgba(255,255,255,.28);padding:8px 18px;border-radius:30px;font-size:14px;font-weight:600;backdrop-filter:blur(4px);color:rgba(255,255,255,.95);display:flex;align-items:center;gap:5px}
.fstars{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1}
.fstar{position:absolute;bottom:-20px;animation:starFloat linear infinite}

.btn-play{background:#fff;color:#f7971e;font-family:var(--font);font-size:24px;font-weight:700;padding:18px 60px;border:none;border-radius:50px;cursor:pointer;box-shadow:0 10px 32px rgba(0,0,0,.22);transition:transform .2s,box-shadow .2s;position:relative;z-index:2;margin-top:20px;animation:glow 2s ease-in-out infinite}
.btn-play:hover{transform:scale(1.07) translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.3)}
.btn-play:active{transform:scale(.96)}

/* ===== HUD ===== */
#hud{position:fixed;top:0;left:0;right:0;z-index:300;background:rgba(0,0,0,.42);backdrop-filter:blur(16px);padding:10px 16px;display:none;align-items:center;justify-content:space-between;gap:8px;border-bottom:1px solid rgba(255,255,255,.08)}
.hud-prog{display:flex;gap:8px;align-items:center}
.hdot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .4s}
.hdot.done{background:var(--yellow);box-shadow:0 0 8px var(--yellow)}
.hdot.now{background:#fff;width:28px;border-radius:6px;animation:pulse 1s infinite}
.hud-right{display:flex;align-items:center;gap:14px}
.h-stars{display:flex;align-items:center;gap:5px;font-size:22px;font-weight:700;color:var(--yellow);text-shadow:0 2px 8px rgba(0,0,0,.3)}
.h-stars span{font-size:13px;color:rgba(255,255,255,.6);font-weight:600}

/* streak badge */
.streak-badge{background:linear-gradient(135deg,#ff6b6b,#ffd200);border-radius:30px;padding:4px 12px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px}

/* ===== GAME ===== */
#game{justify-content:flex-start;padding-top:76px}
#wrap{max-width:600px;width:100%;padding:0 14px 60px}

/* ===== CARD ===== */
.card{background:#fff;border-radius:var(--radius-card);padding:22px 18px 24px;box-shadow:0 20px 60px rgba(0,0,0,.35);animation:fadeUp .4s ease;color:#222}
.phase-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:30px;padding:6px 16px;font-size:12px;font-weight:600;letter-spacing:.5px;margin-bottom:10px;backdrop-filter:blur(4px)}

/* scene */
.scene-stage{border-radius:18px;padding:16px;margin-bottom:14px;display:flex;align-items:flex-end;justify-content:center;gap:18px;flex-wrap:wrap;min-height:130px;position:relative;overflow:hidden}
.cblk{display:flex;flex-direction:column;align-items:center;gap:6px}
.cemoji{font-size:clamp(50px,12vw,68px);animation:float 3s ease-in-out infinite;filter:drop-shadow(0 5px 12px rgba(0,0,0,.18))}
.cemoji2{animation-delay:-1.5s}
.cname{background:rgba(255,255,255,.9);border-radius:20px;padding:3px 13px;font-size:11px;font-weight:700;color:#333}
.time-tag{position:absolute;top:10px;left:12px;background:rgba(0,0,0,.28);color:#fff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;backdrop-filter:blur(4px)}
.sit-text{font-size:15px;font-weight:600;color:#333;margin-bottom:12px;line-height:1.55}

/* Reduced info box — icon + short text only */
.mini-info{display:flex;align-items:center;gap:10px;border-radius:14px;padding:12px 14px;margin-bottom:14px}
.mi-ico{font-size:30px;flex-shrink:0}
.mi-txt{font-size:13px;font-weight:600;color:#444;line-height:1.5}

/* ===== RESPONSIBILITY GRID ===== */
.rq-label{font-size:16px;font-weight:700;color:#222;margin-bottom:14px;text-align:center}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:12px}
.rbtn{background:#f7f7f7;border:3px solid #eee;border-radius:20px;padding:18px 10px 14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .22s;font-family:var(--font);position:relative;overflow:hidden}
.rbtn:hover{border-color:var(--orange);transform:scale(1.05);box-shadow:0 6px 18px rgba(247,151,30,.25)}
.rbtn:active{transform:scale(.96)}
.rbtn .re{font-size:42px;display:block}
.rbtn .rl{font-size:12px;font-weight:700;color:#555;text-align:center;line-height:1.3}
.rbtn.correct{border-color:#00c853!important;background:#e8f5e9!important;animation:bounce .55s}
.rbtn.wrong{border-color:#ff1744!important;background:#ffebee!important;animation:shake .45s}
.rbtn.glow-correct{animation:glow .6s ease}

/* ===== CHOICE BUTTONS ===== */
.choices{display:flex;flex-direction:column;gap:10px}
.chbtn{background:#f7f7f7;border:3px solid #eee;border-radius:18px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;text-align:left;transition:all .22s;font-family:var(--font);width:100%}
.chbtn:hover{border-color:var(--orange);transform:translateX(6px);box-shadow:0 5px 16px rgba(247,151,30,.22)}
.chbtn:active{transform:translateX(2px)}
.ci{font-size:30px;min-width:36px}
.ct{font-size:13px;font-weight:700;color:#333;line-height:1.4}
.chbtn.ch-good{border-color:#00c853!important;background:#e8f5e9!important;animation:bounce .5s}
.chbtn.ch-bad{border-color:#ff1744!important;background:#ffebee!important;animation:shake .4s}

/* ===== MATCH ACTIVITY ===== */
.match-title{font-size:15px;font-weight:700;color:#222;margin-bottom:14px;text-align:center}
.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.match-left,.match-right{display:flex;flex-direction:column;gap:8px}
.match-item{border-radius:14px;padding:12px 10px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;line-height:1.3;transition:all .22s;user-select:none}
.match-scenario{background:#f0f4ff;border:2px solid #c7d4ff;color:#333;font-size:13px}
.match-resp{background:#fff7e0;border:2px solid #ffe082;color:#333}
.match-item:hover{transform:scale(1.03);box-shadow:0 4px 14px rgba(0,0,0,.1)}
.match-item.selected{border-color:var(--orange);background:#fff3e0;transform:scale(1.04)}
.match-item.matched{border-color:#00c853;background:#e8f5e9;pointer-events:none}
.match-item.wrong-flash{animation:shake .4s;border-color:#ff1744;background:#ffebee}
.match-emoji{font-size:24px;flex-shrink:0}

/* ===== SORT ACTIVITY ===== */
.sort-instr{font-size:13px;font-weight:600;color:#888;margin-bottom:12px;text-align:center}
.sort-list{display:flex;flex-direction:column;gap:8px}
.sort-item{background:#f7f7f7;border:2px solid #eee;border-radius:14px;padding:12px 14px;cursor:grab;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:700;color:#333;transition:all .2s;user-select:none}
.sort-item:active{cursor:grabbing;transform:scale(1.03);background:#fff9e0;border-color:var(--orange)}
.sort-item.drag-over{border-color:var(--blue);background:#e3f6f8}
.sort-item .sort-e{font-size:28px}
.sort-item .sort-rank{width:26px;height:26px;background:var(--orange);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}

/* ===== RESULT ===== */
.rvis{border-radius:18px;padding:18px;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:16px;min-height:110px}
.rfrom{font-size:54px}
.rarrow{font-size:28px;font-weight:900;animation:pulse 1s infinite}
.rto{font-size:54px;animation:popIn .6s ease forwards}
.rmsg{font-size:14px;font-weight:600;color:#444;margin-bottom:14px;line-height:1.6}
.lesson-card{border-radius:16px;padding:16px;margin-bottom:14px;color:#fff;display:flex;gap:12px;align-items:flex-start}
.lesson-ico{font-size:32px;flex-shrink:0}
.lesson-txt{font-size:13px;font-weight:600;line-height:1.6}
.star-row{display:flex;align-items:center;justify-content:center;gap:8px;font-size:28px;margin-bottom:14px}

/* ===== FEEDBACK BUBBLE ===== */
.fb{border-radius:14px;padding:12px 16px;text-align:center;margin-top:10px;animation:fadeUp .4s ease}
.fb.good{background:#e8f5e9;border:2px solid #a5d6a7}
.fb.bad{background:#fff3e0;border:2px solid #ffcc80}
.fb-ico{font-size:32px;margin-bottom:4px}
.fb-hd{font-size:15px;font-weight:800}
.fb.good .fb-hd{color:#2e7d32}
.fb.bad .fb-hd{color:#e65100}
.fb-sub{font-size:12px;color:#666;margin-top:3px}

/* Score pop */
.score-pop{position:fixed;font-size:28px;font-weight:900;color:var(--yellow);text-shadow:0 2px 8px rgba(0,0,0,.3);pointer-events:none;z-index:9999;animation:scoreUp 1.2s ease forwards}

/* Ring pop */
.ring-pop{position:fixed;width:80px;height:80px;border:4px solid var(--yellow);border-radius:50%;pointer-events:none;z-index:9998;animation:ringPop .8s ease forwards}

/* ===== BTN NEXT ===== */
.btn-next{color:#fff;font-family:var(--font);font-size:18px;font-weight:700;padding:15px 38px;border:none;border-radius:50px;cursor:pointer;transition:transform .2s,box-shadow .2s;width:100%}
.btn-next:hover{transform:scale(1.04);box-shadow:0 8px 22px rgba(0,0,0,.22)}
.btn-next:active{transform:scale(.97)}

/* ===== END ===== */
#end{background:linear-gradient(145deg,#f7971e 0%,#ffd200 55%,#f7971e 100%)}
.end-sun{position:absolute;top:-90px;left:50%;transform:translateX(-50%);width:280px;height:280px;background:radial-gradient(circle,rgba(255,255,255,.38),transparent);border-radius:50%;pointer-events:none}
.cert{background:#fff;border-radius:30px;padding:30px 22px;max-width:480px;width:100%;box-shadow:0 22px 64px rgba(0,0,0,.28);position:relative;z-index:2}
.c-emoji{font-size:78px;animation:bounce 1.2s ease infinite;margin-bottom:8px}
.c-rank{font-size:clamp(22px,5.5vw,30px);font-weight:700;color:var(--orange);margin-bottom:4px}
.c-stars-row{font-size:30px;margin-bottom:6px}
.c-score{font-size:16px;font-weight:700;color:#555;margin-bottom:16px}
.c-bar-wrap{background:#eee;border-radius:8px;height:14px;margin-bottom:18px;overflow:hidden}
.c-bar{height:100%;background:linear-gradient(90deg,#f7971e,#ffd200);border-radius:8px;transition:width 1.5s ease}
.resp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;text-align:left}
.resp-card{background:#fff9ee;border-radius:14px;padding:12px;border:2px solid rgba(247,151,30,.2)}
.rc-ico{font-size:28px;margin-bottom:4px}
.rc-name{font-size:12px;font-weight:800;color:#e65100}
.rc-tip{font-size:11px;color:#666;line-height:1.4;margin-top:2px}
.c-msg{font-size:13px;color:#666;line-height:1.6;margin-bottom:18px}
.btn-replay{font-family:var(--font);font-size:16px;font-weight:700;padding:14px 28px;border:none;border-radius:50px;cursor:pointer;transition:transform .2s;width:100%;color:#fff;background:linear-gradient(135deg,#f7971e,#ffd200);box-shadow:0 6px 20px rgba(0,0,0,.2)}
.btn-replay:hover{transform:scale(1.05)}

/* confetti */
.cp{position:fixed;top:-20px;pointer-events:none;z-index:9990;animation:confettiFall linear forwards;border-radius:3px}

/* ===== SCENE BGs ===== */
.bg-morning{background:linear-gradient(135deg,#ffecd2,#fcb69f)}
.bg-school{background:linear-gradient(135deg,#a1c4fd,#c2e9fb)}
.bg-afternoon{background:linear-gradient(135deg,#d4fc79,#96e6a1)}
.bg-evening{background:linear-gradient(135deg,#fbc2eb,#a6c1ee)}
.bg-night{background:linear-gradient(135deg,#2c3e50,#4a6fa5)}
.gbg1{background:linear-gradient(145deg,#7f4a00,#c47a1e,#e8a020)!important}
.gbg2{background:linear-gradient(145deg,#0d2b5e,#1a4080,#1565c0)!important}
.gbg3{background:linear-gradient(145deg,#1a3a0d,#2d6b1a,#388e3c)!important}
.gbg4{background:linear-gradient(145deg,#3a0d4a,#6b1a7a,#8e1fa2)!important}
.gbg5{background:linear-gradient(145deg,#0a0e1a,#141c33,#1a2550)!important}
.gbg6{background:linear-gradient(145deg,#1a0d2e,#2d1a50,#3d2470)!important}
.gbg7{background:linear-gradient(145deg,#0d2e1a,#1a5030,#1e6b3c)!important}

/* Bhava menu */
.bv-menu-btn{position:fixed;top:14px;right:16px;z-index:9999;background:#3b5bdb;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:20px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.bv-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:10000;justify-content:center;align-items:center}
.bv-overlay.active{display:flex}
.bv-box{background:#fff;border-radius:14px;padding:24px;width:270px;box-shadow:0 8px 32px rgba(0,0,0,.25);animation:bvFadeIn .2s ease}
.bv-box h3{text-align:center;margin:0 0 16px;color:#333;font-size:18px}
.bv-box a{display:block;padding:13px 0;border-bottom:1px solid #eee;color:#333;text-decoration:none;font-size:16px;cursor:pointer}
.bv-box a:last-child{border-bottom:none;color:#e53}
.bv-box a:hover{color:#3b5bdb}

@media(max-width:380px){.rgrid{grid-template-columns:1fr 1fr}.cemoji{font-size:44px!important}.rbtn .re{font-size:34px}}

        /* ===== Bhava Layout Fix v2 ===================================
           Prevents game buttons/options from being clipped at bottom.
           ============================================================ */
        body {
            align-items: flex-start !important;
            overflow-y: auto !important;
            padding: 16px !important;
        }
        #iq-app, #app, #game-app, #quiz-app, #game-container,
        #main-container, #container, #game-wrapper,
        [id$="-app"], [id$="-game"], [id$="-container"] {
            max-height: none !important;
            overflow: visible !important;
            overflow-y: visible !important;
        }
        .options, .choices, .answer-grid, .btn-grid,
        .option-container, #option-container {
            overflow: visible !important;
        }
        /* ============================================================ */
        </style>
</head>
<body>

<!-- INTRO -->
<div class="screen active" id="intro">
  <div class="i-sun"></div>
  <div class="i-ground"></div>
  <div class="i-cloud i-cloud1"></div>
  <div class="i-cloud i-cloud2"></div>
  <div class="fstars" id="fstars"></div>
  <div class="i-mascot">🦸</div>
  <div class="i-title">Day Hero!</div>
  <div class="i-badges">
    <div class="i-badge">🏫 Ages 7–14</div>
    <div class="i-badge">☀️ Full Day</div>
    <div class="i-badge">⭐ Earn Stars</div>
    <div class="i-badge">🏆 Win Badge</div>
  </div>
  <button class="btn-play" id="playBtn">▶ Let's Go!</button>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-prog" id="hdots"></div>
  <div class="hud-right">
    <div class="streak-badge" id="streakBadge" style="display:none">🔥 <span id="streakNum">0</span></div>
    <div class="h-stars">⭐ <span id="hscore">0</span></div>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="game">
  <div id="wrap"><div id="gc"></div></div>
</div>

<!-- END -->
<div class="screen" id="end">
  <div class="end-sun"></div>
  <div class="cert" id="cert"></div>
</div>

<!-- Bhava Menu -->
<button class="bv-menu-btn" onclick="bvOpenMenu()">☰</button>
<div class="bv-overlay" id="bvOverlay" onclick="bvCloseMenu()">
  <div class="bv-box" onclick="event.stopPropagation()">
    <h3>☰ Menu</h3>
    <a href="/index.html">🏠 Home</a>
    <a href="/about.html">ℹ️ About</a>
    <a href="/feedback.html">📝 Feedback</a>
    <a onclick="history.back()">← Go Back</a>
    <a onclick="bvCloseMenu()">✕ Close</a>
  </div>
</div>

<script>
// ============ SOUND ENGINE ============
var AudioCtx = window.AudioContext || window.webkitAudioContext;
var actx = null;
function ensureAudio() {
  if (!actx) { try { actx = new AudioCtx(); } catch(e) {} }
  if (actx && actx.state === 'suspended') actx.resume();
}
function playTone(type, freq, dur, vol, delay) {
  ensureAudio(); if (!actx) return;
  try {
    var o = actx.createOscillator();
    var g = actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.type = type; o.frequency.value = freq;
    var t = actx.currentTime + (delay || 0);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol || 0.18, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur + 0.05);
  } catch(e) {}
}
function playSuccess() {
  playTone('triangle',523,.12,.2,0); playTone('triangle',659,.12,.2,.1);
  playTone('triangle',784,.18,.2,.2); playTone('triangle',1047,.3,.22,.32);
}
function playWrong() {
  playTone('sawtooth',200,.08,.15,0); playTone('sawtooth',150,.15,.15,.09);
}
function playClick() {
  playTone('sine',880,.06,.12,0);
}
function playStar() {
  [0,.07,.14,.21].forEach(function(d,i){
    playTone('sine',[1047,1175,1319,1568][i],.1,.18,d);
  });
}
function playWin() {

var idx=0, score=0, streak=0, MAX=SC.length*5;

// ============ UTILS ============
function show(id){
  ["intro","game","end"].forEach(function(s){document.getElementById(s).classList.remove("active")});
  document.getElementById(id).classList.add("active");
}
function gc(html){document.getElementById("gc").innerHTML=html;window.scrollTo({top:0,behavior:"smooth"})}
function updateHud(){
  document.getElementById("hud").style.display="flex";
  var dots=document.getElementById("hdots");dots.innerHTML="";
  for(var i=0;i<SC.length;i++){var d=document.createElement("div");d.className="hdot"+(i<idx?" done":i===idx?" now":"");dots.appendChild(d);}
  document.getElementById("hscore").textContent=score;
  var sb=document.getElementById("streakBadge");
  if(correctStreak>=2){sb.style.display="flex";document.getElementById("streakNum").textContent=correctStreak;}
  else{sb.style.display="none";}
}

function spawnScorePop(pts, x, y){
  var el=document.createElement("div");
  el.className="score-pop";
  el.textContent="+"+pts+" ⭐";
  el.style.left=(x-20)+"px";el.style.top=(y-20)+"px";
  document.body.appendChild(el);
  setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},1300);
  var ring=document.createElement("div");
  ring.className="ring-pop";
  ring.style.left=(x-40)+"px";ring.style.top=(y-40)+"px";
  document.body.appendChild(ring);
  setTimeout(function(){if(ring.parentNode)ring.parentNode.removeChild(ring);},900);
}

function spawnConfetti(n){
  var cols=["#ffd200","#f7971e","#38ef7d","#ff6b6b","#4ecdc4","#c850c0","#a1c4fd"];
  for(var i=0;i<n;i++){
    (function(delay){
      setTimeout(function(){
        var p=document.createElement("div");p.className="cp";
        p.style.left=Math.random()*100+"vw";
        p.style.width=(6+Math.random()*10)+"px";p.style.height=(6+Math.random()*10)+"px";
        p.style.background=cols[Math.floor(Math.random()*cols.length)];
        p.style.borderRadius=Math.random()>.5?"50%":"3px";
        p.style.animationDuration=(2+Math.random()*3)+"s";
        document.body.appendChild(p);
        setTimeout(function(){if(p.parentNode)p.parentNode.removeChild(p);},5500);
      },delay);
    })(i*50);
  }
}

document.getElementById("playBtn").addEventListener("click",function(){ensureAudio();playClick();startGame();});
initStars();

function initStars(){
  var c=document.getElementById("fstars");
  var em=["⭐","✨","🌟","🎀","💧","💖"];
  for(var i=0;i<22;i++){var d=document.createElement("div");d.className="fstar";d.textContent=em[i%em.length];d.style.left=(Math.random()*95)+"%";d.style.fontSize=(11+Math.random()*16)+"px";d.style.animationDuration=(3+Math.random()*6)+"s";d.style.animationDelay=(Math.random()*7)+"s";c.appendChild(d);}
}

function startGame(){idx=0;score=0;correctStreak=0;show("game");document.getElementById("game").style.background=getGbgColor(0);updateHud();renderScene();}

function getGbgColor(i){var s=SC[i];return s?s.gbg.replace("!important",""):"linear-gradient(145deg,#1a1a2e,#2a2a4e)";}

function renderScene(){
  var s=SC[idx];
  gc('<div class="phase-pill">'+s.icon+' Challenge '+(idx+1)+' of '+SC.length+'</div>'+
  '<div class="card">'+
  '<div class="scene-stage '+s.bg+'">'+
  '<div class="time-tag">'+s.timeTag+'</div>'+
  '<div class="cblk"><div class="cemoji">'+s.char+'</div><div class="cname">'+s.charName+'</div></div>'+
  '<div style="font-size:20px">💬</div>'+
  '<div class="cblk"><div class="cemoji cemoji2">'+s.env+'</div><div class="cname">'+s.envName+'</div></div>'+
  '</div>'+
  '<div class="sit-text">'+s.sit+'</div>'+
  '<div class="mini-info" style="background:'+s.accent+'18;border:2px solid '+s.accent+'30">'+
  '<div class="mi-ico">👁️</div><div class="mi-txt">'+s.sceneDetail+'</div></div>'+
  '<button class="btn-next" style="background:linear-gradient(135deg,'+s.accent+','+s.accent+'bb)" onclick="startActivity()">'+
  '🎯 Let\'s Play!</button></div>');
}

function startActivity(){
  playClick();
  var s=SC[idx];
  if(s.type==="detect") renderDetect();
  else if(s.type==="match") renderMatch();
  else if(s.type==="sort") renderSort();
}

function renderDetect(){
  var s=SC[idx];
  var btns=s.resps.map(function(r,i){return '<button class="rbtn" id="rb'+i+'" onclick="pickResp('+i+',event)"><span class="re">'+r.e+'</span><span class="rl">'+r.l+'</span></button>';}).join("");
  gc('<div class="phase-pill">🔍 Spot It!</div>'+
  '<div class="card">'+
  '<div style="font-size:52px;text-align:center;margin-bottom:12px;animation:float 3s ease-in-out infinite">'+s.char+'</div>'+
  '<div class="rq-label">'+s.rq+'</div>'+
  '<div class="rgrid">'+btns+'</div>'+
  '<div id="rfb"></div></div>');
}

function pickResp(i,e){
  playTick();
  var s=SC[idx];var ok=(i===s.correct);
  var btns=document.querySelectorAll(".rbtn");
  for(var j=0;j<btns.length;j++){btns[j].setAttribute("onclick","");btns[j].style.pointerEvents="none";if(j===s.correct)btns[j].classList.add("correct");else if(j===i&&!ok)btns[j].classList.add("wrong");}
  if(ok){score+=2;correctStreak++;playStar();spawnScorePop(2,e.clientX,e.clientY);updateHud();}
  else{playWrong();correctStreak=0;updateHud();}
  var fb=document.getElementById("rfb");
  fb.className="fb "+(ok?"good":"bad");
  fb.innerHTML=ok?'<div class="fb-ico">🎯</div><div class="fb-hd">Spot on! +2 ⭐</div><div class="fb-sub">'+s.revealTxt+'</div>':'<div class="fb-ico">💭</div><div class="fb-hd">Nearly!</div><div class="fb-sub">Answer: '+(s.resps?s.resps[s.correct].e+' '+s.resps[s.correct].l:'See above')+'</div>';
  setTimeout(function(){renderChoice();},1800);
}

// ====== MATCH ACTIVITY ======
function renderMatch(){
  var s=SC[idx];
  var shuffled=s.matchPairs.slice().sort(function(){return Math.random()-.5;});
  var scenarios=shuffled.map(function(p,i){return'<div class="match-item match-scenario" data-idx="'+i+'" onclick="selectScenario('+i+')"><span class="match-emoji">'+p.scenario.e+'</span>'+p.scenario.t+'</div>';}).join("");
  var resps=shuffled.map(function(p,i){return'<div class="match-item match-resp" data-idx="'+i+'" onclick="selectResp('+i+')"><span class="match-emoji">'+p.resp.e+'</span>'+p.resp.t+'</div>';}).join("");
  // store shuffled order
  window._matchData={pairs:shuffled,selectedS:-1,selectedR:-1,matched:0};
  gc('<div class="phase-pill">🔗 Match It!</div>'+
  '<div class="card">'+
  '<div class="match-title">Match each scene with its responsibility!</div>'+
  '<div class="match-wrap"><div class="match-left" id="mLeft">'+scenarios+'</div><div class="match-right" id="mRight">'+resps+'</div></div>'+
  '<div id="mfb" style="margin-top:10px"></div></div>');
}

function selectScenario(i){
  playTick();
  var d=window._matchData;
  if(d.pairs[i]._matched) return;
  d.selectedS=i;
  document.querySelectorAll(".match-scenario").forEach(function(el,j){el.classList.toggle("selected",j===i);});
  if(d.selectedR>=0) doMatch();
}
function selectResp(i){
  playTick();
  var d=window._matchData;
  if(d.pairs[i]._matched) return;
  d.selectedR=i;
  document.querySelectorAll(".match-resp").forEach(function(el,j){el.classList.toggle("selected",j===i);});
  if(d.selectedS>=0) doMatch();
}
function doMatch(){
  var d=window._matchData;
  var si=d.selectedS,ri=d.selectedR;
  var correct=(si===ri); // same index means same pair in shuffled array
  var sEl=document.querySelectorAll(".match-scenario")[si];
  var rEl=document.querySelectorAll(".match-resp")[ri];
  if(correct){
    playMatchPop();score+=1;correctStreak++;updateHud();
    sEl.classList.remove("selected");rEl.classList.remove("selected");
    sEl.classList.add("matched");rEl.classList.add("matched");
    d.pairs[si]._matched=true;d.matched++;
    if(d.matched===d.pairs.length){
      score+=1;updateHud();playStar();spawnConfetti(20);
      setTimeout(function(){renderChoice();},1200);
    }
  } else {
    playWrong();correctStreak=0;updateHud();
    sEl.classList.remove("selected");rEl.classList.remove("selected");
    sEl.classList.add("wrong-flash");rEl.classList.add("wrong-flash");
    setTimeout(function(){sEl.classList.remove("wrong-flash");rEl.classList.remove("wrong-flash");},600);
  }
  d.selectedS=-1;d.selectedR=-1;
  document.querySelectorAll(".match-scenario,.match-resp").forEach(function(el){el.classList.remove("selected");});
}

// ====== SORT ACTIVITY ======
function renderSort(){
  var s=SC[idx];
  var items=s.sortItems.slice().sort(function(){return Math.random()-.5;});
  window._sortData={items:items,correct:s.sortItems,dragIdx:-1};
  var html=items.map(function(it,i){
    return '<div class="sort-item" draggable="true" data-i="'+i+'" ondragstart="sortDragStart('+i+')" ondragover="sortDragOver(event,'+i+')" ondrop="sortDrop('+i+')" ondragend="sortDragEnd()"><span class="sort-e">'+it.e+'</span>'+it.t+'</div>';
  }).join("");
  gc('<div class="phase-pill">📋 Put In Order!</div>'+
  '<div class="card">'+
  '<div class="match-title">Drag to put steps in the right order! 🔢</div>'+
  '<div class="sort-instr">What should you do first?</div>'+
  '<div class="sort-list" id="sortList">'+html+'</div>'+
  '<div id="sfb" style="margin-top:12px"></div>'+
  '<button class="btn-next" style="background:linear-gradient(135deg,'+s.accent+','+s.accent+'bb);margin-top:14px" onclick="checkSort()">✅ Check Order!</button></div>');
}
function sortDragStart(i){playDrag();window._sortData.dragIdx=i;document.querySelectorAll(".sort-item")[i].style.opacity=".5";}
function sortDragOver(e,i){e.preventDefault();document.querySelectorAll(".sort-item").forEach(function(el){el.classList.remove("drag-over");});document.querySelectorAll(".sort-item")[i].classList.add("drag-over");}
function sortDrop(i){
  var d=window._sortData;var from=d.dragIdx;if(from===i)return;
  var tmp=d.items[from];d.items[from]=d.items[i];d.items[i]=tmp;
  var list=document.getElementById("sortList");
  var els=list.querySelectorAll(".sort-item");
  d.items.forEach(function(it,j){
    els[j].querySelector(".sort-e").textContent=it.e;
    els[j].childNodes[1].textContent=it.t;
    els[j].setAttribute("data-i",j);
    els[j].setAttribute("ondragstart","sortDragStart("+j+")");
    els[j].setAttribute("ondragover","sortDragOver(event,"+j+")");
    els[j].setAttribute("ondrop","sortDrop("+j+")");
  });
}
function sortDragEnd(){window._sortData.dragIdx=-1;document.querySelectorAll(".sort-item").forEach(function(el){el.style.opacity="1";el.classList.remove("drag-over");});}
function checkSort(){
  playTick();
  var d=window._sortData;var s=SC[idx];
  var correct=true;
  for(var i=0;i<d.items.length;i++){if(d.items[i].order!==s.sortItems[i].order){correct=false;break;}}
  // Show order numbers
  document.querySelectorAll(".sort-item").forEach(function(el,i){
    var num=document.createElement("div");num.className="sort-rank";num.textContent=(i+1);
    el.insertBefore(num,el.firstChild);
    el.draggable=false;el.style.cursor="default";
    el.setAttribute("ondragstart","");el.setAttribute("ondragover","");el.setAttribute("ondrop","");
  });
  var fb=document.getElementById("sfb");
  if(correct){
    score+=3;correctStreak++;playStar();spawnConfetti(22);updateHud();
    fb.className="fb good";fb.innerHTML='<div class="fb-ico">🏆</div><div class="fb-hd">Perfect Order! +3 ⭐</div>';
  } else {
    var pts=1;score+=pts;correctStreak=0;playSuccess();updateHud();
    fb.className="fb bad";fb.innerHTML='<div class="fb-ico">💡</div><div class="fb-hd">Good try! +1 ⭐ — Right order shown above!</div>';
    // show correct
    var correctOrder=s.sortItems.slice().sort(function(a,b){return a.order-b.order;});
    document.querySelectorAll(".sort-item").forEach(function(el,i){
      el.querySelector(".sort-e").textContent=correctOrder[i].e;
      el.childNodes[el.childNodes.length-1].textContent=correctOrder[i].t;
    });
  }
  // Disable check button
  document.querySelector(".btn-next[onclick='checkSort()']").style.display="none";
  var nextBtn=document.createElement("button");
  nextBtn.className="btn-next";nextBtn.style.cssText="background:linear-gradient(135deg,"+s.accent+","+s.accent+"bb);margin-top:12px";
  nextBtn.textContent="➡️ Next!";nextBtn.onclick=function(){renderChoice();};
  document.getElementById("sfb").after(nextBtn);
}

// ====== CHOICE ======
function renderChoice(){
  var s=SC[idx];
  var choiceBtns=s.choices.map(function(c,i){return'<button class="chbtn" onclick="pickChoice('+i+',event)"><span class="ci">'+c.e+'</span><span class="ct">'+c.t+'</span></button>';}).join("");
  gc('<div class="phase-pill">⚡ Your Move!</div>'+
  '<div class="card">'+
  '<div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px">'+
  '<span style="font-size:52px">'+s.char+'</span>'+
  '<span style="font-size:22px;color:#ccc">→</span>'+
  '<span style="font-size:52px">'+s.env+'</span></div>'+
  '<div class="mini-info" style="background:'+s.accent+'15;border:2px solid '+s.accent+'25">'+
  '<div class="mi-ico">'+(s.resps?s.resps[s.correct].e:'💡')+'</div>'+
  '<div class="mi-txt"><strong>'+s.revealTxt+'</strong><br>'+s.infoTxt+'</div></div>'+
  '<div style="font-size:15px;font-weight:700;color:#222;margin-bottom:12px">'+s.cq+'</div>'+
  '<div class="choices">'+choiceBtns+'</div></div>');
}

function pickChoice(i,e){
  var s=SC[idx];var good=s.choices[i].good;
  var btns=document.querySelectorAll(".chbtn");
  btns.forEach(function(b){b.setAttribute("onclick","");b.style.pointerEvents="none";});
  btns[i].classList.add(good?"ch-good":"ch-bad");
  if(good){score+=3;correctStreak++;playStar();spawnConfetti(28);spawnScorePop(3,e.clientX,e.clientY);}
  else{score=Math.max(0,score);correctStreak=0;playWrong();}
  updateHud();
  setTimeout(function(){renderResult(good);},1600);
}

function renderResult(good){
  var s=SC[idx];var r=good?s.rgood:s.rbad;
  var arrowCol=good?"#00c853":"#ff5722";
  var starsHtml=good?"⭐⭐⭐":"⭐";
  var nextTxt=(idx+1<SC.length)?"➡️ Next Challenge":"🏆 My Results!";
  gc('<div class="phase-pill">'+(good?"🌟 Great Choice!":"💡 Learning Moment")+'</div>'+
  '<div class="card">'+
  '<div class="rvis '+s.bg+'">'+
  '<span class="rfrom">'+r.f+'</span>'+
  '<span class="rarrow" style="color:'+arrowCol+'">→</span>'+
  '<span class="rto">'+r.t+'</span></div>'+
  '<div class="rmsg">'+r.m+'</div>'+
  '<div class="lesson-card" style="background:linear-gradient(135deg,'+s.accent+','+s.accent+'aa)">'+
  '<div class="lesson-ico">💡</div>'+
  '<div class="lesson-txt">'+s.lesson+'</div></div>'+
  '<div class="star-row">'+starsHtml+'</div>'+
  '<button class="btn-next" style="background:linear-gradient(135deg,'+s.accent+','+s.accent+'aa)" onclick="nextChallenge()">'+nextTxt+'</button></div>');
  if(good){playWin();}else{playSuccess();}
}

function nextChallenge(){
  playClick();idx++;
  if(idx>=SC.length){endGame();return;}
  document.getElementById("game").style.background=getGbgColor(idx);
  updateHud();renderScene();
}

function endGame(){
  try { if (window.BhavaSession && typeof BhavaSession.end === 'function') { BhavaSession.end(score); } } catch(e) { console.warn('BhavaSession.end:', e.message); } // Bhava auto-tracked
  document.getElementById("hud").style.display="none";
  show("end");spawnConfetti(70);playWin();
  var pct=score/MAX;var rank,emoji,msg;
  if(pct>=.8){rank="Responsibility Hero! 🏆";emoji="🦸";msg="You crushed every challenge! You're ready for anything life throws at you! 💪";}
  else if(pct>=.5){rank="Rising Hero! 🌟";emoji="💪";msg="Building serious life skills! Keep practising every day — you're on the right path!";}
  else{rank="Hero in Training! 🌱";emoji="🌱";msg="Every hero starts somewhere. Try again — you've got this! 🔥";}
  var sc=Math.max(1,Math.round(pct*5));var stars="";for(var i=0;i<sc;i++)stars+="⭐";

  var cards=[
    {e:"⏳",n:"Time Mgmt",t:"Own your morning!"},
    {e:"🤝",n:"Accountability",t:"Be honest always!"},
    {e:"❗",n:"Reliability",t:"Keep every promise!"},
    {e:"👥",n:"Teamwork",t:"Others count on you!"},
    {e:"🏠",n:"Own Your Space",t:"Tidy = responsible!"}
  ];
  var rcards=cards.map(function(c){return'<div class="resp-card"><div class="rc-ico">'+c.e+'</div><div class="rc-name">'+c.n+'</div><div class="rc-tip">'+c.t+'</div></div>';}).join("");

  document.getElementById("cert").innerHTML='<div class="c-emoji">'+emoji+'</div>'+
  '<div class="c-rank">'+rank+'</div>'+
  '<div class="c-stars-row">'+stars+'</div>'+
  '<div class="c-score">⭐ '+score+' / '+MAX+' Stars</div>'+
  '<div class="c-bar-wrap"><div class="c-bar" id="cbar" style="width:0%"></div></div>'+
  '<div class="resp-grid">'+rcards+'</div>'+
  '<div class="c-msg">'+msg+'</div>'+
  '<button class="btn-replay" onclick="startGame()">🔄 Play Again!</button>';

  setTimeout(function(){var b=document.getElementById("cbar");if(b)b.style.width=Math.round(pct*100)+"%";},400);
}
