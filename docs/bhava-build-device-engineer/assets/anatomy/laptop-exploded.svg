<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 370">
<defs><linearGradient id="s" x2="0" y2="1"><stop stop-color="#263248"/><stop offset="1" stop-color="#101827"/></linearGradient><linearGradient id="lb" x2="1" y2="1"><stop stop-color="#42677c"/><stop offset="1" stop-color="#1e3848"/></linearGradient></defs>
<!-- typical laptop, base open / lower cover removed -->
