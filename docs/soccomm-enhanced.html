<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhāva Tech: Life-Linguistics Simulator</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; height: 100dvh; min-height: 100dvh; color: #fff;
        }
        #game-container {
            width: 100%; max-width: 450px; height: 95vh;
            background-color: #16213e; border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; overflow: hidden;
            position: relative;
        }
        #header-branding {
            text-align: center; font-size: 0.8rem; letter-spacing: 2px;
            color: #a29bfe; padding: 8px 0; background-color: #0b132b;
            text-transform: uppercase; font-weight: bold;
        }
        #ui-bar {
            padding: 12px 20px; background-color: #0f3460;
            display: flex; align-items: center; justify-content: space-between;
            font-size: 0.9rem; font-weight: bold;
        }
        #meter-container {
            width: 55%; height: 12px; background-color: #2f3640;
            border-radius: 6px; overflow: hidden;
        }
        #meter-fill {
            height: 100%; width: 50%; background-color: #fbc531;
            transition: width 0.4s ease, background-color 0.4s ease;
        }
        #stage {
            flex-grow: 1; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1f2a4f, #0b132b);
        }
        #character-expression {
            font-size: 90px; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center; text-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        #dialogue-box {
            background-color: rgba(11, 19, 43, 0.95); padding: 25px;
            border-top: 3px solid #e94560; height: 50%;
            display: flex; flex-direction: column; overflow-y: auto;
        }
        #npc-text {
            font-size: 1.05rem; margin-bottom: 20px; line-height: 1.5; color: #f1f2f6;
            border-left: 4px solid #a29bfe; padding-left: 15px;
        }
        .choice-btn {
            background-color: #e94560; color: white; border: none;
            padding: 14px 15px; margin-bottom: 10px; border-radius: 8px;
            font-size: 0.95rem; cursor: pointer; text-align: left;
            transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .choice-btn:hover { background-color: #ff5270; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.3); }
        .choice-btn:active { transform: translateY(0); }
        .nav-btn { background-color: #576574; }
        .nav-btn:hover { background-color: #8395a7; }
        .back-btn { background-color: #2f3542; border-left: 4px solid #7bed9f; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="header-branding">Bhāva Tech Life-Linguistics</div>
        <div id="ui-bar">
            <span>Social Score</span>
            <div id="meter-container"><div id="meter-fill"></div></div>
            <span id="meter-score" style="color:#ffd76a;font-size:0.85rem;min-width:32px;text-align:right">50</span>
        </div>
        <div id="session-bar" style="padding:6px 20px;background:#081228;display:flex;align-items:center;justify-content:space-between;font-size:0.78rem;color:#a29bfe;border-bottom:1px solid rgba(255,255,255,0.06);">
            <span>Session: <strong id="session-grade" style="color:#ffd76a">—</strong></span>
            <span id="session-detail" style="color:#718096">Start a scenario to begin</span>
        </div>
        <div id="stage"><div id="character-expression">🌐</div></div>
        <div id="dialogue-box">
            <div id="npc-text">"Initializing simulator..."</div>
            <div id="choices-container"></div>
        </div>
    </div>

    <button id="bvMenuBtn" style="position:fixed;top:12px;right:12px;z-index:9998;border:none;background:linear-gradient(135deg,rgba(162,155,254,.25),rgba(233,69,96,.2));border:1px solid rgba(162,155,254,.4);color:#fff;width:40px;height:40px;border-radius:12px;font-size:1.2rem;cursor:pointer;backdrop-filter:blur(8px);">☰</button>

    <div id="bvMenuOverlay" style="display:none;position:fixed;inset:0;z-index:9997;background:rgba(3,7,14,.88);backdrop-filter:blur(8px);align-items:center;justify-content:center;">
        <div style="background:#16213e;border:1px solid rgba(162,155,254,.2);border-radius:20px;padding:26px;width:min(340px,90vw);color:#fff;">
            <h3 style="margin:0 0 6px;font-size:1.3rem;color:#a29bfe;">Bhāva Tech</h3>
            <p style="margin:0 0 16px;color:#718096;font-size:.88rem;">Society & Communication · Life-Linguistics Simulator</p>
            <div style="display:flex;flex-direction:column;gap:10px;">
                <button onclick="document.getElementById('bvMenuOverlay').style.display='none'" style="padding:12px;border-radius:12px;border:1px solid rgba(162,155,254,.3);background:rgba(162,155,254,.1);color:#fff;cursor:pointer;font-size:.9rem;">🏠 Close Menu</button>
            </div>
            <p style="margin:16px 0 0;font-size:.75rem;color:#4a5568;text-align:center;">Bhāva Tech · Cognitive Skills Platform</p>
        </div>
    </div>

    <script>
        // ── Bhāva session state ──────────────────────────────────────────────
        const ENV_SESSIONS = {
            school:   { successCount: 0, totalSeen: 0 },
            relative: { successCount: 0, totalSeen: 0 },
            friend:   { successCount: 0, totalSeen: 0 },
            grandpa:  { successCount: 0, totalSeen: 0 },
            elder:    { successCount: 0, totalSeen: 0 }
        };

        const BHAVA_DOMAIN_MAP = {
            school:   { IQ: 0.30, EQ: 0.40, SQ: 0.30 },
            relative: { IQ: 0.10, EQ: 0.50, SQ: 0.40 },
            friend:   { IQ: 0.10, EQ: 0.50, SQ: 0.40 },
            grandpa:  { IQ: 0.10, EQ: 0.60, SQ: 0.30 },
            elder:    { IQ: 0.20, EQ: 0.30, SQ: 0.50 }
        };

        const backMap = {
            school_t1: 'menu_school_p1', school_t2: 'menu_school_p1', school_t3: 'menu_school_p1', school_t4: 'menu_school_p1', school_t5: 'menu_school_p1',
            school_t6: 'menu_school_p2', school_t7: 'menu_school_p2', school_t8: 'menu_school_p2', school_t9: 'menu_school_p2', school_t10: 'menu_school_p2',
            relative_t1: 'menu_relative_p1', relative_t2: 'menu_relative_p1', relative_t3: 'menu_relative_p1', relative_t4: 'menu_relative_p1', relative_t5: 'menu_relative_p1',
            relative_t6: 'menu_relative_p2', relative_t7: 'menu_relative_p2', relative_t8: 'menu_relative_p2', relative_t9: 'menu_relative_p2', relative_t10: 'menu_relative_p2',
            friend_t1: 'menu_friend_p1', friend_t2: 'menu_friend_p1', friend_t3: 'menu_friend_p1', friend_t4: 'menu_friend_p1', friend_t5: 'menu_friend_p1',
            friend_t6: 'menu_friend_p2', friend_t7: 'menu_friend_p2', friend_t8: 'menu_friend_p2', friend_t9: 'menu_friend_p2', friend_t10: 'menu_friend_p2',
            grandpa_t1: 'menu_grandpa_p1', grandpa_t2: 'menu_grandpa_p1', grandpa_t3: 'menu_grandpa_p1', grandpa_t4: 'menu_grandpa_p1', grandpa_t5: 'menu_grandpa_p1',
            grandpa_t6: 'menu_grandpa_p2', grandpa_t7: 'menu_grandpa_p2', grandpa_t8: 'menu_grandpa_p2', grandpa_t9: 'menu_grandpa_p2', grandpa_t10: 'menu_grandpa_p2',
            elder_t1: 'menu_elder_p1', elder_t2: 'menu_elder_p1', elder_t3: 'menu_elder_p1', elder_t4: 'menu_elder_p1', elder_t5: 'menu_elder_p1',
            elder_t6: 'menu_elder_p2', elder_t7: 'menu_elder_p2', elder_t8: 'menu_elder_p2', elder_t9: 'menu_elder_p2', elder_t10: 'menu_elder_p2',
        };

        let currentMeter = 50;
        let currentSceneKey = 'main_menu';

        function getEnvFromScene(sceneKey) {
            if (sceneKey.startsWith('school_') || sceneKey.startsWith('menu_school')) return 'school';
            if (sceneKey.startsWith('relative_') || sceneKey.startsWith('menu_relative')) return 'relative';
            if (sceneKey.startsWith('friend_') || sceneKey.startsWith('menu_friend')) return 'friend';
            if (sceneKey.startsWith('grandpa_') || sceneKey.startsWith('menu_grandpa')) return 'grandpa';
            if (sceneKey.startsWith('elder_') || sceneKey.startsWith('menu_elder')) return 'elder';
            return null;
        }

        function endBhavaEnvSession(env) {
            try {
                const session = ENV_SESSIONS[env];
                const pct = session.totalSeen > 0 ? session.successCount / session.totalSeen : 0;
                const rawScore = Math.round(Math.min(pct * 100, 100));
                const domains = BHAVA_DOMAIN_MAP[env] || { IQ: 0.33, EQ: 0.33, SQ: 0.34 };
                // Persist to localStorage
                const stored = JSON.parse(localStorage.getItem('bhava_soccomm_last') || '{}');
                stored[env] = {
                    rawScore,
                    domains,
                    pct: Math.round(pct * 100),
                    successCount: session.successCount,
                    totalSeen: session.totalSeen,
                    timestamp: Date.now(),
                    studentId: sessionStorage.getItem('bhava_student_id') || sessionStorage.getItem('bhavaStudentId') || sessionStorage.getItem('studentId') || null
                };
                localStorage.setItem('bhava_soccomm_last', JSON.stringify(stored));
                // Update session bar
                const grade = rawScore >= 80 ? 'S' : rawScore >= 60 ? 'A' : rawScore >= 40 ? 'B' : 'C';
                document.getElementById('session-grade').textContent = grade;
                document.getElementById('session-detail').textContent = env.charAt(0).toUpperCase() + env.slice(1) + ': ' + session.successCount + '/' + session.totalSeen + ' correct';
                // Call BhavaSession if available
                if (typeof BhavaSession !== 'undefined' && BhavaSession.end) {
                    BhavaSession.end(rawScore);
                }
                // Reset session counters for next time
                ENV_SESSIONS[env].successCount = 0;
                ENV_SESSIONS[env].totalSeen = 0;
            } catch(e) { /* silent no-op */ }
        }

        function updateScene(sceneKey) {
            currentSceneKey = sceneKey;
            const scene = storyData[sceneKey];

            document.getElementById('npc-text').innerText = scene.npcDialogue;
            document.getElementById('character-expression').innerText = scene.characterVisual;

            const charDiv = document.getElementById('character-expression');
            charDiv.style.transform = 'scale(1.1)';
            setTimeout(() => charDiv.style.transform = 'scale(1)', 250);

            const choicesContainer = document.getElementById('choices-container');
            choicesContainer.innerHTML = '';

            scene.choices.forEach(choice => {
                const btn = document.createElement('button');

                let btnClass = 'choice-btn';
                if (choice.isBackBtn) btnClass += ' back-btn';
                else if (choice.isNavBtn) btnClass += ' nav-btn';

                btn.className = btnClass;
                btn.innerText = choice.buttonText;
                btn.onclick = () => handleChoice(choice);
                choicesContainer.appendChild(btn);
            });

            // Fix 4 — back button on _start scenes
            if (sceneKey.endsWith('_start')) {
                const prefix = sceneKey.replace('_start', '');
                const backTarget = backMap[prefix];
                if (backTarget) {
                    const backBtn = document.createElement('button');
                    backBtn.className = 'choice-btn back-btn';
                    backBtn.innerText = '↩ Back to Menu';
                    backBtn.onclick = () => {
                        currentMeter = 50;
                        updateScene(backTarget);
                        document.getElementById('meter-fill').style.width = '50%';
                        document.getElementById('meter-fill').style.backgroundColor = '#fbc531';
                        document.getElementById('meter-score').textContent = '50';
                    };
                    choicesContainer.appendChild(backBtn);
                }
            }

            document.getElementById('dialogue-box').scrollTop = 0;
        }

        function handleChoice(choice) {
            // Bhāva tracking — detect if this is a scenario answer (not nav/back)
            if (!choice.resetMeter && !choice.isNavBtn && !choice.isBackBtn) {
                const env = getEnvFromScene(currentSceneKey);
                if (env && ENV_SESSIONS[env]) {
                    ENV_SESSIONS[env].totalSeen++;
                    if (choice.meterChange > 0) {
                        ENV_SESSIONS[env].successCount++;
                    }
                }
            }

            if (choice.resetMeter) {
                // End session for the environment we just completed
                const env = getEnvFromScene(currentSceneKey);
                if (env) endBhavaEnvSession(env);
                currentMeter = 50;
            } else {
                currentMeter += choice.meterChange;
                if (currentMeter > 100) currentMeter = 100;
                if (currentMeter < 0) currentMeter = 0;
            }

            const meterFill = document.getElementById('meter-fill');
            meterFill.style.width = currentMeter + '%';

            if (currentMeter > 65) meterFill.style.backgroundColor = '#2ed573';
            else if (currentMeter > 35) meterFill.style.backgroundColor = '#ffa502';
            else meterFill.style.backgroundColor = '#ff4757';

            // Fix 3 — update numeric score
            document.getElementById('meter-score').textContent = Math.round(currentMeter);

            updateScene(choice.nextScene);
        }

        const storyData = {

            main_menu: {
                npcDialogue: 'Select an environment to begin.',
                characterVisual: '🌐',
                choices: [
                    { buttonText: '🏫 The School', nextScene: 'menu_school_p1', meterChange: 0 },
                    { buttonText: '🏠 Relative\'s House', nextScene: 'menu_relative_p1', meterChange: 0 },
                    { buttonText: '🛋️ Friend\'s House', nextScene: 'menu_friend_p1', meterChange: 0 },
                    { buttonText: '🪑 Grandparents', nextScene: 'menu_grandpa_p1', meterChange: 0 },
                    { buttonText: '🌳 Community Elders', nextScene: 'menu_elder_p1', meterChange: 0 }
                ]
            },

            // ==========================================
            // 1. THE SCHOOL
            // ==========================================
            menu_school_p1: {
                npcDialogue: 'School Environment - Page 1:',
                characterVisual: '🏫',
                choices: [
                    { buttonText: '1. Did You Hear?', nextScene: 'school_t1_start', meterChange: 0 },
                    { buttonText: '2. The Blank Slides', nextScene: 'school_t2_start', meterChange: 0 },
                    { buttonText: '3. The Red Pen', nextScene: 'school_t3_start', meterChange: 0 },
                    { buttonText: '4. Hallway Target', nextScene: 'school_t4_start', meterChange: 0 },
                    { buttonText: '5. The Cracked Screen', nextScene: 'school_t5_start', meterChange: 0 },
                    { buttonText: '➡️ Next Page', nextScene: 'menu_school_p2', meterChange: 0, isNavBtn: true },
                    { buttonText: '⬅️ Back to Map', nextScene: 'main_menu', meterChange: 0, isBackBtn: true }
                ]
            },
            menu_school_p2: {
                npcDialogue: 'School Environment - Page 2:',
                characterVisual: '🏫',
                choices: [
                    { buttonText: '6. The Echo', nextScene: 'school_t6_start', meterChange: 0 },
                    { buttonText: '7. Just One Glance', nextScene: 'school_t7_start', meterChange: 0 },
                    { buttonText: '8. Who Are You Again?', nextScene: 'school_t8_start', meterChange: 0 },
                    { buttonText: '9. Punished Together', nextScene: 'school_t9_start', meterChange: 0 },
                    { buttonText: '10. The Secret Group', nextScene: 'school_t10_start', meterChange: 0 },
                    { buttonText: '⬅️ Previous Page', nextScene: 'menu_school_p1', meterChange: 0, isNavBtn: true },
                    { buttonText: '⬅️ Back to Map', nextScene: 'main_menu', meterChange: 0, isBackBtn: true }
                ]
            },
            school_t1_start: {
                npcDialogue: '"I heard you were talking trash about my project!"', characterVisual: '😤',
                choices: [
                    { buttonText: 'Aggressive: "Who told you that? You\'re liars!"', nextScene: 'school_t1_fail', meterChange: -30 },
                    { buttonText: 'Assertive: "Hold on. I didn\'t say anything bad. Who told you that?"', nextScene: 'school_t1_success', meterChange: 25 }
                ]
            },
            school_t1_fail: { npcDialogue: 'They yell back. [FAIL: Anger matches anger, creating a scene.]', characterVisual: '😡', choices: [{ buttonText: 'Return', nextScene: 'menu_school_p1', resetMeter: true }] },
            school_t1_success: { npcDialogue: 'They explain calmly. [SUCCESS: Forced clarification de-escalates.]', characterVisual: '🤔', choices: [{ buttonText: 'Return', nextScene: 'menu_school_p1', resetMeter: true }] },

            school_t2_start: {
                npcDialogue: 'Partner: "I\'ll do my part later." (Due tomorrow, nothing done).', characterVisual: '🥱',
                choices: [
                    { buttonText: 'Passive: "Fine, I\'ll just do it all myself."', nextScene: 'school_t2_fail', meterChange: -20 },
                    { buttonText: 'Boundary: "I need your part by 8 PM, or I have to submit it with just my name."', nextScene: 'school_t2_success', meterChange: 30 }
                ]
            },
            school_t2_fail: { npcDialogue: 'You carry their weight. [FAIL: Rewarded bad behavior.]', characterVisual: '😩', choices: [{ buttonText: 'Return', nextScene: 'menu_school_p1', resetMeter: true }] },
            school_t2_success: { npcDialogue: 'They log on to work. [SUCCESS: Consequences drive action.]', characterVisual: '💻', choices: [{ buttonText: 'Return', nextScene: 'menu_school_p1', resetMeter: true }] },

            school_t3_start: {
                npcDialogue: 'The teacher gives you an unexpectedly low grade on a paper.', characterVisual: '🧑‍🏫',
                choices: [
                    { buttonText: 'Whine: "This isn\'t fair, I worked so hard!"', nextScene: 'school_t3_fail', meterChange: -25 },
                    { buttonText: 'Inquire: "Could we go over this? I want to understand where I lost points."', nextScene: 'school_t3_success', meterChange: 25 }
                ]
            },
            school_t3_fail: { npcDialogue: 'Teacher ignores you. [FAIL: Complaining limits learning.]', characterVisual: '😒', choices: [{ buttonText: 'Return', nextScene: 'menu_school_p1', resetMeter: true }] },
            school_t3_success: { npcDialogue: 'Teacher explains the rubric. [SUCCESS: Professional inquiry.]', characterVisual: '📝', choices: [{ buttonText: 'Return', nextScene: 'menu_school_p1', resetMeter: true }] },

            school_t4_start: {
                npcDialogue: 'Kids make fun of a younger student\'s shoes.', characterVisual: '👟',
                choices: [
                    { buttonText: 'Join in/Laugh nervously.', nextScene: 'school_t4_fail', meterChange: -35 },
                    { buttonText: 'Redirect: "Hey guys, let\'s go, we\'ll be late." (Pulling them away)', nextScene: 'school_t4_success', meterChange: 35 }
                ]
            },
            school_t4_fail: { npcDialogue: 'The kid looks crushed. [FAIL: Complicity via silence.]', characterVisual: '😢', choices: [{ buttonText: 'Return', nextScene: 'menu_school_p1', resetMeter: true }] },
            school_t4_success: { npcDialogue: 'The bullies leave. [SUCCESS: Protected without a fight.]', characterVisual: '🛡️', choices: [{ buttonText: 'Return', nextScene: 'menu_school_p1', resetMeter: true }] },

            school_t5_start: {
                npcDialogue: 'You accidentally break your friend\'s phone screen.', characterVisual: '📱',
                choices: [
                    { buttonText: 'Deflect: "You shouldn\'t have left it on the edge!"', nextScene: 'school_t5_fail', meterChange: -30 },
                    { buttonText: 'Accountability: "I am so sorry. Let\'s figure out the repair cost together."', nextScene: 'school_t5_success', meterChange: 35 }
                ]
            },
            school_t5_fail: { npcDialogue: 'Friend is furious. [FAIL: Deflecting ruins trust.]', characterVisual: '🔥', choices: [{ buttonText: 'Return', nextScene: 'menu_school_p1', resetMeter: true }] },
            school_t5_success: { npcDialogue: 'Friend calms down. [SUCCESS: Accountability diffuses anger.]', characterVisual: '🤝', choices: [{ buttonText: 'Return', nextScene: 'menu_school_p1', resetMeter: true }] },

            school_t6_start: {
                npcDialogue: 'A classmate repeats your exact idea loudly and the teacher praises them.', characterVisual: '🙋',
                choices: [
                    { buttonText: 'Yell: "I literally just said that! You stole it!"', nextScene: 'school_t6_fail', meterChange: -25 },
                    { buttonText: 'Tactical: "I am glad you liked the point I brought up! Building on that..."', nextScene: 'school_t6_success', meterChange: 35 }
                ]
            },
            school_t6_fail: { npcDialogue: 'Teacher reprimands you for yelling. [FAIL]', characterVisual: '🤫', choices: [{ buttonText: 'Return', nextScene: 'menu_school_p2', resetMeter: true }] },
            school_t6_success: { npcDialogue: 'You reclaim credit smoothly. [SUCCESS: The "Yes, And" technique.]', characterVisual: '💡', choices: [{ buttonText: 'Return', nextScene: 'menu_school_p2', resetMeter: true }] },

            school_t7_start: {
                npcDialogue: '"Can I copy your homework real quick? I forgot to do it."', characterVisual: '📝',
                choices: [
                    { buttonText: 'Submit: "Fine, just don\'t make it obvious."', nextScene: 'school_t7_fail', meterChange: -20 },
                    { buttonText: 'Boundary: "I can\'t let you copy it, but I can show you how I solved number 1."', nextScene: 'school_t7_success', meterChange: 25 }
                ]
            },
            school_t7_fail: { npcDialogue: 'Teacher catches you both. [FAIL: Compromised integrity.]', characterVisual: '🚨', choices: [{ buttonText: 'Return', nextScene: 'menu_school_p2', resetMeter: true }] },
            school_t7_success: { npcDialogue: 'They sigh but accept help. [SUCCESS: Helpful but firm.]', characterVisual: '✅', choices: [{ buttonText: 'Return', nextScene: 'menu_school_p2', resetMeter: true }] },

            school_t8_start: {
                npcDialogue: 'The substitute teacher repeatedly mispronounces your name.', characterVisual: '👨‍🏫',
                choices: [
                    { buttonText: 'Ignore it and feel resentful.', nextScene: 'school_t8_fail', meterChange: -15 },
                    { buttonText: 'Correct: "Actually, it is pronounced [Name]. Nice to meet you!"', nextScene: 'school_t8_success', meterChange: 25 }
                ]
            },
            school_t8_fail: { npcDialogue: 'They keep saying it wrong all week. [FAIL: Unstated boundaries.]', characterVisual: '😔', choices: [{ buttonText: 'Return', nextScene: 'menu_school_p2', resetMeter: true }] },
            school_t8_success: { npcDialogue: '"Oh, my apologies! [Name]." [SUCCESS: Polite self-advocacy.]', characterVisual: '🗣️', choices: [{ buttonText: 'Return', nextScene: 'menu_school_p2', resetMeter: true }] },

            school_t9_start: {
                npcDialogue: 'The whole class is kept late because one student threw a paper plane.', characterVisual: '⏱️',
                choices: [
                    { buttonText: 'Argue: "You can\'t punish all of us for his mistake!"', nextScene: 'school_t9_fail', meterChange: -25 },
                    { buttonText: 'Negotiate: "Is there a way we can earn back our time if we focus right now?"', nextScene: 'school_t9_success', meterChange: 35 }
                ]
            },
            school_t9_fail: { npcDialogue: 'Teacher adds 5 more minutes. [FAIL: Escalating an authority figure.]', characterVisual: '😠', choices: [{ buttonText: 'Return', nextScene: 'menu_school_p2', resetMeter: true }] },
            school_t9_success: { npcDialogue: 'Teacher agrees to a compromise. [SUCCESS: Solution-oriented linguistics.]', characterVisual: '🤝', choices: [{ buttonText: 'Return', nextScene: 'menu_school_p2', resetMeter: true }] },

            school_t10_start: {
                npcDialogue: 'You find out your friends formed a study group and didn\'t invite you.', characterVisual: '📚',
                choices: [
                    { buttonText: 'Accuse: "Wow, thanks for leaving me out guys. Fake friends."', nextScene: 'school_t10_fail', meterChange: -30 },
                    { buttonText: 'Direct: "Hey, I saw you guys studying! I\'d love to join the group next time."', nextScene: 'school_t10_success', meterChange: 30 }
                ]
